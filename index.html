<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="apple-touch-icon" href="icon-study.png">
<link rel="manifest" href="manifest-study.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="学習管理">
<meta name="theme-color" content="#2b7de9">
<title>学習スケジュール</title>
<style>
:root{
  --bg:#f4f6f9; --card:#ffffff; --ink:#1c2733; --sub:#5b6b7c; --line:#e3e8ee;
  --accent:#2b7de9; --accent-soft:#e8f1fd; --green:#22a06b; --green-soft:#e6f6ef;
  --red:#e5484d; --red-soft:#fdecec; --amber:#b7791f; --amber-soft:#fdf3e0;
  --radius:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif; background:var(--bg); color:var(--ink); padding-bottom:76px;}
.wrap{max-width:720px; margin:0 auto; padding:14px 14px 0;}
header.app{padding:16px 4px 8px;}
header.app h1{font-size:19px; margin:0 0 2px;}
header.app .sub{font-size:12.5px; color:var(--sub);}
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px; margin:0 0 12px; box-shadow:0 1px 2px rgba(16,30,54,.04);}
.card h2{font-size:15px; margin:0 0 10px; display:flex; align-items:center; gap:6px;}
.row{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.spread{display:flex; justify-content:space-between; align-items:center; gap:8px;}
button{font:inherit; border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:10px; padding:8px 12px; cursor:pointer;}
button.primary{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:600;}
button.ghost{background:transparent; border:none; color:var(--accent); padding:4px 6px;}
button.danger{color:var(--red);}
button.mini{padding:4px 10px; font-size:13px; border-radius:8px;}
input,select,textarea{font:inherit; border:1px solid var(--line); border-radius:9px; padding:8px 10px; background:#fff; color:var(--ink); max-width:100%;}
input[type=number]{width:84px;} input[type=date]{width:150px;}
textarea{width:100%; min-height:54px; resize:vertical;}
.tag{display:inline-block; font-size:11.5px; padding:2px 8px; border-radius:99px; background:var(--accent-soft); color:var(--accent); font-weight:600;}
.tag.green{background:var(--green-soft); color:var(--green);}
.tag.red{background:var(--red-soft); color:var(--red);}
.tag.amber{background:var(--amber-soft); color:var(--amber);}
.big{font-size:26px; font-weight:700;}
.muted{color:var(--sub); font-size:12.5px;}
.bar{height:10px; background:#edf1f6; border-radius:99px; overflow:hidden;}
.bar>i{display:block; height:100%; background:var(--accent); border-radius:99px; transition:width .25s;}
.bar>i.g{background:var(--green);}
.task{display:flex; align-items:center; gap:10px; padding:10px 0; border-top:1px solid var(--line);}
.task:first-of-type{border-top:none;}
.task .info{flex:1; min-width:0;}
.task .name{font-size:14px; font-weight:600;}
.task .meta{font-size:12px; color:var(--sub); margin-top:2px;}
.step{display:flex; align-items:center; gap:6px;}
.step button{width:34px; height:34px; padding:0; border-radius:9px; font-size:18px; line-height:1;}
.step .num{min-width:54px; text-align:center; font-weight:700;}
.done .name{color:var(--green);}
.weekgrid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px; text-align:center;}
.wd{border:1px solid var(--line); border-radius:10px; padding:8px 2px; font-size:12px; background:#fff;}
.wd .d{font-weight:700; font-size:13px;}
.wd .m{font-size:11px; color:var(--sub);}
.wd.ok{background:var(--green-soft); border-color:#bfe7d4;}
.wd.ng{background:var(--red-soft); border-color:#f6c8ca;}
.wd.today{outline:2px solid var(--accent);}
.cal{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; text-align:center; font-size:12.5px;}
.cal .h{color:var(--sub); font-size:11px; padding:2px 0;}
.cal .c{border:1px solid var(--line); border-radius:8px; padding:5px 0 4px; min-height:44px; background:#fff;}
.cal .c .n{font-size:11.5px; color:var(--sub);}
.cal .c .mk{font-size:14px; line-height:1.3;}
.cal .c.off{opacity:.35;}
.cal .c.ok{background:var(--green-soft);} .cal .c.ng{background:var(--red-soft);}
.cal .c.exam{border-color:var(--amber); border-width:2px;}
.choice{display:block; width:100%; text-align:left; padding:11px 13px; margin:7px 0; border-radius:11px; border:1.5px solid var(--line); background:#fff; font-size:14.5px; cursor:pointer;}
.choice:hover{border-color:var(--accent);}
.fbpanel{border-radius:12px; padding:12px 14px; margin:10px 0;}
.fbpanel.ok{background:var(--green-soft); border:1px solid #bfe7d4;}
.fbpanel.ng{background:var(--red-soft); border:1px solid #f6c8ca;}
.qprog{font-size:12.5px; color:var(--sub); margin-bottom:6px;}
.qtext{font-size:16px; font-weight:700; margin:6px 0 10px; line-height:1.55;}
.blockrow{display:flex; align-items:center; gap:10px; padding:9px 0; border-top:1px solid var(--line);}
.blockrow:first-of-type{border-top:none;}
.lsname{font-size:13px; font-weight:700; color:var(--accent); margin:14px 0 2px;}
.ptlist{background:#f7fafc; border:1px solid var(--line); border-radius:10px; padding:10px 14px; font-size:13.5px; line-height:1.8;}
.dxbox{margin-top:8px;}
.dxbox summary{cursor:pointer; color:var(--accent); font-size:13px; font-weight:700; list-style-position:inside;}
.dxbody{background:#fff; border:1px solid var(--line); border-radius:8px; padding:9px 12px; font-size:12.5px; line-height:1.75; margin-top:6px; color:var(--ink);}
.mnitem{border:1px solid var(--line); border-radius:11px; padding:10px 12px; margin:8px 0; background:#fff;}
.ls-seg{display:flex; gap:8px; margin-bottom:10px;}
.ls-seg button{flex:1; padding:10px 0; border-radius:11px; border:1.5px solid var(--line); background:#fff; font:inherit; font-size:14px; font-weight:700; color:var(--sub); cursor:pointer;}
.ls-seg button.act{background:var(--accent); border-color:var(--accent); color:#fff;}
.ls-chips{display:flex; flex-wrap:wrap; gap:7px;}
.ls-chip{padding:6px 13px; border-radius:99px; border:1.5px solid var(--line); background:#fff; font:inherit; font-size:12.5px; font-weight:600; color:var(--sub); cursor:pointer;}
.ls-chip.act{background:var(--accent-soft); border-color:var(--accent); color:var(--accent);}
.ls-now{text-align:center; padding:14px 8px 4px;}
.ls-now .en{font-size:27px; font-weight:800; line-height:1.3; word-break:break-word;}
.ls-now .ja{font-size:15px; color:var(--sub); margin-top:7px; min-height:22px; line-height:1.5; white-space:pre-line;}
.ls-now .cnt{font-size:12px; color:var(--sub); margin-top:8px;}
.ls-now .stat{font-size:11px; color:var(--amber); min-height:15px;}
.ls-transport{display:flex; justify-content:center; align-items:center; gap:14px; margin:10px 0 4px;}
.ls-tbtn{width:54px; height:54px; border-radius:50%; border:1.5px solid var(--line); background:#fff; font-size:20px; cursor:pointer;}
.ls-tbtn.play{width:72px; height:72px; font-size:28px; background:var(--accent); border-color:var(--accent); color:#fff;}
.ls-pills{display:flex; justify-content:center; gap:7px; margin-top:9px; flex-wrap:wrap;}
.ls-pill{padding:7px 12px; border-radius:99px; border:1.5px solid var(--line); background:#fff; font:inherit; font-size:12px; font-weight:600; color:var(--sub); cursor:pointer;}
.ls-pill.on{background:var(--green-soft); border-color:var(--green); color:var(--green);}
.ls-set{display:flex; align-items:center; gap:10px; margin:8px 0; font-size:13px;}
.ls-set label{width:110px; color:var(--sub);}
.ls-set input[type=range]{flex:1;}
.ls-set .val{width:48px; text-align:right; font-weight:700; font-size:12px;}
.ls-item{display:flex; align-items:center; gap:8px; padding:7px 2px; border-top:1px solid var(--line); font-size:13px;}
.ls-item:first-of-type{border-top:none;}
.ls-item .en{font-weight:700;}
.ls-item .ja{color:var(--sub); font-size:12px;}
.ls-item.known .en,.ls-item.known .ja{opacity:.4; text-decoration:line-through;}
.ls-kbtn{border:none; background:none; font-size:17px; cursor:pointer; padding:3px;}
nav.tabs{position:fixed; left:0; right:0; bottom:0; background:#fff; border-top:1px solid var(--line); display:flex; justify-content:space-around; padding:6px 4px calc(6px + env(safe-area-inset-bottom)); z-index:50;}
nav.tabs button{border:none; background:none; font-size:11px; color:var(--sub); display:flex; flex-direction:column; align-items:center; gap:2px; padding:4px 10px; border-radius:10px;}
nav.tabs button .ic{font-size:20px;}
nav.tabs button.act{color:var(--accent); background:var(--accent-soft); font-weight:700;}
.ledger{width:100%; border-collapse:collapse; font-size:13px;}
.ledger th,.ledger td{padding:7px 4px; border-bottom:1px solid var(--line); text-align:center;}
.ledger th{color:var(--sub); font-weight:600; font-size:12px;}
.money{font-weight:700;}
.fieldset{border:1px dashed var(--line); border-radius:10px; padding:10px; margin-top:10px;}
.fieldset .lbl{font-size:12px; color:var(--sub); margin:6px 0 3px;}
.examcard{border:1px solid var(--line); border-radius:12px; padding:12px; margin-bottom:10px;}
.examcard h3{margin:0; font-size:14.5px;}
.range{padding:8px 0; border-top:1px solid var(--line); font-size:13px;}
.range:first-of-type{border-top:none;}
h2 .ic{font-size:17px;}
.kpis{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px;}
.kpi{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px; text-align:center;}
.kpi .v{font-size:18px; font-weight:700;}
.kpi .l{font-size:11px; color:var(--sub);}
@media(min-width:700px){ nav.tabs{max-width:720px; margin:0 auto; border:1px solid var(--line); border-radius:16px 16px 0 0;} }
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <h1>📚 学習スケジュール</h1>
    <div class="sub" id="headSub"></div>
  </header>
  <div id="view"></div>
</div>
<nav class="tabs" id="tabs"></nav>
<script>
"use strict";
/* ---------- 状態 ---------- */
const KEY="tomoki_study_v1";
const todayStr=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");};
const DEF={
  settings:{dailyMin:60, weeklyPassDays:6, allowance:500, termEnd:"2027-03-19", startDate:todayStr()},
  exams:[ {id:"ex1", name:"期末テスト（例：編集してください）", date:"2026-07-01", ranges:[
      {id:"r1", subject:"英語", desc:"教科書 Lesson5〜7（p76〜117）音読・単語・本文", total:21, done:0, unit:"ページ(見開き)"},
      {id:"r2", subject:"地理", desc:"教科書 p76〜119 ＋ ワーク該当範囲", total:22, done:0, unit:"ページ(見開き)"} ]} ],
  routines:[ {id:"ro1", name:"英単語（大学受験基礎）", quota:20, unit:"語", active:true},
             {id:"ro2", name:"数学 基礎問題（受験基礎）", quota:2, unit:"問", active:true} ],
  logs:{}, weeks:{}
};
let S=load();
function load(){ try{const j=JSON.parse(localStorage.getItem(KEY)); if(j&&j.settings) return Object.assign({},DEF,j);}catch(e){} return JSON.parse(JSON.stringify(DEF)); }
function save(){ S.savedAt=Date.now(); localStorage.setItem(KEY,JSON.stringify(S)); schedulePush(); }
/* ---------- 日付ユーティリティ ---------- */
const P=(s)=>new Date(s+"T00:00:00");
const iso=(d)=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
const addD=(s,n)=>{const d=P(s); d.setDate(d.getDate()+n); return iso(d);};
const diffD=(a,b)=>Math.round((P(b)-P(a))/864e5);
const mondayOf=(s)=>{const d=P(s); const w=(d.getDay()+6)%7; d.setDate(d.getDate()-w); return iso(d);};
const fmtMD=(s)=>{const d=P(s); return (d.getMonth()+1)+"/"+d.getDate();};
const WD=["月","火","水","木","金","土","日"];
/* ---------- ログ ---------- */
function getLog(ds){ if(!S.logs[ds]) S.logs[ds]={min:0,target:null,ranges:{},routines:{},note:""}; return S.logs[ds]; }
function peekLog(ds){ return S.logs[ds]||{min:0,target:null,ranges:{},routines:{},note:""}; }
function dayPassed(ds){ return peekLog(ds).min>=S.settings.dailyMin; }
/* ---------- 週判定 ---------- */
function weekInfo(mon){ // 月曜ISO → {passDays, passed, complete}
  let pass=0, logged=0;
  for(let i=0;i<7;i++){ const ds=addD(mon,i);
    if(ds<S.settings.startDate){ pass++; continue; } // 開始前日は達成扱い
    if(dayPassed(ds)) pass++;
    if(peekLog(ds).min>0) logged++;
  }
  const complete = addD(mon,6) < todayStr();
  return {passDays:pass, passed:pass>=S.settings.weeklyPassDays, complete, logged};
}
function weekMin(mon){ let s=0; for(let i=0;i<7;i++) s+=(peekLog(addD(mon,i)).min||0); return s; }
function fmtMin(m){ if(m<60) return m+"分"; const h=Math.floor(m/60), r=m%60; return h+"時間"+(r?r+"分":""); }
function ledgerWeeks(){ // 開始週〜先週
  const out=[]; let m=mondayOf(S.settings.startDate); const cur=mondayOf(todayStr());
  while(m<cur){ out.push(m); m=addD(m,7); } return out;
}
/* ---------- 今日のノルマ ---------- */
function examTasks(ds){
  const out=[];
  for(const ex of S.exams){
    const dl=diffD(ds,ex.date);
    if(dl<0) continue;
    for(const r of ex.ranges){
      const rem=Math.max(0,r.total-r.done);
      const quota = dl===0 ? 0 : Math.ceil(rem/Math.max(1,dl));
      out.push({ex,r,rem,quota,dl});
    }
  }
  return out;
}
/* ---------- 描画 ---------- */
let TAB="today"; let calY,calM;
const V=document.getElementById("view");
const TABS=[["today","✅","今日"],["learn","📖","学習"],["listen","🎧","聴く"],["week","📅","週間"],["cal","🗓","記録"],["plan","🎯","計画"],["set","⚙️","設定"]];
function renderTabs(){
  document.getElementById("tabs").innerHTML = TABS.map(t=>`<button class="${TAB===t[0]?'act':''}" onclick="go('${t[0]}')"><span class="ic">${t[1]}</span>${t[2]}</button>`).join("");
}
function go(t){ TAB=t; render(); }
function head(){
  const t=todayStr();
  let streak=0; let d=t; if(!dayPassed(d)) d=addD(d,-1);
  while(d>=S.settings.startDate && dayPassed(d)){ streak++; d=addD(d,-1); }
  const te=diffD(t,S.settings.termEnd);
  let nearest=null;
  for(const ex of S.exams){ const dl=diffD(t,ex.date); if(dl>=0&&(nearest===null||dl<nearest.dl)) nearest={ex,dl}; }
  document.getElementById("headSub").innerHTML =
    `🔥 連続達成 <b>${streak}</b>日　` +
    (nearest?`📝 ${esc(nearest.ex.name)}まで <b>D-${nearest.dl}</b>　`:"") +
    (te>=0?`🌸 学年末まで ${te}日`:"");
}
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function render(){ renderTabs(); head();
  if(TAB==="today") rToday(); else if(TAB==="learn") rLearn(); else if(TAB==="listen") rListen(); else if(TAB==="week") rWeek(); else if(TAB==="cal") rCal(); else if(TAB==="plan") rPlan(); else rSet(); }
/* ----- 今日 ----- */
function rToday(){
  const t=todayStr(); const log=getLog(t);
  const target = log.target || S.settings.dailyMin;
  const okDay = log.min>=S.settings.dailyMin;
  const pct=Math.min(100,Math.round(log.min/target*100));
  const tasks=examTasks(t);
  let h=`<div class="card">
    <div class="spread"><h2><span class="ic">⏱</span>今日の勉強時間 <span class="muted">${fmtMD(t)}(${WD[(P(t).getDay()+6)%7]})</span></h2>
      <span class="tag ${okDay?'green':'red'}">${okDay?'達成 ✓':'未達成'}</span></div>
    <div class="row" style="margin:6px 0 8px"><span class="big">${log.min}</span><span class="muted">分 / 目標 ${target}分（最低${S.settings.dailyMin}分）</span></div>
    <div class="bar"><i class="${okDay?'g':''}" style="width:${pct}%"></i></div>
    <div class="row" style="margin-top:12px">
      <button class="primary" onclick="addMin(15)">+15分</button>
      <button class="primary" onclick="addMin(30)">+30分</button>
      <button class="primary" onclick="addMin(60)">+60分</button>
      <button class="mini" onclick="addMin(-15)">−15分</button>
      <button class="mini" onclick="setTarget(${target===120?'null':'120'})">${target===120?'目標を60分に戻す':'今日は2時間モード'}</button>
    </div></div>`;
  h+=`<div class="card"><h2><span class="ic">📝</span>定期テスト対策（自動配分）</h2>`;
  if(tasks.length===0) h+=`<div class="muted">試験が未登録です。「計画」タブから試験と範囲を登録すると、毎日のノルマが自動計算されます。</div>`;
  for(const tk of tasks){
    const did=log.ranges[tk.r.id]||0;
    const ok=tk.quota>0&&did>=tk.quota;
    h+=`<div class="task ${ok?'done':''}"><div class="info">
      <div class="name">${ok?'✅ ':''}${esc(tk.r.subject)}：${esc(tk.r.desc)}</div>
      <div class="meta">${tk.dl===0?'🎯 今日が試験日！':`今日のノルマ <b>${tk.quota}${esc(tk.r.unit)}</b>（残り${tk.rem}${esc(tk.r.unit)} ÷ ${tk.dl}日） ・ ${esc(tk.ex.name)} D-${tk.dl}`}</div></div>
      <div class="step"><button onclick="bumpRange('${tk.r.id}',-1)">−</button><span class="num">${did}</span><button onclick="bumpRange('${tk.r.id}',1)">＋</button></div></div>`;
  }
  h+=`</div><div class="card"><h2><span class="ic">🎓</span>大学受験 毎日ルーチン</h2>`;
  const acts=S.routines.filter(r=>r.active);
  if(acts.length===0) h+=`<div class="muted">「計画」タブから毎日ルーチン（英単語など）を登録できます。</div>`;
  for(const ro of acts){
    const did=log.routines[ro.id]||0; const ok=did>=ro.quota;
    h+=`<div class="task ${ok?'done':''}"><div class="info">
      <div class="name">${ok?'✅ ':''}${esc(ro.name)}</div>
      <div class="meta">1日 ${ro.quota}${esc(ro.unit)}</div></div>
      <div class="step"><button onclick="bumpRoutine('${ro.id}',-1)">−</button><span class="num">${did}</span><button onclick="bumpRoutine('${ro.id}',${ro.quota>=10?5:1})">＋${ro.quota>=10?5:1}</button></div></div>`;
  }
  h+=`</div>`+learnTodayCard()+`<div class="card"><h2><span class="ic">✏️</span>今日のメモ</h2>
    <textarea onchange="setNote(this.value)" placeholder="やったこと・気づきなど">${esc(log.note||"")}</textarea></div>`;
  V.innerHTML=h;
}
function addMin(n){ const l=getLog(todayStr()); l.min=Math.max(0,l.min+n); save(); render(); }
function setTarget(v){ const l=getLog(todayStr()); l.target=v; save(); render(); }
function setNote(v){ getLog(todayStr()).note=v; save(); }
function bumpRange(id,n){ const l=getLog(todayStr());
  for(const ex of S.exams) for(const r of ex.ranges) if(r.id===id){
    const cur=l.ranges[id]||0;
    if(n>0&&r.done>=r.total) return;
    if(n<0&&cur<=0) return;
    l.ranges[id]=cur+n; r.done=Math.max(0,Math.min(r.total,r.done+n));
  } save(); render(); }
function bumpRoutine(id,n){ const l=getLog(todayStr()); const cur=l.routines[id]||0; l.routines[id]=Math.max(0,cur+n); save(); render(); }
/* ===== 学習モジュール（教科書ブロック学習・100点マスタリー） ===== */
/* 出典：東京書籍 Power On English Communication I（整理済み教科書データに基づく） */
const QB=[
{id:"PRE",ls:"Pre-Lesson（英語の文のしくみ）",nm:"基本ルール",pts:["英語は「だれが→どうする→なにを」の語順（S+V+O）","他動詞は直後に目的語（discuss the plan ○ / discuss about ×）","名詞のかたまりは後ろから説明（the mouse on the book＝本の上のネズミ）","形容詞は名詞を、 副詞は動詞などを説明する"],qs:[
{q:"「私は毎朝りんごを食べます」の正しい英語は？",c:["I eat an apple every morning.","I an apple eat every morning.","Every morning apple I eat.","I every morning eat an apple."],a:0,ex:"英語は S（主語）+V（動詞）+O（目的語）の語順。動詞は主語のすぐ後ろ。"},
{q:"正しい文はどれ？（discuss＝〜を話し合う）",c:["We discussed the plan.","We discussed about the plan.","We discussed on the plan.","We discussed to the plan."],a:0,ex:"discussは他動詞なので直後に目的語。aboutは不要。"},
{q:"the mouse on the book の意味は？",c:["本の上のネズミ","ネズミの上の本","本とネズミ","ネズミの本"],a:0,ex:"英語では名詞を後ろから説明する。on the book が the mouse を説明。"},
{q:"cute monkeys の cute のように、名詞を説明する語を何という？",c:["形容詞","副詞","動詞","前置詞"],a:0,ex:"形容詞は名詞（monkeys）を説明する。"},
{q:"run fast の fast のように、動詞を説明する語を何という？",c:["副詞","形容詞","名詞","接続詞"],a:0,ex:"副詞は動詞・形容詞などを説明する。fastは「速く」走る様子を説明。"},
{q:"I like the dog on the chair. どの犬が好き？",c:["いすの上にいる犬","いすの下にいる犬","いすの横の犬","どの犬でもよい"],a:0,ex:"on the chair（いすの上の）が後ろから the dog を説明している。"},
{q:"英語の文で、動詞はふつうどこに置く？",c:["主語のすぐ後ろ","文の最後","文の最初","どこでもよい"],a:0,ex:"日本語は最後に動詞が来るが、英語は S+V の語順が基本。"},
{q:"I ran there yesterday. の yesterday は何を表す副詞？",c:["時","場所","様子","理由"],a:0,ex:"yesterday（昨日）は「いつ」＝時を表す副詞。thereは場所、fastなら様子。"}]},
{id:"L1V",ls:"Lesson 1  Japan's New Tourism",nm:"単語",pts:["sightseeing 観光 ／ countless 数えきれないほどの","construction 建設 ／ exotic 異国情緒のある","appeal to 〜の心を引きつける ／ mecca （活動の）中心地・聖地","nowadays 近頃は ／ seek 〜を求める ／ pride 誇り"],qs:[
{q:"sightseeing の意味は？",c:["観光","建設","誇り","経験"],a:0,ex:"sightseeing＝観光。sports tourism（スポーツツーリズム）と対比して使われた。"},
{q:"countless の意味は？",c:["数えきれないほどの","数が少ない","重要な","巨大な"],a:0,ex:"count（数える）+less。伏見稲荷大社の countless red torii gates。"},
{q:"「建設」を表す英語は？",c:["construction","instruction","destruction","introduction"],a:0,ex:"construction＝建設。鳥居に書かれた the construction dates（建立日）。"},
{q:"exotic の意味は？",c:["異国情緒のある","退屈な","高価な","伝統的な"],a:0,ex:"exotic＝異国風の・エキゾチックな。赤い鳥居と黒い文字の対比が very exotic。"},
{q:"appeal to 〜 の意味は？",c:["〜の心を引きつける","〜に反対する","〜を破壊する","〜を輸出する"],a:0,ex:"It appeals to visitors from abroad.（外国からの観光客を引きつける）"},
{q:"mecca の意味は？",c:["（活動の）中心地・聖地","砂漠","空港","祭り"],a:0,ex:"ニセコは a mecca for sports tourism（スポーツツーリズムの聖地）。"},
{q:"nowadays の意味は？",c:["近頃は","昔は","ときどき","いつまでも"],a:0,ex:"nowadays＝近頃は・今日では。現在形と一緒に使うことが多い。"},
{q:"seek の意味は？",c:["〜を求める","〜を隠す","〜を売る","〜を見せる"],a:0,ex:"tourists are seeking fresh experiences（新鮮な体験を求めている）。"},
{t:1,q:"タイピング：「観光」を英語で（s で始まる1語）",a:["sightseeing"],ex:"sightseeing。sight（景色）+seeing（見ること）。"},
{t:1,q:"タイピング：「近頃は」を英語で（n で始まる1語）",a:["nowadays"],ex:"nowadays。"},
{q:"tourism の意味は？",c:["観光業","旅行者","神社","税金"],a:0,ex:"tourism＝観光業。sightseeing（観光）に対し産業全体を指す。"},
{q:"「神社」を表す英語は？",c:["shrine","temple","castle","palace"],a:0,ex:"shrine＝神社、temple＝寺。Fushimi-Inari Taisha Shrine。"}]},
{id:"L1G",ls:"Lesson 1  Japan's New Tourism",nm:"文法（現在形・過去形・進行形）",pts:["現在形＝今の状態・習慣（every yearなど）","過去形＝過去の動作・状態（last month, yesterdayなど）","進行形 be+〜ing＝「〜している最中」","one of the+複数名詞＝「〜のひとつ」"],qs:[
{q:"Ms. Green （　） Kyoto every year.",c:["visits","visited","is visiting","visit"],a:0,ex:"every year（毎年）＝習慣なので現在形。主語が3人称単数なので visits。"},
{q:"I （　） to the shrine last month.",c:["went","go","am going","goes"],a:0,ex:"last month（先月）があるので過去形 went。"},
{q:"I （　） in Hokkaido at that time.",c:["was skiing","am skiing","ski","have skied"],a:0,ex:"at that time（そのとき）＝過去のある時点で進行中→過去進行形 was skiing。"},
{q:"Fushimi-Inari Taisha is one of the most popular sightseeing （　） in Japan.",c:["spots","spot","a spot","spotting"],a:0,ex:"one of the+最上級+複数名詞。「最も人気の観光地のひとつ」。"},
{q:"The shrine is famous （　） its countless red torii gates.",c:["for","to","at","on"],a:0,ex:"be famous for 〜＝「〜で有名」。"},
{q:"She （　） pictures of the gates now.",c:["is taking","takes","took","taken"],a:0,ex:"now（今）＝現在進行中→現在進行形 is taking。"},
{q:"「彼は毎日カラオケを楽しみます」正しいのは？",c:["He enjoys karaoke every day.","He enjoy karaoke every day.","He is enjoy karaoke every day.","He enjoyed karaoke every day."],a:0,ex:"習慣＝現在形。3人称単数なので enjoys。"},
{q:"現在進行形が表すのは？",c:["今まさにしている最中の動作","毎日の習慣","過去の経験","未来の予定だけ"],a:0,ex:"be動詞+〜ingで「〜しているところ」。習慣は現在形で表す。"},
{t:1,q:"タイピング：I （　） to the shrine last month.（go を正しい形に）",a:["went"],ex:"last month があるので過去形 went。go-went-gone。"}]},
{id:"L1R",ls:"Lesson 1  Japan's New Tourism",nm:"本文理解",pts:["外国人観光客に一番人気＝伏見稲荷大社（京都）","数えきれない赤い鳥居×黒い文字（寄進者名・建立日）のコントラスト","Japow＝Japanese powder snow。ニセコはスポーツツーリズムの聖地","新しい観光＝スポーツツーリズムと文化ツーリズム"],qs:[
{q:"本文で「外国人観光客に最も人気の観光地」とされたのは？",c:["伏見稲荷大社","金閣寺","広島平和記念公園","東京スカイツリー"],a:0,ex:"The answer is ... Fushimi-Inari Taisha Shrine in Kyoto!"},
{q:"伏見稲荷大社は何で有名？",c:["数えきれないほどの赤い鳥居","大きな大仏","五重塔","桜並木"],a:0,ex:"famous for its countless red torii gates。"},
{q:"鳥居に書かれている黒い文字は何？",c:["寄進した人の名前と建立日","お経","観光客の落書き","神様の名前"],a:0,ex:"the construction dates of the gates and the names of donors（寄進者名と建立日）。"},
{q:"「Japow」とは何のこと？",c:["日本のパウダースノー","日本のポップカルチャー","日本の温泉","日本の食べ物"],a:0,ex:"Japow＝Japanese powder snow。とても軽くて柔らかい雪。"},
{q:"北海道のニセコは何の「聖地（mecca）」？",c:["スポーツツーリズム","映画のロケ地","アニメ","グルメ"],a:0,ex:"Niseko in Hokkaido is now a mecca for sports tourism。"},
{q:"本文で挙げられた「新しい観光」の2つは？",c:["スポーツツーリズムと文化ツーリズム","宇宙旅行と海底旅行","医療ツーリズムと農業体験","登山と釣り"],a:0,ex:"not only sightseeing but also sports tourism and cultural tourism。"},
{q:"世界中のスキーヤー・スノーボーダーが日本に来る理由は？",c:["雪がとても軽くて柔らかいから","リフト代が安いから","夏でも滑れるから","コースが短いから"],a:0,ex:"Japanese powder snow is very soft and light。"},
{q:"日本は今、観光客にとってどんな国になっている？",c:["新鮮な体験を求めて世界中から人が来る国","観光客が減り続けている国","外国人が入国できない国","スキーだけが目的の国"],a:0,ex:"tourists are seeking fresh experiences, not just sightseeing。"}]},
{id:"L2V",ls:"Lesson 2  Light from Creatures",nm:"単語",pts:["distract （注意を）そらす ／ predator 捕食者","attract 引きつける ／ mate つがいの相手","century 世紀 ／ purpose 目的 ／ flash 光る・点滅する","firefly ホタル ／ squid イカ ／ jellyfish クラゲ"],qs:[
{q:"distract の意味は？",c:["（注意を）そらす","引きつける","食べる","照らす"],a:0,ex:"distract predators＝捕食者の気をそらす。ホタルイカが光る理由。"},
{q:"predator の意味は？",c:["捕食者","獲物","仲間","研究者"],a:0,ex:"predator＝捕食者。襲ってくる敵のこと。"},
{q:"attract の意味は？",c:["引きつける","逃がす","驚かす","数える"],a:0,ex:"attract small fish＝小魚を引き寄せる。distract（そらす）と対で覚える。"},
{q:"mate の意味は？",c:["つがいの相手","食べ物","光","巣"],a:0,ex:"look for mates＝相手を探す。ホタルが点滅する理由。"},
{q:"century の意味は？",c:["世紀（100年）","10年","1000年","季節"],a:0,ex:"for centuries＝何世紀もの間。"},
{q:"purpose の意味は？",c:["目的","結果","原因","方法"],a:0,ex:"for different purposes＝さまざまな目的のために。"},
{q:"「クラゲ」を表す英語は？",c:["jellyfish","squid","firefly","anglerfish"],a:0,ex:"jellyfish＝クラゲ。crystal jellyfish（オワンクラゲ）が本文に登場。"},
{q:"「イカ」を表す英語は？",c:["squid","octopus","crab","shrimp"],a:0,ex:"squid＝イカ。firefly squid＝ホタルイカ。"},
{t:1,q:"タイピング：「世紀」を英語で（c で始まる1語）",a:["century"],ex:"century。複数形は centuries。"},
{t:1,q:"タイピング：「目的」を英語で（p で始まる1語）",a:["purpose"],ex:"purpose。"},
{q:"creature の意味は？",c:["生き物","創造","文化","治療"],a:0,ex:"creature＝生き物。Light from Creatures＝生き物からの光。"},
{q:"「方法」を表す英語は？",c:["method","mission","member","medal"],a:0,ex:"method＝方法。methods for early cancer detection。"}]},
{id:"L2G",ls:"Lesson 2  Light from Creatures",nm:"文法（受け身・現在完了）",pts:["受け身＝be動詞+過去分詞「〜される」","現在完了 have+過去分詞：経験「〜したことがある」・継続「ずっと〜」","for+期間／since+起点","現在完了進行形 have been 〜ing「ずっと〜し続けている」"],qs:[
{q:"The light （　） for different purposes.",c:["is used","uses","is using","used to"],a:0,ex:"「光は使われる」→受け身 be動詞+過去分詞。"},
{q:"（　） you ever seen fireflies?",c:["Have","Do","Are","Did"],a:0,ex:"ever（今までに）＝経験を表す現在完了。Have you ever+過去分詞?"},
{q:"I have known John （　） he was five.",c:["since","for","from","at"],a:0,ex:"since+起点（彼が5歳のときから）。for は期間（for ten years）。"},
{q:"They （　） a trip since last March.",c:["have been planning","plan","are planning","planned"],a:0,ex:"「3月からずっと計画し続けている」→現在完了進行形 have been 〜ing。"},
{q:"I have seen fireflies （　）.",c:["several times","yesterday","last week","two days ago"],a:0,ex:"現在完了は yesterday など過去の一時点を表す語とは使えない。回数表現はOK。"},
{q:"This song （　） by many people.",c:["is loved","loves","is loving","love"],a:0,ex:"「歌は愛される」→受け身。動作する側を示すときは by 〜。"},
{q:"現在完了（have+過去分詞）が表せないのは？",c:["明日の予定","経験","継続","完了"],a:0,ex:"現在完了は過去とつながった「今」を表す。未来の予定は表せない。"},
{q:"Firefly squid （　） in Toyama for a long time.",c:["have been caught","catch","are catching","caught to"],a:0,ex:"「長い間捕られてきた」→受け身+現在完了 have been+過去分詞。"},
{t:1,q:"タイピング：I have （　） him for ten years.（know を正しい形に）",a:["known"],ex:"現在完了は have+過去分詞。know-knew-known。"}]},
{id:"L2R",ls:"Lesson 2  Light from Creatures",nm:"本文理解",pts:["ホタルイカ：捕食者の気をそらすために光る","ホタル：相手（mate）を探すときに点滅。日本の詩歌に何世紀も登場","アンコウ：深く暗い海で小魚をおびき寄せるために光る","オワンクラゲのタンパク質→がんの早期発見の研究に活用"],qs:[
{q:"ホタルイカはどんなときに光る？",c:["捕食者の気をそらすとき","眠るとき","卵を産むとき","水温が上がったとき"],a:0,ex:"Firefly squid flash lights when they distract predators。"},
{q:"ホタルは何のために光を点滅させる？",c:["つがいの相手を探すため","敵を攻撃するため","暖まるため","道を照らすため"],a:0,ex:"They turn their lights on and off when they look for mates。"},
{q:"アンコウ（anglerfish）はどこにすんでいる？",c:["深く暗い海","浅い川","湖","サンゴ礁"],a:0,ex:"Anglerfish live in the deep dark sea。"},
{q:"アンコウが光る目的は？",c:["小魚をおびき寄せて食べるため","体を温めるため","仲間と話すため","卵を守るため"],a:0,ex:"They flash lights ... The lights attract small fish.（食料のため）"},
{q:"ホタルは日本で昔から何に登場してきた？",c:["詩や歌","通貨","国旗","地図"],a:0,ex:"They have appeared in Japanese poems and songs for centuries。"},
{q:"オワンクラゲ（crystal jellyfish）のタンパク質は何に役立てられている？",c:["がんの早期発見の研究","宝石の製造","食品の保存","燃料の開発"],a:0,ex:"the development of methods for early cancer detection（がん早期発見法の開発）。"},
{q:"この課のテーマとして最も適切なのは？",c:["生き物の光はさまざまな目的で使われている","光る生き物は日本にしかいない","光る生き物は絶滅した","光は人間にしか作れない"],a:0,ex:"In these ways, the light is used for different purposes。"},
{q:"ホタルイカで有名な日本の県は？",c:["富山県","沖縄県","長野県","奈良県"],a:0,ex:"本文・図表で富山のホタルイカが紹介されている。"}]},
{id:"L3V",ls:"Lesson 3  One Small Goal at a Time",nm:"単語",pts:["muscle 筋肉 ／ height 身長 ／ swing スイング","congratulate 祝う ／ pretend 〜のふりをする","donate 寄付する ／ achieve 達成する","modest 謙虚な ／ realize 実現する・気づく"],qs:[
{q:"muscle の意味は？",c:["筋肉","骨","身長","体重"],a:0,ex:"strong muscles＝強い筋肉。発音は「マッスル」（cは読まない）。"},
{q:"height の意味は？",c:["身長・高さ","体重","速さ","強さ"],a:0,ex:"make up for his height＝身長（の低さ）を補う。highの名詞形。"},
{q:"congratulate の意味は？",c:["祝う","非難する","応援する","驚く"],a:0,ex:"congratulate him＝彼を祝う。Congratulations!（おめでとう）の動詞形。"},
{q:"pretend の意味は？",c:["〜のふりをする","〜を約束する","〜を防ぐ","〜を準備する"],a:0,ex:"pretends to do muscle training＝筋トレをするふりをする。"},
{q:"donate の意味は？",c:["寄付する","借りる","稼ぐ","貯める"],a:0,ex:"He donates 100,000 yen＝10万円を寄付する。"},
{q:"achieve の意味は？",c:["達成する","あきらめる","始める","延期する"],a:0,ex:"Achieving one small goal at a time＝小さな目標を一つずつ達成すること。"},
{q:"modest の意味は？",c:["謙虚な","有名な","大胆な","裕福な"],a:0,ex:"he is still modest＝彼は今も謙虚だ。"},
{q:"「ダンベル」を表す英語は？",c:["dumbbell","barbell","bat","glove"],a:0,ex:"plastic dumbbells＝プラスチック製のダンベル。"},
{t:1,q:"タイピング：「筋肉」を英語で（m で始まる1語）",a:["muscle"],ex:"muscle。cは発音しない。"},
{t:1,q:"タイピング：「寄付する」を英語で（d で始まる1語）",a:["donate"],ex:"donate。名詞は donation。"},
{q:"professional の意味は？",c:["プロの","素人の","部分的な","昔の"],a:0,ex:"professional＝プロの。professional baseball player。"},
{q:"childhood の意味は？",c:["子ども時代","児童","幼稚園","若さ"],a:0,ex:"childhood＝子ども時代。His childhood dream（子どもの頃の夢）。"}]},
{id:"L3G",ls:"Lesson 3  One Small Goal at a Time",nm:"文法（to不定詞）",pts:["名詞的用法「〜すること」：want to 〜, decide to 〜","副詞的用法「〜するために」：I went there to see a game.","形容詞的用法「〜するための・〜する」：ability to hit balls","one of の後ろは複数名詞"],qs:[
{q:"I want （　） a job in the future.",c:["to get","get","getting","got"],a:0,ex:"want to+動詞の原形＝「〜したい」（名詞的用法）。"},
{q:"I went to a baseball stadium （　） a game.",c:["to see","see","saw","seen"],a:0,ex:"「試合を見るために」＝目的を表す副詞的用法。"},
{q:"His ability （　） balls amazes everyone.",c:["to hit","hit","hitting","hits"],a:0,ex:"ability to hit＝「打つ能力」。名詞を後ろから説明する形容詞的用法。"},
{q:"She decided （　） abroad.",c:["to study","study","studied","studies"],a:0,ex:"decide to+原形＝「〜することに決める」。"},
{q:"「彼は子どもたちを支援するために寄付をする」He donates money （　） children.",c:["to support","support","supported","to supporting"],a:0,ex:"目的（〜するために）＝to+動詞の原形。"},
{q:"I want something （　）. 「何か飲み物がほしい」",c:["to drink","drink","drank","drinking"],a:0,ex:"something to drink＝「飲むための何か」。形容詞的用法。"},
{q:"次のうち to不定詞の「名詞的用法」はどれ？",c:["To play baseball is fun.","I went home to sleep.","He has a lot of homework to do.","She ran fast to catch the bus."],a:0,ex:"To play baseball（野球をすること）が主語＝名詞の働き。"},
{q:"I will bring a special flag （　） my favorite team!",c:["to cheer on","cheer","cheered","to cheering"],a:0,ex:"「応援するために」＝副詞的用法。to+動詞の原形。"},
{t:1,q:"タイピング：「試合を見るために」to （　） a game（1語）",a:["see","watch"],ex:"to see（watch）a game。toの後ろは動詞の原形。"}]},

"make me sad／happy／angry／sleepy など、感情の形容詞は make とセットで例文ごと暗記すると、英作文でそのまま使えます。",],
L6R:[
"この財布実験は、スコットランドのエディンバラで実際に行われた心理学実験がもとになっています。「人の善意はどんなときに引き出されるか」を調べた有名な研究です。",
"返却率は赤ちゃん88%、子犬53%、家族48%、老夫婦28%。「赤ちゃんを守りたい」という本能的な感情が、見知らぬ人の財布を届けるという行動まで変える、と説明されています。",
"1枚ずつ包むと「開ける」というひと手間がブレーキになります。行動経済学では「摩擦（friction）」と呼ばれ、やめたい習慣にはわざと手間を増やすのが有効、という応用ができます。",
"包みがないと手が止まらず平均6日。「見えやすく、取りやすい物ほど消費が増える」——お菓子を棚の奥にしまう、スマホを別の部屋に置いて勉強する、など日常に応用できる原理です。",
"ダイエットには個包装が有利。逆に、続けたい習慣は手間を減らす——単語帳を机に開きっぱなしにする、アプリをホーム画面の1ページ目に置く、など「摩擦の逆利用」が勉強に効きます。",
"空腹時は脳が「カロリーを確保せよ」モードになり、判断が変わってしまいます。対策は、買い物リストを作る・食後に買い物に行くこと。",
"「人間の行動にはパターン（クセ）がある。それを知れば、意志力に頼らずに環境を整えて自分をコントロールできる」——これがこの課のメッセージです。",
"本文の助言は eat something before you enter a supermarket（スーパーに入る前に何か食べる）。知識がそのまま節約につながる、すぐ使える行動経済学です。"],
L7V:[
"whale＝クジラ。クジラの群れは a pod of whales。whale watching（ホエールウォッチング）は観光英語でも頻出。この課は2018年にタイで実際に起きた事件から始まります。",
"stomach の発音は「スタマック」で、ch は k の音。stomachache（腹痛）、on an empty stomach（空腹のままで）。綴りと音のギャップが狙われる単語です。",
"victim＝事故・災害・犯罪などの「犠牲者・被害者」。fall victim to 〜（〜の犠牲になる）。この課では海の生き物たち、そしてやがて人間も victim になると警告しています。",
"tragedy＝悲劇。ギリシャ悲劇が語源で、形容詞は tragic（悲劇的な）。反対語は comedy（喜劇）。シェイクスピアの四大悲劇も four great tragedies と言います。",
"occur は happen のかたい語。過去形・過去分詞は occurred と r を重ねる点がスペリング問題で頻出。It occurred to me that 〜（ふと〜と思いついた）という重要表現もあります。",
"con（完全に）+ sume（取る）＝consume（消費する・食べ尽くす）。consumer（消費者）、consumption（消費）。消費税は consumption tax です。",
"de（分離）+ compose（組み立てる）＝decompose（分解する・される）。compose は「作曲する・構成する」で、composer は作曲家。分解の逆は組み立て、と語源でつながっています。",
"3R＝reduce（減らす）・reuse（再利用する）・recycle（再資源化する）。優先順位もこの順番で、まず「減らす」が最重要とされています。名詞は reduction。",
"reuse はそのままもう一度使うこと、recycle は資源に戻して作り直すこと。リサイクルより前に「そのまま使い回す」方が環境負荷が小さい、という区別も覚えておきましょう。",
"float＝浮く。floating plastic（海に浮かぶプラスチック）。コーヒーフロートはアイスを「浮かべた」飲み物。反対語は sink（沈む）です。",
"victim の綴りは v-i-c-t-i-m。victory（勝利）と最初が似ているので注意。「勝者 victor と犠牲者 victim は紙一重」と覚えると忘れません。",
"reduce は re＋duce（導く）。produce（生産する）、introduce（紹介する）も同じ duce 仲間。語源で覚えると3語まとめて身につきます。"],
L7G:[
"関係副詞 where は「場所の先行詞＋where＋完全な文」。which との見分けは、後ろの文に主語や目的語の欠けがあるか：欠けあり→which、完全→where。これが最重要の判定法です。",
"先行詞が the place/town/country/city など場所なら where。前置詞＋which（in which など）に書き換え可能で、書き換え問題も定番です。",
"時を表す先行詞（the day/year/time）には when。The day will soon come when 〜 のように、先行詞と when が離れる形も長文でよく見ます。",
"the town where you were born（あなたが生まれた町）。born の後ろに欠けがない完全な文なので where。×the town which you were born（in がないと不可）。",
"関係代名詞 what は先行詞を自分の中に含み、「〜すること・もの」＝ the thing(s) which と書き換えられます。what we can do＝私たちにできること。",
"what 節は名詞のかたまりとして、主語・目的語・補語のどこにでも入れます。What he said is true.（彼の言ったことは本当だ）では主語の働きをしています。",
"live in the house の場合：the house which I lived in（in を残す）か the house where I lived（in 不要）の2通り。in があるかないかがwhere/whichの分かれ目です。",
"What she said（彼女が言ったこと）が文全体の主語。what 節が主語のとき、動詞は単数で受けます（What he said is...）。",
"where が正解。先行詞 the town（場所）＋ I was born（完全な文）。仕組みが分かれば機械的に解けるようになります。"],
L7R:[
"2018年6月、タイ南部で実際に起きた出来事。死んだゴンドウクジラの胃から80枚以上・約9kgのレジ袋が見つかり、世界中で報道されました。教科書はこのニュースから問題提起しています。",
"水中を漂うレジ袋は、ゆらゆら揺れる姿がクラゲにそっくり。クラゲを主食にするウミガメが誤って食べてしまう事故が後を絶ちません。mistake A for B（AをBと間違える）も重要熟語。",
"調査のために捕獲されたアオウミガメ（green sea turtles）の約75%の胃からプラスチックごみが見つかった、という衝撃的なデータです。",
"マイクロプラスチック＝5mm以下の微細なプラスチック片。波や紫外線で砕けてできます。小さすぎて回収がほぼ不可能な点が最大の問題で、食物連鎖を通じて人間にも戻ってきます。",
"年間約800万トン。「毎分ごみ収集車1台分のプラスチックが海に流れ込んでいる」という例えがよく使われます。2020年には3億トン以上のプラスチックが生産されました。",
"ペットボトルは分解に約400年かかるとされます。今日捨てたボトルは、22世紀どころか25世紀まで残る計算。「人間の一生より長く残る」のがプラスチック問題の本質です。",
"Boyan Slat（ボイヤン・スラット）は16歳のダイビング旅行で「魚よりレジ袋が多い」海を見たのをきっかけに、19歳で The Ocean Cleanup を創設（2013年）。若者が世界を動かした実例です。",
"サングラスは海から回収したプラスチック製で1本200ドル。売上が次の回収活動の資金になる循環モデルで、1本でサッカー場24面分の海域の浄化に貢献できます。"],
L8V:[
"cod＝タラ。タイトル Oh My Cod! は Oh My God!（なんてこった）のダジャレ。英語圏ではこうした語呂合わせ（pun）が新聞の見出しでも大人気です。",
"batter＝小麦粉・卵・水を混ぜた「衣」。野球の「打者」も batter で同綴り同音。butter（バター）と一字違いなので注意。fish coated in batter＝衣をまとった魚。",
"vinegar＝酢。vin はフランス語でワインの意味で、「酸っぱくなったワイン」が語源。イギリスではフィッシュ・アンド・チップスにモルトビネガー（麦芽酢）をかけるのが定番です。",
"nutritious＝栄養価の高い。nutrition（栄養）、nutrient（栄養素）。「安くて栄養がある」が産業革命期の労働者の食事の絶対条件でした。",
"separately＝別々に。separate の綴りは sep-A-rate（真ん中は a）が鉄則で、×seperate は英語圏の人も間違える有名なスペルミスです。",
"instant＝即座の。instant noodles（即席麺）、instant hit（たちまち大ヒット）。instantly（即座に）。インスタント食品のインスタントです。",
"serve＝（食事を）出す・仕える。名詞は service。レストランで Dinner is served.（お食事の用意ができました）。テニスのサーブも「相手に球を差し出す」イメージ。",
"ex（外へ）+ plore＝explore（探検する）。explorer（探検家）、exploration（探検）。宇宙開発の文章でも space exploration として頻出します。",
"fisherman＝漁師（fish＋er＋man）。複数形は fishermen。最近は性別を問わない fisher という言い方も使われます。",
"shore＝（海・湖の）岸。off the shore（沖合いで）、seashore（海辺）。「岸まで魚の背中を歩いて行ける」という有名な誇張表現で登場しました。",
"serve の綴りは s-e-r-v-e。serve（仕える）→ service（奉仕）→ servant（召使い）は同族語のセットです。",
"explore の綴りは ex-plore。explain（説明する）、export（輸出する）、express（表現する）など ex- で始まる動詞はまとめて覚えると効率的。"],
L8G:[
"分詞構文：〜ing で「…しながら・…して」。I waited for the bus, listening to music.＝音楽を聞きながらバスを待った。2つの文を1つにまとめる、書き言葉でよく使われる表現です。",
"分詞構文の基本の意味は「同時（〜しながら）」と「連続（〜して、それから）」。文頭・文中・文末のどこにでも置けます。長文では「コンマ＋〜ing」を見たら分詞構文を疑いましょう。",
"コンマ＋which/who は非制限用法といい、先行詞に「補足説明」を加えます。コンマなし（制限用法）は「他と区別する」働き。意味が変わるので、コンマの有無に注目する癖をつけましょう。",
"非制限用法（コンマ付き）で that は使えない——これは入試最頻出ルールのひとつ。先行詞が固有名詞（人名・地名）のときも必ずコンマ＋who/which を使います。",
"過去完了 had＋過去分詞は「過去のある時点よりさらに前」を表す「大過去」。by the end of 〜（〜の終わりまでには）のような期限の表現と相性抜群です。",
"過去完了は「過去の中の過去」。2つの過去の出来事の前後関係をはっきりさせるための時制で、基準となる過去の時点（when I arrived など）が文中にあるのが目印です。",
"「私が着いたとき（過去）、映画はすでに始まっていた（それより前）」→ had already started。already（すでに）、just（ちょうど）は過去完了とよくセットになります。",
"a sister の後にコンマ＋who。コンマなしだと「（何人かいる姉のうち）ロンドンに住んでいる姉」という意味になってしまいます。1人しかいない人・物にはコンマ付きを使います。",
"had が正解。「私たちが着いたときには、列車はすでに出てしまっていた」。残念な場面の定番表現で、英作文でもそのまま使えます。"],
L8R:[
"fish は白身魚（主にタラ）のフライ、chips はイギリス英語でフライドポテト。アメリカでは french fries と言い、イギリスで chips と言えばポテトチップスではない（チップスは crisps）——英米の違いの代表例です。",
"塩とモルトビネガー（麦芽酢）をかけるのが伝統。イギリスの店のテーブルには必ず酢のボトルが置いてあります。日本の「天ぷら＋天つゆ」と比べる本文の構成もポイント。",
"産業革命期、工場で長時間・低賃金で働く労働者には「安い・栄養がある・すぐ食べられる」食事が必要でした。社会の変化が新しい食文化を生んだ、という歴史の見方がこの課の核心です。",
"揚げ魚売りとフライドポテト売りはもともと別の商売。19世紀半ばに誰かが一緒に出したところ instant hit（即大ヒット）に。「組み合わせ」が発明になる好例です。",
"chippie はイギリスの親しみを込めた呼び名。20世紀初頭には英国のすべての町に店があり、ロンドンだけで約1,200軒。今もイギリスの国民食です。",
"昔は保温と安さのために古新聞に包んで売られていました。現在は衛生上の理由で印刷のない専用紙に変わりましたが、新聞風のデザイン紙を使う店も多く、伝統の名残です。",
"カナダ・ニューファンドランド島沖のグランドバンクスは世界最大級のタラ漁場でした。「魚の背中の上を歩いて岸まで行ける」は、当時の魚の多さを伝える有名な誇張表現です。",
"乱獲（overfishing）により20世紀末にタラ資源は崩壊し、カナダ政府は1992年にタラ漁を全面停止しました。数万人が職を失ったこの事件は「持続可能な漁業」を世界が考えるきっかけになりました。"],
L9V:[
"stare at 〜＝〜をじっと見つめる。look より強く、目を離さず見続ける感じ。star（星）と綴りが似ているので注意。観客がスクリーンを stare している場面で登場します。",
"venue＝大会・コンサートなどの「会場」。イベント関係の英語の必須語。avenue（大通り）と混同しないこと。",
"tournament＝トーナメント・大会。中世ヨーロッパの騎士の馬上試合が語源です。championship（選手権・優勝）、final（決勝）もセットで。",
"compete＝競争する（compete with/against 〜）。名詞 competition（競争・大会）、competitor（競争相手）、形容詞 competitive（競争の激しい）まで一族で覚えると強力です。",
"worldwide＝世界中で・世界的な。world＋wide。形容詞にも副詞にもなります。nationwide（全国的に）も同じ作り方です。",
"popularity＝人気（popular の名詞形）。population（人口）との混同がテストの超定番ひっかけ！「人気は popular＋ity、人口は population」と音で区別しましょう。",
"sharply＝急激に。increase sharply（急増する）、decrease sharply（急減する）。グラフ・統計の英文の必須表現で、ゆるやかな変化は gradually を使います。",
"scholarship＝奨学金（scholar 学者＋ship）。get/obtain/win a scholarship（奨学金を得る）。アメリカの大学スポーツでは奨学金が選手獲得の中心的な仕組みです。",
"obtain＝get のかたい語で、「努力して手に入れる」ニュアンス。obtain a scholarship／a visa／permission（許可）など、公的・正式なものによく使われます。",
"acknowledge＝（事実として）認める。ac＋knowledge（知識）で「知っていると認める」。本文では米国政府がeスポーツ選手をプロ選手と「認める」文脈で登場します。",
"concentration＝集中（力）。concentrate（集中する）＋ion。con（共に）＋ center（中心）＝中心に集める、が語源です。eスポーツに必要な能力として本文に登場。",
"obtain＝得る（get のかたい語）。ob＋tain（保つ）。maintain（維持する）、contain（含む）と同じ tain ファミリーです。"],
L9G:[
"知覚動詞（see/hear/feel/watch）＋O＋現在分詞＝「Oが〜している（最中の）のを見る・聞く」。crying なら泣いている途中の一場面を切り取ったニュアンスです。",
"知覚動詞＋O＋動詞の原形＝「Oが〜するのを最初から最後まで見る・聞く」。call（呼ぶのを一部始終聞いた）と calling（呼んでいるのが聞こえた）のニュアンス差が問われます。",
"知覚動詞の補語に to不定詞は使えません（×I saw her to cry）。ただし受け身にすると to が復活する（She was seen to cry.）——これは難関校向けの発展知識です。",
"let＋O＋動詞の原形＝「Oに（望み通り）〜させてあげる」。Let me try.（やらせて）、Let's go.（＝Let us go）など、会話の最頻出パターンの土台です。",
"make＋O＋原形＝「（強制的に）〜させる」。made us clean the room（私たちに掃除させた）。to を入れない（×made us to clean）のが最大の注意点です。",
"使役動詞の強さ：make（強制）＞ have（依頼・当然）＞ let（許可）。3つとも「＋O＋動詞の原形」の形は共通です。get だけは get＋O＋to不定詞になります。",
"ask＋人＋if/whether節＝「〜かどうか尋ねる」。間接疑問文の仲間で、if 節の中は普通の語順（S＋V）になります。",
"この if は「もし」ではなく「〜かどうか」＝ whether。know/wonder/ask とセットで使われたら「かどうか」と訳します。文頭の If（もし）との区別は動詞を見れば分かります。",
"make me laugh（私を笑わせる）。laugh は原形のまま。「この映画はいつも私を笑わせてくれる」は使役動詞の定番例文です。"],
L9R:[
"346チームが参加。全国高校eスポーツ選手権は2018年から実際に開催されている大会で、ロケットリーグや リーグ・オブ・レジェンドなどが競技種目になっています。",
"esports＝electronic sports（電子スポーツ）。e- は electronic の頭文字で、e-mail（電子メール）と同じ作りの造語。2000年頃から世界に広まった比較的新しい言葉です。",
"世界のeスポーツプレイヤーは1億3000万人以上。これは多くの伝統的スポーツの競技人口を上回る規模です。",
"観戦者は約5億3000万人。「プレイする人」だけでなく「観る人」が億単位でいることが、eスポーツが「スポーツ」と呼ばれる大きな根拠になっています。",
"IOC（国際オリンピック委員会）は東京五輪直前の2021年に初のeスポーツイベント（Olympic Virtual Series）を開催。オリンピックとeスポーツの距離は年々縮まっています。",
"本文が挙げた3つの利点：①体力に関係なく楽しめる（regardless of body strength）②チームワークの価値を学べる③世界中の人と交流できる。「体力が向上する」とは書かれていない——内容一致問題の典型的なひっかけです。",
"アメリカは2013年からプロゲーマーに「アスリートビザ」を発給しています。政府が公式に「選手」と認めた象徴的な出来事として本文で紹介されています。",
"in spite of its popularity（人気にもかかわらず）日本の高校のeスポーツ部はまだ少ない、というのが本文の指摘。賛成・反対の両論を扱う「議論型」の課なので、意見と根拠の対応を整理して読むのがコツです。"],
L10V:[
"creator＝創作する人（create＋or）。日本語の「クリエイター」はこの語。the creator of this artwork（この作品の作者）。",
"attention＝注目・注意。pay attention to 〜（〜に注意を払う）が最重要熟語。attract wide public attention（広く世間の注目を集める）は篠原さんの歌手時代の描写で登場します。",
"curved＝曲線の（curve 曲線＋d）。carved（彫られた）と一字違いで意味がまったく異なるので、綴り問題で狙われます。着物の曲線的なデザインを指して使われました。",
"sustainability＝持続可能性。L5で学んだ sustainable の名詞形です。大量生産・大量廃棄が問題のファッション業界では、今いちばん熱いキーワードになっています。",
"awareness＝意識・気づき（aware 気づいている＋ness）。raise awareness（意識を高める）は、環境・社会問題の英文に必ずと言っていいほど出てくる決まり文句です。",
"scrap＝端切れ・くず。scraps of leather（革の端切れ）。スクラップブックは「切り抜き帳」、廃車は scrap car。捨てられるものに新しい価値を見出すのが彼女の作品です。",
"leather＝革。feather（羽）、weather（天気）と綴り・音が似た仲間。leather goods（革製品）、leather jacket（革ジャン）。",
"overpopulation＝over（過剰）＋population（個体数・人口）。エゾシカの「増えすぎ」問題を指します。人間の人口過剰問題にも使われる、地理でも頻出の語です。",
"detour＝回り道（de 離れて＋tour 回る）。take a detour（回り道をする）。本文では「人生の回り道」という比喩で使われ、この課のキーワードになっています。",
"contribute to 〜＝〜に貢献する。名詞は contribution（貢献）。Designing is a way for me to contribute to the world. が本文の締めくくりの一文です。",
"leather の綴りは l-e-a-t-h-e-r。ea を含む仲間：weather, feather, healthy。まとめて音読すると定着します。",
"detour は de-tour と分解。tour（ツアー・回ること）が入っていると覚えれば忘れません。"],
L10G:[
"I wish＋仮定法過去＝「（現実には無理だけど）〜ならいいのに」。助動詞は could/would を使います。願望と現実のギャップを表す、ため息まじりの表現です。",
"wish の後ろが過去形でも「過去の話」ではありません。I wish I had more time.（もっと時間があればなあ）＝今の話。過去形は「現実からの距離」を表す記号だと考えましょう。",
"仮定法過去の be動詞は、主語が I でも he でも were が原則（口語では was も使われます）。If I were you,（私があなたなら）は丸ごと覚える鉄板フレーズ。",
"直説法 If it rains tomorrow（実際に起こりうる条件）と仮定法 If I were rich（現実に反する仮定）の区別が最大のポイント。動詞の形（現在形か過去形か）で見分けます。",
"帰結節（主節）は would/could/might＋動詞の原形。「If＋過去形, S＋would＋原形」をひとつの型として体に入れてしまうのが近道です。",
"without 〜＝「〜がなければ」で、if 節の代わりになります。Without detours, I wouldn't be designing now.（回り道がなかったら、今デザインをしていないでしょう）が本文の実例。",
"without 〜 ＝ if it were not for 〜 ＝ but for 〜。この3つの書き換えはテストの定番セットです。",
"I wish he were my friend. が正解。仮定法なので were。「実際には友達ではない」という現実が裏に隠れています。",
"If I were you, I would 〜（私があなたなら〜するのに）はアドバイスの定型表現。会話・英作文の両方で使える万能フレーズです。"],
L10R:[
"篠原ともえさんは歌手・タレント出身のデザイナー。2022年、エゾシカ革の端切れで作った服が、ニューヨークADC賞という国際的なデザイン賞を受賞しました。",
"受賞作は「着物の意匠×エゾシカ革×水墨画の山々」という日本の3要素のミックス。日本文化の「無駄を出さない美学」を現代のデザインで世界に発信した作品です。",
"着物は1枚の長い布（反物）を直線的に裁って作るため、端切れがほとんど出ません。この「無駄のなさ」が世界のサステナブルファッションの先駆けとして注目されています。",
"エゾシカは天敵のオオカミがいなくなって増えすぎ、森林や農作物に深刻な被害を与えています。駆除された後、皮の多くは捨てられていた——その「もったいない」が作品の出発点です。",
"1995年、高校生のときに歌手デビュー。カラフルな手作り衣装と明るいキャラクターで「シノラー」ブームを巻き起こし、テレビで大人気になりました。",
"2019年、40歳で大学に入り直してデザインを学び直しました。社会人の「学び直し（リカレント教育）」の実例として描かれています。",
"It's all right to take detours now and then. Without them, I wouldn't be designing now.——歌手・タレント時代という「回り道」の経験すべてが今のデザインに生きている、という人生観です。",
"タイトルの It is never too late to learn and relearn.＝「学ぶこと・学び直すことに遅すぎることはない」。never too late to do は英作文でも使える名構文です。"]

GEO01:[
"緯線は赤道に平行な横の線。緯度が高いほど気温が低くなる傾向があり、気候の学習でも緯度は基本のものさしになります。",
"グリニッジ天文台は19世紀に世界の時刻の基準とされた場所。世界標準時（GMT）という言葉もここから来ています。",
"東経180度と西経180度は同じ線で、ほぼこの線に沿って日付変更線が引かれています。線を西から東へ越えると日付を1日戻します。",
"地球は24時間で1回転（360度）するので、360÷24＝15度で1時間。東にある地域ほど時刻が進んでいます。",
"東経135度×（1時間／15度）＝9時間。日本はロンドンより9時間進んでいる、という時差計算の基本になります。",
"地軸が傾いたまま太陽の周りを公転するため、太陽の高さと昼の長さが変化し、季節が生まれます。傾きがなければ季節はありません。",
"白夜は北極圏（北緯66.6度以北）・南極圏で見られます。66.6度＝90度−23.4度。地軸の傾きとつながった数字です。",
"クリスマスが真夏になるオーストラリアが有名な例。南半球の雨温図を見分けるポイント（気温の山が1月）にも直結します。",
"15度で1時間。たとえば経度差45度なら時差3時間。試験では「2都市の経度差÷15」の計算がよく出ます。",
"明石市を通る東経135度。「日本標準時子午線のまち」として時計のモニュメントがあります。"],
GEO02:[
"地球儀だけがひずみゼロ。でも持ち歩けず一目で全体を見られないため、目的に応じて図法を使い分けるのが地図の知恵です。",
"メルカトル図法では経線に対して常に同じ角度で進む航路（等角航路）が直線になるため、羅針盤の時代の航海に最適でした。",
"グリーンランドは実際にはアフリカ大陸の約14分の1なのに、メルカトル図法ではほぼ同じ大きさに見えます。面積比較には使えません。",
"正距方位図法で正しいのは「中心からの」距離と方位だけ。中心以外の2点間は正しくない点がテストで狙われます。",
"2地点間の最短経路（大圏航路）が直線で表せるので、飛行機のルート図に使われます。東京からの最短方向が一目で分かります。",
"モルワイデ図法は楕円形の正積図法。面積が正しいので「どこに多いか」を比べる主題図に向いています。",
"人口分布・植生・宗教分布など、量や広がりを比べる地図は面積が正しくないと誤解を生むため、正積図法を使います。",
"国連旗は北極中心の正距方位図法にオリーブの枝を添えたデザイン。平和の象徴とセットで覚えましょう。",
"地球儀は「正しいが不便」、地図は「便利だがひずむ」。この対比がこの単元の核心です。",
"メルカトルは16世紀フランドル（今のベルギー）の地図学者の名前です。"],
GEO03:[
"国土地理院は測量と地図作成を担う国の機関。地形図のほか、地理院地図（ウェブ）も公開しています。",
"実際の距離＝地図上の長さ×縮尺の分母。単位をcm→m→kmに直すのを忘れずに（100,000cm＝1km）。",
"等高線は標高を読むだけでなく、土地の形（尾根・谷）を読み取る手がかりにもなります。",
"等高線が密＝急斜面、疎＝緩やか。等高線が高い方へ食い込む所が谷、低い方へ張り出す所が尾根です。",
"「文」は小・中学校、丸囲みの「文」は高等学校。似た記号の区別は定期テストの定番です。",
"卍は寺院、鳥居の形は神社。実物の形に由来する記号は意味とセットで覚えると忘れません。",
"田＝切り株、畑＝種から出た双葉、果樹園＝果実の形、針葉樹林＝マツの形。由来を知ると一気に覚えられます。",
"縮尺は分数で考える：1/25,000は1/50,000より大きい→より詳しい地図。「大縮尺＝詳しい」と覚えましょう。",
"2cm×50,000＝100,000cm＝1km。縮尺が変わっても計算手順は同じです。",
"等高線の間隔と傾斜の関係は、ハザードマップ（土砂災害の危険箇所）を読むときにも役立つ実用知識です。"],
GEO04:[
"GISは「地図のデータベース」。行政・防災・物流・出店計画など社会のあらゆる場面で使われています。",
"レイヤー構造のおかげで「人口×標高×浸水想定」のように情報を組み合わせた分析ができます。これがGIS最大の強みです。",
"GNSSは総称、GPSはアメリカのシステムの固有名。日本のみちびき、EUのGalileo、ロシアのGLONASSなどがあります。",
"GPS＝Global Positioning System。スマホの位置情報もGNSSの電波を受信して計算しています。",
"みちびきは日本のほぼ真上（準天頂）を通る軌道をもち、ビルの谷間でも測位しやすくする日本の衛星システムです。",
"地理院地図では標高の色分け、昔の空中写真、災害情報なども無料で重ねられます。自由研究やレポートの強い味方。",
"ハザードマップは「災害想定×地形×避難所」をGISで重ねて作られています。自分の家の周りを見ておきましょう。",
"位置を知る（GNSS）→地図と重ねて考える（GIS）。カーナビはこの2つの技術の合わせ技です。",
"Geographic Information System の頭文字。日本語では地理情報システムと訳されます。",
"Global Navigation Satellite System の頭文字。衛星測位システムの世界共通の総称です。"],
GEO05:[

"EEZ＝Exclusive Economic Zone（排他的経済水域）。漁業資源や海底資源の権利が沿岸国に属します。"],
GEO06:[

"明石市＝東経135度＝日本標準時。GEO01の時差の学習ともつながります。"],
GEO07:[

GEO08:[

"digital divide。divide は「分断する」という意味の英単語です。"],
GEO09:[

GEO10:[

GEO11:[

const LSLS=Object.keys(LSW);
const LSMODES=[["w","単語"],["i","熟語"],["g","文法"]];
let lsQueue=[], lsQi=0, lsPlaying=false, lsSession=0, lsWake=null, lsVoices=[];
function lsGuard(){ if(!S.listen) S.listen={mode:"w",lessons:["Lesson 1"],pat:"EJE",rate:1.0,gap:1.2,shuffle:false,loop:true,skipKnown:false,known:{},pos:0}; }
function lsLoadVoices(){ try{ lsVoices=speechSynthesis.getVoices(); }catch(e){} }
if(typeof speechSynthesis!=="undefined"){ lsLoadVoices(); speechSynthesis.onvoiceschanged=lsLoadVoices; }
function lsPick(lang,prefs){ const vs=lsVoices.filter(v=>v.lang&&v.lang.toLowerCase().startsWith(lang));
  for(const p of prefs){ const v=vs.find(x=>x.name.includes(p)); if(v) return v; } return vs[0]||null; }
function lsSpeak(text,lang){ return new Promise(res=>{ try{
  const u=new SpeechSynthesisUtterance(text);
  u.lang=lang==="en"?"en-US":"ja-JP";
  const v=lang==="en"?lsPick("en",["Samantha","Karen","Daniel","Alex"]):lsPick("ja",["Kyoko","Otoya","O-Ren"]);
  if(v) u.voice=v;
  u.rate=S.listen.rate; u.onend=res; u.onerror=res;
  speechSynthesis.speak(u); }catch(e){ res(); } }); }
const lsWait=(s)=>new Promise(r=>setTimeout(r,s*1000));
function lsKey(it){ return S.listen.mode+"|"+it.en; }
function lsBuild(){ lsGuard();
  const src=S.listen.mode==="w"?LSW:(S.listen.mode==="i"?LSI:LSGR);
  let items=[];
  for(const ls of LSLS){ if(!S.listen.lessons.includes(ls)) continue;
    for(const e of (src[ls]||[])){
      if(S.listen.mode==="g") items.push({ls,en:e[0],ja:"",pairs:e[1],gram:true});
      else items.push({ls,en:e[0],ja:e[1],ex:e[2]||null,exJa:e[3]||null});
    } }
  if(S.listen.skipKnown) items=items.filter(it=>!S.listen.known[lsKey(it)]);
  if(S.listen.shuffle) items=shuffle(items);
  lsQueue=items; if(lsQi>=lsQueue.length) lsQi=0;
}
function lsEl(id){ return document.getElementById(id); }
function lsSetNow(en,ja){ const a=lsEl("lsEn"),b=lsEl("lsJa"); if(a)a.textContent=en; if(b)b.textContent=ja; }
function lsStatTxt(t){ const e=lsEl("lsStat"); if(e)e.textContent=t; }
function lsCntTxt(){ const e=lsEl("lsCnt"); if(e)e.textContent=lsQueue.length?`${lsQi+1} / ${lsQueue.length}`:""; }
async function lsPlayItem(it,sid){ const g=S.listen.gap, pat=S.listen.pat;
  if(it.gram){
    lsSetNow(it.en,"（文法ポイント）");
    await lsSpeak(it.en,"ja"); if(sid!==lsSession)return; await lsWait(g*0.6);
    for(const pr of it.pairs){ if(sid!==lsSession)return;
      lsSetNow(pr[0],pr[1]);
      await lsSpeak(pr[0],"en"); if(sid!==lsSession)return; await lsWait(g);
      await lsSpeak(pr[1],"ja"); if(sid!==lsSession)return; await lsWait(g);
      if(pat==="EJE"){ await lsSpeak(pr[0],"en"); if(sid!==lsSession)return; await lsWait(g*0.7); } }
    return; }
  if(pat==="JE"){
    lsSetNow("？？？",it.ja);
    await lsSpeak(it.ja,"ja"); if(sid!==lsSession)return;
    await lsWait(Math.max(g,1.5)); if(sid!==lsSession)return;
    lsSetNow(it.en,it.ja);
    await lsSpeak(it.en,"en"); if(sid!==lsSession)return; await lsWait(g*0.5);
    await lsSpeak(it.en,"en");
  } else {
    lsSetNow(it.en,"…");
    await lsSpeak(it.en,"en"); if(sid!==lsSession)return; await lsWait(g);
    lsSetNow(it.en,it.ja);
    await lsSpeak(it.ja,"ja"); if(sid!==lsSession)return;
    if(pat==="EJE"){ await lsWait(g*0.5); await lsSpeak(it.en,"en"); }
  }
  if(sid!==lsSession)return;
  if(it.ex){ await lsWait(g*0.7); if(sid!==lsSession)return;
    lsSetNow(it.en,it.ja+"\n📖 "+it.ex);
    await lsSpeak(it.ex,"en"); if(sid!==lsSession)return; await lsWait(g*0.7);
    if(it.exJa){ await lsSpeak(it.exJa,"ja"); } }
}
async function lsLoop(){ const sid=lsSession;
  while(lsPlaying&&sid===lsSession){
    if(!lsQueue.length){ lsStop(); lsSetNow("項目がありません","レッスンを選んでください"); return; }
    if(lsQi>=lsQueue.length){ if(S.listen.loop){ lsQi=0; lsBuild(); } else { lsStop(); lsSetNow("おしまい！","おつかれさま 🎉"); return; } }
    lsCntTxt();
    await lsPlayItem(lsQueue[lsQi],sid);
    if(sid!==lsSession) return;
    await lsWait(S.listen.gap*0.8);
    if(sid!==lsSession) return;
    lsQi++; S.listen.pos=lsQi; save();
  } }
async function lsToggle(){ lsGuard();

function lsPeek(){ if(lsQueue[lsQi]){ const it=lsQueue[lsQi]; lsSetNow(it.en,it.gram?"（文法ポイント）":it.ja); lsCntTxt(); } }
function lsNext(){ if(!lsQueue.length) lsBuild();

function lsPrev(){ lsQi=Math.max(0,lsQi-1); S.listen.pos=lsQi; save();

function lsMark(){ if(!lsQueue[lsQi]) return; const k=lsKey(lsQueue[lsQi]);

function lsTg(k){ lsGuard(); S.listen[k]=!S.listen[k]; save(); lsBuild(); render(); }
function lsSetPat(v){ lsGuard(); S.listen.pat=v; save(); }
function lsSetNum(k,v){ lsGuard(); S.listen[k]=parseFloat(v); save(); }
function lsSetMode(m){ lsStop(); lsGuard(); S.listen.mode=m; S.listen.pos=0; lsQi=0; save(); lsBuild(); render(); }

async function ghApi(path,opt={}){ const r=await fetch("https://api.github.com"+path,Object.assign({},opt,{
  headers:Object.assign({"Authorization":"Bearer "+SY.token,"Accept":"application/vnd.github+json"},opt.headers||{})}));
  if(r.status===401) throw new Error("トークンが無効です（期限切れ・コピーミスの可能性）");

async function syncConnect(){ const inp=document.getElementById("syncToken"); const tk=(inp?inp.value:"").trim();

    else{
      const r2=await ghApi("/gists",{method:"POST",body:JSON.stringify({description:"tomoki-study-sync",public:false,
        files:{"study-data.json":{content:JSON.stringify(S)}}})});

async function syncPull(manual){ if(!SY.token||!SY.gistId) return;
  if(syncBusy) return; syncBusy=true;
  try{
    const r=await ghApi("/gists/"+SY.gistId); const j=await r.json();
    const f=j.files&&j.files["study-data.json"];
    if(f&&f.content){ const remote=JSON.parse(f.content);
      if(remote&&remote.settings){ mergeStates(remote);
        localStorage.setItem(KEY,JSON.stringify(S));

        render(); } }

}
async function syncPush(){ if(!SY.token||!SY.gistId) return;

function syncOff(){ if(confirm("この端末の同期設定を解除しますか？（記録は消えません）")){ SY={}; saveSY(); render(); } }
function mergeStates(remote){
  const newerRemote=(remote.savedAt||0)>(S.savedAt||0);
  const base=newerRemote?remote:S, other=newerRemote?S:remote;
  const m=JSON.parse(JSON.stringify(base));
  m.logs=m.logs||{}; const oLogs=other.logs||{};
  for(const d in oLogs){ const b=oLogs[d];
    if(!m.logs[d]){ m.logs[d]=b; continue; }
    const a=m.logs[d];
    a.min=Math.max(a.min||0,b.min||0);
    a.target=a.target||b.target||null;
    if(!a.note&&b.note) a.note=b.note;
    a.ranges=a.ranges||{}; for(const k in (b.ranges||{})) a.ranges[k]=Math.max(a.ranges[k]||0,b.ranges[k]);
    a.routines=a.routines||{}; for(const k in (b.routines||{})) a.routines[k]=Math.max(a.routines[k]||0,b.routines[k]); }
  m.learn=m.learn||{}; const oL=other.learn||{};
  for(const k in oL){ const b=oL[k]; const a=m.learn[k]||(m.learn[k]={});
    a.cleared=a.cleared||b.cleared; if(!a.date&&b.date)a.date=b.date;
    a.tries=Math.max(a.tries||0,b.tries||0); a.best=Math.max(a.best||0,b.best||0); }
  m.mistakes=m.mistakes||{}; const oM=other.mistakes||{};
  for(const k in oM){ const b=oM[k];
    if(!m.mistakes[k]) m.mistakes[k]=b;
    else{ const a=m.mistakes[k]; a.n=Math.max(a.n||0,b.n||0); if((b.d||"")>(a.d||""))a.d=b.d; } }
  m.weeks=m.weeks||{}; const oW=other.weeks||{};
  for(const k in oW){ const a=m.weeks[k]||(m.weeks[k]={}); if(oW[k]&&oW[k].paid) a.paid=true; }
  if(other.listen||m.listen){ m.listen=m.listen||other.listen;
    if(other.listen) m.listen.known=Object.assign({},other.listen.known||{},m.listen.known||{}); }
  S=m;
}

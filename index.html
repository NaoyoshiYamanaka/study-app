"ODAには返済不要の無償資金協力と、低利で貸す円借款があります。インドの高速鉄道は円借款の代表例です。",
"ODA・NGO・PKO・JICAと略称が多い単元。日本語名（政府開発援助・非政府組織・平和維持活動）と結びつけて整理しましょう。"],
GEO40:[
"4プレートの名前は太平洋・フィリピン海（海のプレート）と北アメリカ・ユーラシア（陸のプレート）。海のプレートが沈み込む境界に海溝ができます。",
"山がちな国土のため平野の人口密度は極めて高く、災害の被害も平野に集中します。「狭い平野にみんなが住む」が日本の災害リスクの根本です。",
"フォッサマグナの西縁が糸魚川・静岡構造線。これを境に東日本と西日本で地質が大きく異なります。",
"信濃川でも長さは367km。アマゾン川の約6500kmと比べると桁違いです。「川というより滝だ」と外国人技師が驚いたという逸話もあります。",
"扇状地（山のふもと・水はけがよい→果樹園）、三角州（河口・低くて水が豊富→水田や市街地）。地形と土地利用はセットで出題されます。",
"冬の日本海側の豪雪は、暖流の対馬海流の上を冷たい季節風が渡るため。世界的にも有数の豪雪地帯です。",
"梅雨は暖かい空気と冷たい空気のぶつかる前線が停滞する現象。沖縄は5月、本州は6月に入ります。北海道には明瞭な梅雨がありません。",
"台風は最大風速約17m/s以上の熱帯低気圧。暖かい海から水蒸気の供給を受けて発達します。温暖化で強い台風が増えると予測されています。",
"東京の平均気温はこの100年で約3度上昇。地球温暖化＋ヒートアイランドの二重の影響です。打ち水や屋上緑化が対策の例。",
"フォッサマグナはナウマン（ナウマンゾウの名の由来の学者）が発見しました。"],
GEO41:[
"マグニチュードが1増えるとエネルギーは約32倍、2増えると約1000倍。M9はM7の地震1000個分のエネルギーです。",
"震度は観測点ごとに違います。「震源に近い・地盤が軟らかい」ほど大きくなりがち。同じ地震でも場所により震度3と6強が共存します。",
"海溝型は数十年〜百数十年の周期で繰り返します。プレートのひずみが限界に達して跳ね返るイメージです。",
"活断層は全国に約2000。熊本地震（2016）も活断層型でした。自分の街の近くの活断層を調べておくことも防災です。",
"東日本大震災の津波は最大遡上高40m超。「想定外」を教訓に、防災は「最大クラス」を想定する方針に変わりました。",
"阪神・淡路では古い木造住宅の倒壊が犠牲の主因に。これを機に耐震基準の徹底とボランティア活動が広がり、1995年は「ボランティア元年」と呼ばれます。",
"液状化は2011年の浦安市（東京ディズニーランド周辺）でも発生。埋立地・旧河道・干拓地が要注意です。",
"津波は水深が深いほど速く（ジェット機並み）、岸に近づくと遅くなる分高くなります。第1波より第2波以降が高いことも。",
"「ここより下に家を建てるな」と刻んだ岩手県の石碑に従った集落は、東日本大震災の津波被害を免れました。先人の知恵の実例です。",
"震度（揺れ）とマグニチュード（規模）の混同は定期テストの引っかけの定番。「M」は地震に1つ、震度は場所ごと、と覚えましょう。"],
GEO42:[
"活火山＝おおむね1万年以内に噴火した火山など。世界の活火山の約1割が日本に集中しています。",
"地熱発電は大分県の八丁原発電所が日本最大。温泉・地熱・観光と、火山は地域経済を支える資源でもあります。",
"火砕流は時速100km以上・数百度にもなり、走って逃げることは不可能。雲仙普賢岳では報道関係者を含む43人が犠牲になりました。",
"御嶽山（長野・岐阜県境、3067m）は水蒸気噴火で予知が困難でした。以後、噴火警戒レベルや登山届の運用が強化されました。",
"有珠山は「噴火の前に必ず前兆地震がある」ことが知られ、観測体制も整っていました。科学的観測＋ハザードマップ＋住民の意識の勝利です。",
"克灰袋＝「灰に勝つ」と書く鹿児島市の専用袋。集められた灰は埋立てなどに使われます。学校にも降灰対策があります。",
"阿蘇カルデラは東西約17km・南北約25kmで約5万人が暮らします。約9万年前の巨大噴火は九州の広範囲を火砕流が覆いました。",
"シラスは保水性が低く、大雨でがけ崩れを起こしやすい地層。一方で水はけのよさを生かし、さつまいもや茶の栽培がさかんです。",
"粘り気の強いマグマ（雲仙・昭和新山）はドーム状の山と爆発的噴火、弱いマグマ（ハワイ・三原山）は盾状の山と穏やかな溶岩流。対で覚えましょう。",
"カルデラに水がたまるとカルデラ湖（洞爺湖・十和田湖など）。温泉観光地になっている例が多いです。"],
GEO43:[
"外水＝川の水、内水＝市街地に降った雨水。ハザードマップでも「洪水（外水）」と「内水」は別の地図になっていることがあります。",
"内水氾濫は地下街やアンダーパス（線路の下の道路）が特に危険。短時間豪雨では川から離れた場所でも浸水します。",
"2018年台風21号では高潮で関西国際空港の滑走路が水没。伊勢湾台風（1959）の高潮では5000人以上が犠牲になりました。",
"線状降水帯は次々に積乱雲が同じ場所を通過する「バックビルディング現象」で発生。気象庁が発生予測情報を出すようになりました。",
"土石流＝水と土砂が一気に流れ下る、がけ崩れ＝急斜面が崩落、地すべり＝斜面がゆっくり滑る。速さと規模で区別します。",
"砂防ダムは水は通しつつ土砂や流木をためる構造。鋼鉄の格子状のものもあります。普通のダム（貯水用）との違いに注意。",
"首都圏外郭放水路（埼玉県）は「防災地下神殿」と呼ばれる世界最大級の地下放水路。見学もできます。",
"消雪パイプは新潟県長岡市が発祥とされます。地下水の使いすぎによる地盤沈下が課題になった地域もあります。",
"国土地理院の「治水地形分類図」を見ると、旧河道や自然堤防が分かります。西日本豪雨（2018）の倉敷市真備町では、浸水域がハザードマップとほぼ一致しました。",
"「数十年に一度」の大雨警報が毎年のように出る時代に。温暖化で大気中の水蒸気が増え、豪雨が強まる傾向が指摘されています。"],
GEO44:[
"ハードには限界がある（想定を超える災害）ため、ソフト対策との両輪が現代防災の基本です。東日本大震災で防潮堤を越えた津波がその教訓です。",
"ハザードマップは市町村が配布し、ネットの「ハザードマップポータルサイト」でも見られます。家族で避難場所を確認しておきましょう。",
"自助の基本は水・食料3日分（できれば1週間）の備蓄、家具の固定、非常用持ち出し袋。寝室に倒れる家具を置かないことも大切です。",
"阪神・淡路では生き埋めになった人の約8割が家族や近所の人に救出されました。日頃の地域のつながりが防災力そのものです。",
"緊急地震速報はP波（速い・小さい揺れ）とS波（遅い・大きい揺れ）の速度差を利用。震源が近いと間に合わないこともあります。",
"南海トラフ地震は今後30年以内の発生確率が高いとされ、最大でM9クラス・死者想定は東日本大震災を大きく上回ります。高知県などに津波避難タワーが並びます。",
"「津波てんでんこ」＝それぞれが自分の判断ですぐ逃げろ、という三陸の言い伝え。釜石の小中学生の避難（釜石の出来事）で注目されました。",
"よい問いの例：「なぜ駅前の商店街はシャッター街になったのか」。よくない例：「商店街について」。疑問詞のある問いが調査を導きます。",
"e-Statは国勢調査などの統計、地理院地図は新旧の地形・空中写真・標高が見られます。RESASという地域経済分析サイトもあります。",
"フィールドワークの心得：事前にアポイント、メモと写真（撮影許可を確認）、聞き取りはお礼を忘れずに。安全第一で行動します。"],
HIS01:[
"江戸〜伊勢は片道約2週間。「一生に一度はお伊勢参り」といわれ、集団で参詣するおかげ参りが約60年周期で大流行しました。",
"関所は治安維持のための検問所。「入り鉄砲に出女」（江戸への武器搬入と大名の妻の逃亡）がとくに警戒されました。",
"スエズ運河はフランス人レセップスが建設。ジュール・ヴェルヌの小説『八十日間世界一周』（1873年）はこの時代の交通革命が題材です。",
"ライト兄弟は自転車屋の兄弟。最初の飛行はわずか12秒・36mでしたが、約60年後には人類は月を目指すようになります。",
"2022年のロシアによるウクライナ侵攻ではシベリア上空の飛行が制限され、ヨーロッパ便の所要時間が延びました。旅は今も国際情勢に左右されます。",
"歴史学では資料を「史料」と書きます。文字資料だけでなく、絵画・写真・建物・出土品、そして口伝えの記憶も史料になります。",
"大日本帝国憲法は天皇が国民に与える形式（欽定憲法）で発布されました。2月11日は現在「建国記念の日」です。",
"ベルツの日記は明治日本を知る貴重な史料。「日本人は憲法の中身より祝賀のお祭りに夢中だ」という冷静な観察眼が光ります。",
"同じ憲法発布でも、祝う新聞、批判する社会主義者、皮肉る外国人と評価はさまざま。中江兆民は「通読一遍ただ苦笑するのみ」と評しました。",
"通行手形は身分証明書 兼 通行許可証。旅の理由（湯治・参詣など）も書かれました。現代のパスポートの祖先といえます。"],
HIS02:[
"1830年のリヴァプール・マンチェスター鉄道が世界初の本格的な営業鉄道。開業式で人身事故が起きたことでも知られます。",
"1846〜1924年に約5000万人がヨーロッパから新大陸へ移住したと推計されます。人類史上最大級の人の移動でした。",
"アメリカでは1882年に中国人排斥法が制定され、1924年の移民法では日本人の移民も事実上禁止されました。",
"1850年頃、寺子屋は江戸に1500余り、全国には1万5000ほどあったといわれます。様々な年齢の子どもがそれぞれ先生から学ぶ寺子屋の教育が、明治の近代化の土台になりました。",
"明治の学制（1872年）は「邑に不学の戸なく家に不学の人なからしめん」を掲げました。授業料負担が重く、就学率が9割を超えるのは1900年代です。",
"日本の工場法は1911年制定・1916年施行。12歳未満の就業禁止、女性・年少者の12時間労働制限など、内容はまだ限定的でした。",
"ノーフォーク農法は「かぶ→大麦→クローバー→小麦」の4年輪作。飼料が増えて家畜が増え、肥料も増える好循環を生みました。",
"人権宣言第1条「人は生まれながらに自由で平等な権利をもつ」。アメリカ独立宣言とともに近代民主主義の出発点です。",
"グージュは「女性が処刑台に上る権利があるなら、演壇に上る権利もあるはずだ」と主張し、革命の混乱の中で処刑されました。",
"福沢諭吉は「一身独立して一国独立す」と説き、学ぶことが個人と国の独立につながると主張しました。慶應義塾の創設者です。"],
HIS03:[
"清は満洲人（女真族）の王朝。康熙帝・雍正帝・乾隆帝の3代約130年が全盛期で、現在の中国の領土の原型ができました。",
"「湖広熟すれば天下足る」＝長江中流域が新たな米どころに。下流の江南は商品作物に特化する地域分業が成立しました。",
"山西商人は金融業（票号）でも有名。会館・公所は同郷者の宿泊・取引・互助の拠点で、現代の商工会議所のような役割でした。",
"広州での貿易は公行（こうこう）という特許商人組合が独占管理。この不自由さへの不満が、のちのイギリスの開戦口実になります。",
"世界の銀の多くが中国に吸い込まれた時代。納税の銀納化（地丁銀制）も進み、銀は中国経済の血液になりました。",
"清の人口は18世紀の100年間で約1.5億→3億に倍増。新作物に加え、平和の持続と税制改革が背景です。",
"海禁は明代から続く政策。清は1684年に台湾の鄭氏政権を平定した後に緩和し、海関（税関）を置いて貿易を管理しました。",
"シノワズリの代表がマイセンなどの磁器。ヨーロッパは中国磁器を再現しようと研究を重ね、それが西洋磁器産業を生みました。",
"イギリスの紅茶文化は中国茶の輸入から始まりました。茶代金の銀流出問題が、やがてアヘン戦争につながっていきます。",
"広州の貿易は「カントン・システム」とも呼ばれます。Canton＝広州の英語名です。"],
HIS04:[
"幕藩体制では藩が地方行政を担い、参勤交代で大名は江戸と国元を往復。街道と宿場町の発達も促しました。",
"天皇が将軍を任命する形式は、幕末に「大政奉還」で実権が天皇に返されるしくみの伏線になります。",
"村請制では村役人（名主・庄屋）が徴税実務を担当。幕府は個々の百姓を直接把握せず、村の自治に依存していました。",
"大坂には全国の米相場を決める堂島米市場があり、世界初の先物取引市場ともいわれます。",
"蔵物は年貢米など藩の公的な荷、納屋物は民間商人の荷。蔵屋敷には蔵元・掛屋という商人が出入りしました。",
"西廻り海運（日本海→下関→瀬戸内海→大坂）は17世紀後半に河村瑞賢が整備したとされます。北前船は寄港地で商品を売買しながら航海し、大きな利益を上げました。長崎からは俵物（いりこ・ふかひれ・干し鮑）が中国へ輸出されました。",
"江戸は「将軍のお膝元」で人口100万の巨大消費都市、大坂は「天下の台所」、京都は文化と高級手工業の都でした。",
"吉宗は紀州徳川家出身。年貢の決め方を検見法（毎年の作柄調査）から定免法（過去の平均基準）に改め、新田開発で増産をめざし、株仲間の公認で営業税も徴収しました。米価安定に苦心し「米将軍」とも呼ばれます。",
"豊かになった百姓は地主に、土地を失った百姓は小作人や出稼ぎに。この分化が幕末の社会変動の土壌になります。",
"「天下の台所」の物流を支えたのが菱垣廻船・樽廻船。樽廻船は酒荷を速く運ぶ専用船でした。"],
HIS05:[
"ヴァスコ・ダ・ガマが1498年にインドに到達。胡椒は当時「黒い黄金」と呼ばれるほど高価でした。",
"オランダ東インド会社（VOC）は世界初の株式会社ともいわれます。アジア各地に商館を置き、日本では出島に置かれました。",
"ポトシ銀山（現ボリビア）と石見銀山が世界の銀生産の二大中心。17世紀の世界で流通した銀の相当部分が日本産でした。",
"「鎖国」という言葉は後世のもので、実際は4つの窓口で世界とつながっていました。教科書ではこの点が強調されています。",
"オランダ風説書は幕府だけが読める海外ニュース。アヘン戦争の情報もこれで幕府に届き、対外政策に影響しました。",
"朝鮮通信使は一行300〜500人の大使節団で、幕府や諸藩は莫大な費用をかけて迎えました。沿道では文化交流がさかんで、学者や絵師がサインを求められるほどの人気でした。",
"琉球は中国皇帝の冊封を受けつつ薩摩に年貢を納める「両属」。この曖昧な地位が、明治の琉球処分まで続きます。",
"シャクシャインの戦いはアイヌ最大の蜂起。敗北後、交易レートは和人有利に固定され、場所請負制で経済的支配が進みました。",
"蝦夷錦は清の官服がアムール川流域→サハリン→蝦夷地と渡ったもの。「鎖国」日本の外に広大な交易圏があった証拠です。",
"出島は扇形の人工島で約1.5ヘクタール。オランダ商館員は原則ここから出られず、年1回の江戸参府が例外でした。"],
HIS06:[
"キャラコ禁止法（1722年）を破って着た人には罰金20ポンド。それでも着たいほどの人気が、国産化への巨大な動機になりました。",
"インド綿布は軽くて洗えて染めやすい。毛織物中心だったヨーロッパの衣生活を一変させた「ファストファッション」でした。",
"輸入代替工業化はのちの日本（幕末〜明治）や戦後の途上国も歩んだ道。歴史総合では「比較」の視点で出題されます。",
"ワットはグラスゴー大学の器具職人。蒸気機関の効率を劇的に高め、仕事率の単位「ワット（W）」に名を残しました。",
"技術革新の連鎖：飛び杼（織りが速く）→糸不足→紡績機の発明（ジェニー・水力・ミュール）→糸余り→力織機。需要と供給の追いかけっこです。",
"イギリスは1851年に世界初の万国博覧会をロンドンで開催。ガラス張りの水晶宮で「世界の工場」の力を誇示しました。",
"ラダイト運動（機械打ちこわし）は1810年代に頻発。機械に仕事を奪われる不安は、AI時代の現代にも通じるテーマです。",
"エンゲルスは父の工場で働きながら労働者の悲惨さを記録し、マルクスと『共産党宣言』（1848年）を発表しました。",
"インドの手織り職人は壊滅的打撃を受け、「インドの平原は織工の骨で白くなった」と報告されました。自由貿易の影の面です。",
"第2次産業革命の主役は鉄鋼・化学・電機。クルップ（独）やスタンダード石油（米）などの巨大企業が生まれました。"],
HIS07:[
"ロコモーション号は時速約20km。「人間は時速30kmを超えると呼吸できなくなる」と本気で心配されていた時代でした。",
"フルトンの蒸気船は当初「フルトンの愚行」と笑われました。蒸気軍艦はやがて黒船として日本の歴史を動かします。",
"スエズ運河開通と同じ1869年にアメリカ大陸横断鉄道も完成。世界一周の所要時間が一気に縮んだ年です。",
"アイルランドは人口の約2割を失いました。移民の子孫にはケネディ家など。聖パトリックデーは移民が広めた祭りです。",
"クリミア戦争はナイチンゲールの活躍でも有名。電信で戦況が新聞に載る「報道される戦争」の始まりでもありました。",
"ロシアを横断しウラジオストクから海底ケーブルで長崎へ。鎖国が終わってわずか十数年で、日本は世界の情報網に組み込まれました。",
"「オール・レッド・ライン」は有事に他国に切断されない通信網という軍事的意味も持ちました。現代の海底光ファイバーの祖先です。",
"19世紀の世界の一体化は「ヒト・モノ・カネ・情報」の4点セットで整理しましょう。グローバル化の第1波と呼ばれます。",
"世界初の旅行代理店はトマス・クック社（1841年創業）。禁酒運動の集会への団体列車手配が始まりでした。",
"スエズ運河は2021年にコンテナ船座礁で封鎖され世界物流が大混乱。150年前の運河が今も世界経済の急所です。"],
HIS08:[
"アヘンは麻薬。清では吸引が広がり社会問題化していました。「麻薬を売る権利」のための戦争は当時のイギリス議会でも批判されました（開戦動議は僅差で可決）。",
"林則徐は没収したアヘン約1400トンを海岸で廃棄処分。中国では今も民族の英雄とされています。",
"南京条約で割譲された香港島は、その後155年間イギリス領であり続け、1997年に中国へ返還されました。",
"領事裁判権＝外国人の犯罪を本国の領事が裁く（治外法権）。関税自主権の喪失＝輸入品に自由に関税をかけられない。この2つが不平等の核心です。",
"太平天国は「滅満興漢」を掲げ、一時は南京を首都に。鎮圧の過程で曽国藩・李鴻章ら漢人官僚が力をつけ、清末の政治を動かします。",
"ペリーは琉球と小笠原にも寄港してから浦賀へ。蒸気船2隻を含む艦隊の煙は「泰平の眠りを覚ます上喜撰」と狂歌に詠まれました。",
"日米和親条約の下田・箱館は補給港。本格的な貿易は1858年の修好通商条約からで、ハリス総領事が交渉しました。",
"条約改正は明治政府の最大の外交課題となり、領事裁判権撤廃は1894年（陸奥宗光）、関税自主権回復は1911年（小村寿太郎）までかかりました。",
"生糸輸出は横浜港から。ヨーロッパで蚕の微粒子病が流行し日本の生糸・蚕卵紙の需要が急増しました。のちの富岡製糸場につながります。",
"モネは着物姿の夫人を描き（ラ・ジャポネーズ）、ゴッホは広重を模写。浮世絵は陶磁器の包み紙として渡欧したという逸話もあります。"],
HIS09:[
"北部は小麦・製鉄・造船、南部はタバコ・米・藍のプランテーション。この南北の産業の違いが、約80年後の南北戦争の伏線になります。",
"課税強化への抗議の合言葉は「代表なくして課税なし」。本国議会に議席がないのに課税されるのは不当だ、という主張です。",
"ワシントンは大統領を2期8年で自ら退き、権力に固執しない伝統をつくりました。首都ワシントンD.C.に名を残します。",
"7月4日の独立記念日は花火でお祝いします。ちなみに独立宣言の年1776年は、日本では江戸時代の田沼意次の時代です。",
"「生命・自由・幸福の追求」はジョン・ロックの思想（生命・自由・財産）がもとになっています。政府を変える権利（革命権）も明記されました。",
"フランスが植民地側を支援したのはイギリスへの対抗心から。しかしこの戦費がフランスの財政を悪化させ、皮肉にもフランス革命の一因になります。",
"合衆国憲法には矛盾もありました。下院の議席配分で奴隷を「自由人の5分の3」と数える条項があり、奴隷制を事実上容認していたのです。",
"市民革命の「市民」は都市住民の意味ではなく、自由で平等な社会の担い手のこと。教科書はアメリカ独立を「1つの市民革命」と位置づけています。",
"環大西洋革命という見方をすると、それぞれの革命がバラバラの事件ではなく、人や思想が大西洋を行き交って連鎖したことがわかります。",
"ジェファソンは独立宣言起草時33歳。のちに第3代大統領としてフランスからルイジアナを買収し、領土を倍増させました。"],
HIS10:[
"第一身分・第二身分あわせて約50万人に対し、第三身分は約2750万人。少数の特権層を多数が支える「旧体制（アンシャン・レジーム）」でした。",
"三部会は身分ごとに1票の議決方式。人数で勝る第三身分が「個人ごとの票決」を求めて対立し、国民議会の結成につながりました。",
"バスティーユは政治犯を収容した牢獄で、圧政の象徴でした。7月14日は今もフランスの国民的祝日（パリ祭）です。",
"人権宣言の正式名は「人間および市民の権利の宣言」。第1条「人は、自由、かつ、権利において平等なものとして生まれ、生存する」は必ず覚えましょう。",
"ルイ16世はギロチンで処刑されました。王妃マリー・アントワネットも同年に処刑されています。",
"ロベスピエールは弁護士出身。1793年憲法は社会権まで保障する先進的なものでしたが、施行されないまま終わりました。",
"ナポレオンはコルシカ島出身の砲兵士官から皇帝まで上りつめました。「余の辞書に不可能の文字はない」の言葉でも有名です。",
"民法典の一方で「妻は夫に服従する義務を負う」(213条)という規定も。革命の理念にも当時の限界があったことを資料から読み取らせる問いが出ます。",
"ワーテルローの戦い（1815年）に敗れ、南大西洋の孤島セントヘレナに流されて生涯を終えました。",
"バスティーユ襲撃の報を聞いた国王が「反乱か」と問うと、側近は「いいえ陛下、革命です」と答えたと伝えられます。"],
HIS11:[
"ハイチは砂糖プランテーションで「カリブの真珠」と呼ばれた最重要植民地でした。独立は1804年。奴隷制社会を根底からくつがえした事件です。",
"トゥサンの活動を受け、国民公会は1794年に植民地の奴隷制廃止を宣言しました（のちナポレオンが復活させ、ハイチは武力で独立を勝ち取ります）。",
"植民地社会の序列：ペニンスラール（本国生まれ白人）→クリオーリョ→メスティーソ（白人と先住民の混血）→ムラート（白人と黒人の混血）→先住民・黒人。",
"ボリバルは「解放者」と呼ばれ、ベネズエラ・コロンビア・エクアドル・ペルー・ボリビアの独立に関わりました。",
"ナポレオンが兄をスペイン王に据えたことで本国の権威が崩壊。植民地のクリオーリョたちは「王不在」を機に自立へ動きました。",
"モンロー宣言は「アメリカ大陸はヨーロッパの植民の対象ではない」という孤立主義の伝統をつくり、以後約1世紀の米外交の基本になりました。",
"単一の産品の輸出に頼る経済を「モノカルチャー経済」といいます。地理で学んだ概念が歴史にもつながります。",
"ボリバル自身も「白人こそが知的資質を備えている」と書いており（ジャマイカ書簡）、独立の理想と人種観の限界が資料問題で問われます。",
"自由民権運動の植木枝盛らはフランスの人権思想を学び、主権在民・抵抗権を含む憲法私案を起草しました。",
"モンロー宣言を出した1823年は、日本ではシーボルトが長崎に来た年。世界史と日本史の年代を結びつけると覚えやすいです。"],
HIS12:[
"国民国家は「つくられる」もの。生まれつき「フランス人」がいるのではなく、学校・軍隊・新聞などが国民意識を育てたという見方が歴史総合の核心です。",
"フランス革命期、フランス語を話せる住民は実は少数派でした。国民公会は「方言の根絶とフランス語の普及」を国民統合の課題としたのです。",
"フィヒテは占領下のベルリンで「ドイツ国民に告ぐ」を講演。まだ「ドイツ国」が存在しない時代に、教育による国民の創出を説きました。",
"『最後の授業』は感動的な愛国の物語ですが、アルザス住民の母語はドイツ語系のアルザス語。「国語」が後からつくられる例として教科書は批判的に読ませます。",
"「諸国民の春」はフランス以外では鎮圧されましたが、農奴解放（オーストリア）や憲法への要求など、その後の改革の種をまきました。",
"イタリア統一の立役者は国王ヴィットーリオ・エマヌエーレ2世、首相カヴール、千人隊を率いて南部を征服し国王に献上したガリバルディです。",
"プロイセンの首相ビスマルクは「鉄血政策」で統一を推進。デンマーク戦争→普墺戦争→普仏戦争の3連勝で統一を完成させました。",
"敵国の宮殿での皇帝即位はフランス人の屈辱となり、のちの第一次世界大戦後、同じヴェルサイユ宮殿で対独講和条約が結ばれる伏線になります。",
"農奴解放は「上からの改革」。土地は有償譲渡だったため農民の負担は重く、ロシアの近代化は不徹底に終わりました。",
"オーストリアは1867年、ハンガリーに自治権を与えてオーストリア＝ハンガリー帝国に再編。多民族国家の苦肉の策でした。"],
HIS13:[
"オスマン帝国は様々な民族・言語・宗教の人々のゆるやかな統治で栄えた帝国。19世紀に「ヨーロッパの病人」と呼ばれる衰退期に入ります。",
"ミドハト憲法は「オスマン国籍を有する者はすべて宗教宗派を問わずオスマン人」と定めました。1889年の英タイムズ紙は日本の憲法とこの試みを比較しています。",
"タバコ・ボイコットでは宗教指導者が喫煙禁止令を出し、国民全体がタバコを拒否。利権は撤回されました。非暴力の抵抗運動の先駆けです。",
"オスマン帝国の改革（タンジマート）→ミドハト憲法、イランの立憲革命、日本の明治維新。アジア各地の近代化の試みを比較するのが歴史総合の定番です。",
"「明白なる運命（マニフェスト・デスティニー）」＝西部への拡大は神に定められた使命だという考え。絵画『アメリカの進歩』に象徴されています。",
"チェロキー族などが移住させられた行路は「涙の道」と呼ばれます。ジャクソン大統領の教書は「親切」を装いつつ強制移住を正当化しました。",
"北部=工業・保護貿易・連邦主義・共和党、南部=プランテーション・自由貿易・州権主義・民主党。対比表は定期テストの頻出ポイントです。",
"リンカンはケンタッキー州の貧農出身。当初は連邦維持を優先し奴隷解放に消極的でしたが、内外情勢を判断して宣言に踏み切り、終戦直後に暗殺されました。",
"憲法修正13条（1865）で奴隷制廃止、15条（1870）で投票権の人種差別禁止。しかし南部では投票場で黒人を脅すなど、実態の差別は続きました。",
"ミドハト＝パシャは改革派の宰相。憲法停止後は流刑となり、その地で暗殺されました。"],
HIS14:[
"明治維新は革命？改革？英語ではMeiji Restoration（復古）と訳されますが、教科書は「立憲国家へと変わった一連の変革」と幅広くとらえています。",
"幕府が「天皇の勅許なし」で調印したことが正統性の傷になりました。これ以降「天皇の意思」が政治の切り札になっていきます。",
"桜田門外の変（1860年）。大老が白昼に暗殺された衝撃は大きく、幕府の権威は急速に衰えました。",
"尊王攘夷の中心は長州藩や水戸藩の志士たち。イギリス公使館の襲撃（東禅寺事件）など外国人襲撃事件が相次ぎました。",
"下関戦争（1864年）で長州は攘夷の不可能を悟り、むしろ西洋式軍備の導入へ転換。高杉晋作や伊藤博文ら若手が藩を動かしました。",
"犬猿の仲だった薩長を結びつけたのは土佐藩の坂本龍馬らの仲介とされます（1866年）。教科書本文は「薩摩藩は長州藩との同盟に転換（薩長同盟）」と記します。",
"大政奉還は土佐藩の進言を受けた慶喜の起死回生の一手。政権を返しても、実力で新政権の主導権を握れると考えていました。",
"小御所会議では山内容堂（前土佐藩主）が慶喜擁護を主張し、岩倉具視と激しく争いました。教科書の絵画『王政復古』はこの場面です。",
"鳥羽・伏見の戦い→江戸無血開城→奥羽越列藩同盟→会津戦争→五稜郭開城（1869年5月）。約1年半の内戦でした。",
"「大政」は天下の政治の意。政権を朝廷に「奉り還す」という言葉に、王政復古の理屈が表れています。"],
HIS15:[
"第一条は原案「万機公論に決し私に論ずるなかれ」→「列侯会議ヲ興シ」→「広ク会議ヲ興シ」と修正されました。「列侯（大名）」から「広く」への変化が重要ポイントです。",
"版籍の「版」は土地（版図）、「籍」は人民（戸籍）。旧藩主がそのまま知藩事に任命されたため、実質は変わりませんでした。",
"廃藩置県は武力を背景にした一大改革でしたが、藩の借金を国が引き受けたこともあり、大きな抵抗なく実現しました。",
"1881年の統計では士族は戸数の5.6%なのに官職保有者の40.7%を占めました。一方、旧大垣藩士族は半数が無職という調査もあります。",
"徴兵令には「血税」という言葉が使われ、誤解から血税一揆（徴兵令反対一揆）も起こりました。",
"秩禄処分で支給された金禄公債は、下級士族には生活に不十分。慣れない商売に手を出して失敗する「士族の商法」という言葉も生まれました。",
"西南戦争の総大将は西郷隆盛。徴兵された平民中心の政府軍が士族の軍に勝ったことは、新しい時代の到来を象徴しました。",
"年貢は収穫量に応じて変動しましたが、地租は地価基準の定額金納。政府の収入は安定し、豊凶のリスクは農民が負うことになりました。",
"小作農は収穫の半分前後を小作料として地主に納めました。この地主制は第二次世界大戦後の農地改革まで続きます。",
"県の数は廃藩置県直後は3府302県。統廃合を重ねて現在の47都道府県の原型ができました。"],
HIS16:[
"板垣退助は征韓論争に敗れて下野した元参議。「板垣死すとも自由は死せず」の言葉（岐阜事件）でも有名です。",
"国会開設の勅諭と同じ1881年、開拓使官有物払下げ事件への批判で大隈重信が政府を追われました（明治十四年の政変）。",
"伊藤がプロイセン流を選んだのは、君主権の強い憲法が日本の国情に合うと考えたから。ウィーンの学者シュタインらに学びました。",
"伊藤博文自身が「憲法政治といえば即ち君主権制限の意義なること明らかなり」と枢密院で述べています。天皇大権を定めつつ、憲法で権力を制限する立憲主義の考えです。",
"天皇は陸海軍の統帥権（第11条）ももちました。この規定がのちの軍部独走の根拠とされていきます。",
"「臣民」は天皇の臣下としての国民の意。権利が「法律ノ範囲内」だったため、治安警察法などの法律で自由を制限できました。",
"有権者約45万人＝全人口の1.1%。選挙では候補者名に加え自分の住所氏名も書く記名投票で、ビゴーの風刺画に描かれています。",
"大隈重信は早稲田大学の創設者。この内閣は憲政党の内紛でわずか4カ月で崩壊しましたが、政党内閣の先例になりました。",
"太陽暦採用で明治5年12月3日が明治6年1月1日に。1日24時間・週7日制もこのとき定着しました。ザンギリ頭・牛鍋・ガス灯が文明開化の象徴です。",
"教育勅語は1948年に国会で失効が確認されました。国定教科書制度も戦後に検定制へ変わっています。"],
HIS17:[
"安政の五カ国条約で日本は自由貿易の国際経済に組み込まれました。ただし外国人の活動は居留地に限定され、内地雑居は認められませんでした。",
"官営模範工場の代表が富岡製糸場（1872年・群馬県）。フランスの技術を導入し、士族の子女らが工女として働きました。2014年に世界遺産登録。",
"払い下げ先の例：三池炭鉱→三井、長崎造船所→三菱、富岡製糸場→三井。優良鉱山の払い下げが政商の成長の起点になりました。",
"松方デフレで米や繭の価格が下落し、自作農が土地を失って小作農になる動きが加速。困窮した農民が自由民権運動の激化事件に加わることもありました。",
"日本銀行設立までは153行の国立銀行が紙幣を乱発していました。「国立」という名前ですがアメリカのナショナル・バンクにならった民間銀行です。",
"金本位制は「一流国の証明」。通貨の対外信用が高まり外資導入に有利になりました。採用資金には日清戦争の賠償金が使われました。",
"新貨条例で両・分・朱から円・銭・厘へ。1円＝100銭＝1000厘です。「円」の誕生はこの1871年でした。",
"イギリス製綿布に対抗できたのは、輸入綿糸を使って農村の織機で織る在来の綿織物業が生き残ったから。「在来産業の対応力」は歴史総合らしい論点です。",
"幕末の豪農・豪商が明治の銀行家・株主になりました。渋沢栄一の第一国立銀行設立にも多くの豪商が出資しています。",
"松方正義は薩摩出身で首相も2度務めました。「緊縮財政→デフレ→産業の淘汰と再編」という流れは現代経済の理解にも役立ちます。"],
HIS18:[
"企業勃興は鉄道ブームでもありました。日本鉄道会社（1881年設立）は上野〜青森間を開業し、民営鉄道が官営の営業距離を上回った時期もあります。",
"紡績＝綿花→綿糸（原料は植物）、製糸＝繭→生糸（原料は動物）。漢字も意味も似ているので混同注意。テストの引っかけ定番です。",
"大阪紡績は1万500錘と当時の10倍の規模。電灯を使った昼夜2交代制で機械を止めない経営が成功の秘密でした。",
"日清戦争後は中国・朝鮮市場へ綿糸を輸出。「眠れる獅子」清との戦争が日本の紡績業の市場を広げたという経済面も押さえましょう。",
"綿花はインド・中国・アメリカからの輸入に依存。紡績機械もイギリス製でした。だから綿業が伸びるほど輸入も増える構造だったのです。",
"製糸業は原料（国産の繭）も器械（国産の改良器械）も国内調達。だから輸出代金がまるごと外貨獲得になりました。",
"アメリカでは絹靴下などの需要が拡大。「シルクはジャパン」の時代で、生糸輸出は昭和初期まで日本経済を支え続けました。",
"政商の代表が三井（三池炭鉱）と三菱（長崎造船所・高島炭鉱）。岩崎弥太郎が創業した三菱は海運業から多角化しました。",
"財閥は持株会社を頂点に金融・商社・鉱工業を束ねる企業グループ。第二次世界大戦後にGHQによって解体されます。",
"渋沢栄一は2024年から新1万円札の肖像になりました。『論語と算盤』で道徳と経済の両立を説いたことでも有名です。"],
HIS19:[
"帝国主義の英語はインペリアリズム。語源はラテン語のインペリウム（命令権・支配権）です。レーニンは資本主義の最高段階と分析しました。",
"会議の結果「実効支配した国が領有できる」原則が確立し、アフリカ分割が加速。現在のアフリカの国境線が直線的なのはこの分割の名残です。",
"フランス元首相フェリーは「優等人種は劣等人種を文明化する義務がある」と演説しました。現代の人権感覚から資料を批判的に読む問題が出ます。",
"ローズの名は南部アフリカの「ローデシア」（現ジンバブエなど）に残りました。カイロとケープタウンを結ぶ縦断政策の象徴です。",
"イギリスはアフガニスタンを2度攻めて1880年に保護国化。インドを守るための緩衝地帯でした。この地域の地政学は現代まで続くテーマです。",
"スエズ運河株の買収を即決したのはディズレーリ首相。議会の承認を待たずユダヤ系財閥ロスチャイルドから資金を借りた逸話が有名です。",
"反乱のきっかけは、牛と豚の脂を塗ったとうわさされた新式銃の薬包。ヒンドゥー教徒にもムスリムにも宗教的な侮辱だったのです。",
"ムガル帝国は約330年続いたイスラーム王朝。最後の皇帝は反乱の指導者にかつがれ、ビルマに流刑となりました。",
"強制栽培制度はオランダ本国の財政を大いに潤しました。耕地の5分の1・地租免除・政府への引き渡しという資料の数字が問われます。",
"タイが独立を保てたのは英領ビルマと仏領インドシナの緩衝地帯だったことと、チュラロンコン王の巧みな近代化・外交のおかげです。"],
HIS20:[
"使節団には大久保利通・木戸孝允・伊藤博文ら政府首脳が参加し、約1年10カ月の欧米視察に。津田梅子ら女子留学生も同行しました。",
"日露和親条約（1855）では択捉島以南が日本領、樺太は雑居地でした。雑居地での争いが多発したため交換条約で国境を確定させたのです。",
"日清修好条規は対等、日朝修好条規は日本に有利な不平等条約。日本は欧米から受けた不平等を朝鮮に課す側になった、という構図が問われます。",
"江華島はソウルへの入り口にあたる要地。日本の軍艦雲揚号が朝鮮側の砲撃を誘発したとされ、ペリーの砲艦外交との類似が指摘されます。",
"「自主の邦」という規定は、朝鮮への清の宗主権を否定して日本の影響力を広げるねらいがありました。森有礼と李鴻章の論争はこの問題が主題です。",
"台湾出兵は明治政府初の海外派兵。清が事実上の賠償金を払ったことを、日本は琉球領有の根拠としました。",
"琉球は約450年続いた王国でした。最後の国王尚泰は東京移住を命じられ、華族に列せられました。",
"開拓使がおかれ屯田兵が入植。アイヌの人口割合は1873年の9.7%から1913年には1.0%へ。1899年の北海道旧土人保護法は同化政策の側面をもちました。",
"尖閣諸島は1895年1月、竹島は1905年1月に、他国の占領の形跡がないことを確認のうえ日本領に編入されました（教科書の地図の注記より）。",
"「処分」という言葉には、一方的に処理するという当時の政府の姿勢が表れています。琉球側の視点でも考えてみましょう。"],
HIS21:[
"壬午（じんご）・甲申（こうしん）・甲午（こうご）は干支による年の呼び方。1882・1884・1894年と2年・10年刻みで整理しましょう。",
"金玉均は日本に亡命しましたが、のちに上海で暗殺されました。開化派の悲劇は朝鮮近代化の困難を象徴しています。",
"天津条約の「事前通告」条項が、1894年に両国がそろって出兵する根拠となり、皮肉にも日清戦争への道を開きました。",
"甲午農民戦争は東学という民間宗教の信徒を中心とした農民反乱。減税と排日を求めました。",
"下関の料亭・春帆楼が会場でした。講和中に李鴻章が狙撃される事件も起き、日本は賠償額の減額に応じました。",
"賠償金2億両は当時の日本の国家予算の約3倍。その多くが軍備拡張に、一部が八幡製鉄所の建設や金本位制の準備に使われました。",
"三国干渉後、「臥薪嘗胆」を合言葉に対ロシア戦争への備えが進みました。返還した遼東半島をロシアが租借した時の日本の反発は想像に難くありません。",
"領事裁判権撤廃は陸奥宗光外相（1894）、関税自主権回復は小村寿太郎外相（1911）。「陸奥→小村」の順で覚えましょう。",
"山県有朋の「主権線・利益線」論は、朝鮮半島を日本の安全保障の生命線とみなす考え方で、その後の大陸政策を方向づけました。",
"日清戦争の勝利で日本は東アジアの国際秩序を一変させました。冊封・朝貢体制の終わりです。"],
HIS22:[
"租借とは期限つきで領土を借りること。実質は割譲に近く、旅順・大連（関東州）はのちに日本が引き継ぎます。",
"アメリカは国務長官ジョン・ヘイの名で門戸開放・機会均等・領土保全を宣言。出遅れた国の論理でしたが、のちの対日政策の原則になります。",
"戊戌の変法はわずか100日余りで挫折（百日維新）。西太后ら保守派のクーデタで光緒帝は幽閉され、康有為は日本に亡命しました。",
"義和団のビラには「鉄道をはじくり返し、電線をぶった切り」とあります。鉄道や電信は民衆の目に侵略の象徴と映ったのです。",
"ロシアの満洲占領は日英米の共通の脅威でした。日英同盟の背景には「光栄ある孤立」を捨てたイギリスの対ロシア戦略があります。",
"開戦前には日露協商論（満韓交換論）も模索されました。「戦争は不可避だったのか」を問うのが歴史総合らしい視点です。",
"日本海海戦では東郷平八郎率いる連合艦隊がバルチック艦隊を撃破。しかし国力は限界で、ロシアでも1905年革命が起きていました。",
"賠償金ゼロに国民は激怒し、日比谷焼き打ち事件がおこりました。増税に耐えた国民の不満が爆発したのです。",
"伊藤博文が初代統監。1909年に安重根に暗殺され、翌年併合へ。韓国では義兵運動が続き、武力で鎮圧されました。",
"ポーツマスはアメリカ東部の軍港都市。仲介したセオドア・ローズヴェルト大統領はこの功績でノーベル平和賞を受けました。"],
HIS23:[
"ファン・ボイ・チャウが主導したドンズー運動では200人以上のベトナム青年が日本に留学。しかし日仏協約により日本政府は彼らを国外退去させました。",
"科挙廃止で伝統的な立身出世の道が消え、若いエリートは新式軍隊や海外留学に向かいました。それが革命の担い手を生んだのは歴史の皮肉です。",
"清からの日本留学生は最盛期に8000人以上。魯迅や蔣介石も日本留学組です。「中国の近代化を日本が媒介した」時代でした。",
"中国同盟会の機関誌は『民報』。東京が革命運動の拠点だったという事実は、当時の日中関係の複雑さを物語ります。",
"三民主義: 民族主義（満洲人の王朝打倒と諸民族の独立）・民権主義（共和政の樹立）・民生主義（土地問題の解決）。",
"武昌蜂起は1911年10月10日。「双十節」として台湾では今も祝日です。革命派が浸透していた新式軍隊が主役でした。",
"アジア初の共和国の誕生です。ただし孫文は武昌蜂起をアメリカで新聞報道により知ったという逸話があります。",
"溥儀はわずか6歳で退位。のちに日本がつくる満洲国の皇帝に擁立され、映画『ラストエンペラー』の主人公にもなりました。",
"袁世凱はのちに帝政復活を企てて失敗。彼の死後、中国は軍閥が割拠する分裂状態に陥ります。",
"孫文は「革命いまだ成らず」の言葉を残して1925年に死去。中国では「国父」として今も尊敬されています。"],
HIS24:[
"総力戦では兵士だけでなく、銃後の市民・工場・食料・宣伝まで戦争に動員されます。だから戦後、協力した人々（労働者・女性）の発言力が増したのです。",
"教科書の表では、女性参政権の実現はフランス1848年に男性、女性は1944年。日本は男性1925年・女性1945年。戦争と参政権の関係を読み取らせる資料です。",
"電話交換手の主な学歴は尋常小学校卒（1925年に女性87%）、タイピストは高等女学校卒。学歴によって就ける職業が分かれていました。",
"ラジオは1932年に聴取料が月75銭に値下げ。満洲事変や甲子園野球の中継が普及を後押ししました。",
"『キング』は「日本一面白い、日本一為になる」が宣伝文句。講談社の創業者・野間清治が国民雑誌をめざしました。",
"委任統治の規約第22条は「文明の神聖な使命」と表現しています。1960年の国連宣言と読み比べ、植民地観の変化を考えるのが教科書の問いです。",
"国際連盟の原加盟国は42カ国、国連は2011年に193カ国に。増えた分の多くがアジア・アフリカの旧植民地です。",
"宣言は「すべての人民は自決の権利をもつ」と明記。植民地主義を「基本的人権の否認」と断じました。",
"コカ・コーラや百貨店の広告、ヒトラーが宣伝したフォルクスワーゲン（国民車）まで、大衆の時代は良くも悪くも「大衆を動かす技術」の時代でした。",
"第II部の問いは「国際秩序の変化」と「大衆化」。これから学ぶ第3・4章をつらぬく2本の軸です。"],
HIS25:[
"ドイツの皇帝ヴィルヘルム2世は世界政策を進め、3B政策（ベルリン・ビザンティウム・バグダード）でイギリスの3C政策と衝突しました。",
"バルカンでは2度のバルカン戦争（1912-13）が大戦の前夜となりました。風刺画では煮立つ大鍋を5カ国がふたで押さえています。",
"暗殺者は19歳の青年プリンツィプ。1発の銃弾が4年間で1000万人以上の戦死者を生む大戦の引き金になりました。",
"塹壕戦の象徴がソンムの戦い（1916年）。初日だけでイギリス軍に約6万人の死傷者が出ました。戦車はこの膠着を破るために開発されました。",
"日本は欧州に主力を送らず、青島（チンタオ）のドイツ軍を攻撃。「大戦景気」で空前の好況となり、債務国から債権国に転じました。",
"二十一カ条のうち、日本人顧問の採用を求めた第5号は撤回されました。中国では受諾日が「国恥記念日」とされ、反日感情の原点になりました。",
"決定打はツィンメルマン電報。ドイツがメキシコと日本に対米同盟を持ちかけた秘密電報が暴露され、米世論が沸騰しました。",
"十四カ条の民族自決は東ヨーロッパには適用されましたが、アジア・アフリカの植民地には適用されず、各地の失望と抵抗を生みました。",
"成立したヴァイマル共和国の憲法は、社会権を保障する当時最も民主的な憲法とされました。しかし共和国の前途は多難でした。",
"大戦中に流行したスペイン風邪の死者は世界で数千万人。戦死者を上回りました。感染症と人の移動の関係はコロナ禍にも通じます。"],
HIS26:[
"二月革命・十月革命の名はロシア旧暦によるもの。新暦では3月と11月です。",
"レーニンの帰国には、敵国ドイツが手を貸しました（封印列車）。ロシアを戦線離脱させる狙いで、実際にその通りになりました。",
"憲法制定会議の選挙ではエスエル（社会革命党）が第一党に。ボリシェヴィキは武力で議会を解散し、一党独裁（プロレタリア独裁）を敷きました。",
"「平和に関する布告」と同時に「土地に関する布告」も発布。地主の土地を没収し、土地の私的所有を廃止しました。",
"コミンテルンを恐れた各国は、対抗策として労働問題の国際的調整を行うILO（国際労働機関）を設立しました。アメとムチの関係です。",
"シベリア出兵を見越した米騒動（1918年）が日本中に広がり、寺内内閣が倒れて原敬の本格的政党内閣が生まれました。日本史との接点です。",
"ソ連の正式承認は各国とも遅く、日本は1925年の日ソ基本条約で国交を樹立しました。",
"ネップ（NEP）はNew Economic Policyの略。社会主義の理想と現実の妥協でした。",
"スターリンの「一国社会主義論」と、世界革命を唱えるトロツキーの路線対立。敗れたトロツキーは国外追放され、亡命先のメキシコで暗殺されました。",
"教科書は「指導者を抑制する仕組みがなかった」ことを独裁の原因として強調しています。権力分立の大切さを歴史から学ぶ視点です。"],
HIS27:[
"アメリカの参戦前の軍隊は約20万人→参戦後約480万人。戦場にならなかった本土の生産力が、連合国の兵器と食料を支えました。",
"ウィルソンは連盟設立に奔走しましたが、米上院は「ヨーロッパの紛争に巻き込まれる」と批准を拒否。理想と国内政治のずれが表れています。",
"T型フォードの価格は組み立てライン導入で当初の3分の1近くまで下がり、労働者でも買えるように。「フォーディズム」という言葉も生まれました。",
"ラジオ・冷蔵庫・洗濯機も普及し、ハリウッド映画やジャズが花開きました。「狂騒の20年代」と呼ばれます。",
"アメリカの女性参政権は憲法修正第19条。イギリスは1918年（30歳以上）→1928年（男女平等）と段階的でした。",
"禁酒法時代には「もぐり酒場」が栄え、アル・カポネのようなギャングが密造酒で巨利を得ました。",
"1924年移民法は「排日移民法」とも呼ばれます。日本の新聞は猛反発し、日米関係悪化の一因となりました。",
"KKKは1920年代に会員数百万人に達し、黒人だけでなくカトリック・ユダヤ系移民も攻撃対象としました。",
"「JAPS KEEP MOVING（日本人は立ち去れ）」という看板の写真が教科書に載っています。排斥は日本人移民にも向けられました。",
"繁栄の影で農業は不況が続き、株式投機が過熱。この不均衡が1929年の世界恐慌の伏線になります。"],
HIS28:[
"会議には敗戦国とソヴィエト・ロシアは招かれませんでした。チャーチルは回顧録で「国民の怒り」が過酷な講和を求めたと振り返っています。",
"連盟の本部はスイスのジュネーヴ。提唱国アメリカの不参加、独ソの当初排除、全会一致制という弱点を抱えていました。",
"日本は会議で人種差別撤廃を提案しましたが否決されました。一方で中国紙は「朝鮮や台湾を差別する日本に提案の資格はない」と批判しています。",
"1923年のルール占領時のインフレはすさまじく、パンを買うのにトランク一杯の紙幣が必要に。札束で遊ぶ子どもの写真が教科書に載っています。",
"主力艦保有比率は米英5・日3・仏伊1.67。「サクラサク（5・5・3）」のような語呂で覚える定番事項です。",
"四カ国条約による日英同盟の廃棄は、日本外交の支柱を失う転機でした。九カ国条約で二十一カ条以来の日本の中国進出にも歯止めがかかりました。",
"不戦条約は「人民の名において」の文言が天皇主権に反すると日本で論争に。条約は自衛戦争を禁じていない点が限界でした。",
"ロカルノ条約の立役者・独シュトレーゼマンと仏ブリアンはノーベル平和賞を受賞。1920年代後半は「国際協調の時代」でした。",
"幣原外交は中国への内政不干渉が特徴。軍部や強硬派からは「軟弱外交」と批判されました。戦後は首相として日本国憲法の制定にも関わります。",
"アメリカの資金がドーズ案でドイツへ→ドイツが英仏に賠償→英仏が米に戦債返済、という「資金の三角循環」。米国経済がその要でした。"],
HIS29:[
"大戦景気では「成金」が続出。暗くて靴が見つからない玄関で百円札を燃やして明かりにする風刺画が有名です（当時の百円は大卒初任給の2倍超）。",
"債権国化と並んで、工業生産額が農業生産額を上回ったのもこの時期。日本は農業国から工業国へ転換しました。",
"造船ブームで日本は世界第3位の海運国に。鞍山製鉄所や化学工業など、ドイツからの輸入が途絶えた分野の国産化も進みました。",
"震災では手形（震災手形）が決済不能になり、日銀の特別融資でしのぎましたが、不良債権として残り続けました。",
"金融恐慌の引き金は片岡蔵相の「東京渡辺銀行が破綻」という失言（実際は破綻前）。うわさとパニックの怖さを示す事件です。",
"裏白紙幣は印刷が間に合わず裏面が白いままの200円札。銀行の窓口に札束を積み上げて見せ、預金者を安心させました。",
"井上財政は「嵐に向かって窓を開けた」と評されます。世界恐慌の直前に金解禁を行ったため、デフレと恐慌が重なってしまいました。",
"昭和恐慌では生糸価格の暴落で農村が困窮し、娘の身売りや欠食児童が社会問題に。この農村の窮乏が軍部台頭の土壌になります。",
"ニューヨークのウォール街がロンドンのシティと並ぶ金融センターに成長。世界経済のアメリカ依存が深まりました。",
"モラトリアムはラテン語由来で「支払猶予」の意。現代でも金融危機の際に使われる言葉です。"],
HIS30:[
"運動のきっかけの1つはウィルソンの民族自決とパリ講和会議への期待でした。独立宣言が読み上げられ、約200万人が参加したとされます。",
"五・四運動は北京の学生デモから始まりました。山東省のドイツ権益が日本に引き継がれることへの抗議です。",
"『新青年』は「民主と科学」を掲げました。魯迅の『狂人日記』『阿Q正伝』は儒教社会を鋭く批判しています。",
"ガンディーは南アフリカで弁護士をしていた頃に人種差別を体験し、非暴力抵抗の思想を築きました。糸車を回す姿は国産品愛用（スワデーシ）の象徴です。",
"塩の行進は約360kmを約1カ月かけて歩く行進でした。世界のメディアが報道し、イギリスの植民地支配の不当性を世界に知らしめました。",
"フセイン・マクマホン協定（アラブ独立支持）・バルフォア宣言（ユダヤ人のナショナル・ホーム支持）・サイクス・ピコ協定（英仏ロの分割密約）の3つの使い分けが頻出です。",
"ケマルはアタテュルク（トルコの父）の称号を大国民議会から贈られました。カリフ制も廃止し、政教分離の世俗国家を建設しました。",
"セーヴル条約からローザンヌ条約（1923）への改定で、トルコは不平等条約の撤廃と関税自主権の回復に成功した数少ない国になりました。",
"イランの石油利権は依然イギリスの政府と資本に握られたまま。これが第二次世界大戦後の石油国有化運動につながります。",
"インド綿糸の輸出グラフでは、1870年代まで中国・日本へ輸出していたインドが、日英の機械製綿糸に市場を奪われる様子が読み取れます。"],
HIS31:[
"大正政変では議会を民衆が取り巻き、交番や政府系新聞社が焼き打ちされました。藩閥政治への大衆の怒りの爆発です。",
"民本主義は「主権が天皇にあってもデモクラシーは可能」とする工夫された訳語。「民主主義」では天皇主権に抵触するためでした。",
"米騒動の背景にはシベリア出兵を見越した米の買い占めがありました。新聞報道で全国約70万人が参加する騒動に拡大しました。",
"原敬は爵位をもたない「平民宰相」。ただし普通選挙には慎重で、選挙権の納税要件を3円に下げるにとどめました。",
"「アメとムチ」と呼ばれます。普通選挙（アメ）で政治参加を広げる一方、治安維持法（ムチ）で社会主義運動を取り締まりました。",
"『青鞜』創刊号の一節は与謝野晶子の祝詩とともに有名です。「山の動く日来る」——女性解放運動の出発点でした。",
"市川房枝は戦後、参議院議員として理想選挙を貫いた政治家になりました。女性参政権実現は1945年、最初の投票は1946年です。",
"水平社宣言は「人の世に熱あれ、人間に光あれ」と結ばれます。日本初の人権宣言とも呼ばれ、創立大会の荊冠旗は受難と誇りの象徴です。",
"憲政の常道の8年間は、選挙で多数を得た政党が政権を担う議院内閣制に近い慣行でした。ただし首相の指名権は元老の西園寺公望にありました。",
"選挙権拡大の表（1.1%→2.2%→5.5%→20.8%→48.7%）は資料問題の定番。各内閣名とセットで確認しましょう。"],
HIS32:[
"自動車・ラジオ・冷蔵庫・洗濯機——「アメリカ的生活様式」は広告とローン（月賦販売）によって大衆に広がりました。",
"ホワイトカラーという言葉もこの時代から。白い襟のシャツで働く事務職が、ブルーカラー（肉体労働者）と対比されました。",
"丸の内のオフィスに通う職業婦人、銀座を歩くモダンガール（モガ）・モボ。「今日は帝劇、明日は三越」という広告文句も生まれました。",
"ラジオは関東大震災の流言の教訓から「正確な情報伝達」への期待を担って始まりました。甲子園や大相撲の中継が人気を集めました。",
"円本ブームの先駆けは改造社『現代日本文学全集』。1冊1円は当時のそば10杯分ほどで、知識の大衆化を象徴します。",
"殺害された朝鮮人・中国人の犠牲は数千人規模とされます。デマと群集心理の恐ろしさを示す歴史の教訓として記憶すべき事件です。",
"『モダン・タイムス』でチャップリンはベルトコンベアに飲み込まれる労働者を演じました。大量生産社会への風刺です。",
"特高（特別高等警察）は思想・社会運動を取り締まる警察。治安維持法の最高刑はのちに死刑へ引き上げられました。",
"東京帝国大学などの帝国大学に加え、慶應・早稲田などの私立大学が正式な大学に。サラリーマン予備軍の学歴社会が始まりました。",
"新聞は関東大震災後に大阪毎日・大阪朝日が全国紙化。発行部数100万部時代の到来は世論の影響力を一気に高めました。"],
HIS33:[
"「暗黒の木曜日」と呼ばれます。株は借金による信用買いが膨らんでいたため暴落が連鎖し、銀行や企業の倒産が相次ぎました。",
"街には失業者があふれ、アメリカ資本に頼っていたドイツなどへ恐慌が次々と波及しました。だから「世界」恐慌なのです。",
"ローズヴェルトは4回当選した唯一の大統領。ラジオの炉辺談話で国民に直接語りかけ、支持を集めました。",
"政府が経済に介入するこのやり方は修正資本主義とも呼ばれ、第二次世界大戦後の各国の経済政策のモデルになりました。",
"AAA（農業調整法）は農産物の生産調整、NRA（全国産業復興法）は産業の統制をおこないました。3つセットで覚えましょう。",
"ワグナー法で労働組合は急成長し、労働者はニューディールを支える大きな支持基盤になりました。",
"モラトリアム＝支払い猶予。しかし恐慌の進行は止められず、フーヴァーは再選に失敗しました。",
"中立法は交戦国への武器輸出を禁止するもの。アメリカが再びヨーロッパの戦争に巻き込まれるのを避けるねらいでした。",
"ブロック経済は本国と植民地で囲い込み、域外に高関税をかけるしくみ。植民地の少ない日独伊の不満を高め、侵略へ向かう一因となりました。",
"ローズヴェルトはポリオの後遺症で車いすを使っていました。第二次世界大戦中も大統領を務めます。"],
HIS34:[
"浜口首相は1930年に東京駅で狙撃され、翌年亡くなりました。実勢より円高の旧平価での解禁は、輸出産業に大打撃を与えました。",
"立憲民政党と立憲政友会の二大政党が交互に政権を担った時代は「憲政の常道」と呼ばれました。",
"農村ではアメリカ向け生糸の暴落も重なって困窮が深刻化し、娘の身売りや欠食児童が社会問題になりました。",
"高橋是清は日露戦争の外債募集でも活躍した財政家。「ダルマさん」の愛称で親しまれました。",
"管理通貨制度＝金の保有量に縛られず政府・中央銀行が通貨量を調節できる制度。現在の日本もこの制度です。",
"安い日本製品の急増に、イギリスなどはソーシャル=ダンピング（不当な安売り）だと非難し、ブロック経済で対抗しました。",
"時局匡救事業は農村救済の公共事業。景気回復後、高橋は軍事費を抑えようとして軍部と対立していきます。",
"世界に先駆けたこの回復は、ケインズ理論を先取りした財政政策として今日でも高く評価されています。",
"日産・日窒などの新興財閥が満洲や朝鮮に進出して成長しました。農村では産業組合の拡充がはかられました。",
"二・二六事件では高橋是清蔵相のほか、斎藤実内大臣らも殺害されました。"],
HIS35:[
"ローマ進軍は黒シャツ隊数万人の示威行動。国王がムッソリーニに組閣を命じ、合法的に政権が成立しました。",
"ファシズムの語源はイタリア語のファッショ（束）。教科書の1932年の資料では、反個人主義と国家の重要性を主張しています。",
"ナチ党綱領（1920）は、ヴェルサイユ条約の破棄やユダヤ人の排斥をすでに掲げていました。",
"ヒンデンブルク大統領が首相に任命。保守派はヒトラーを利用できると考えていましたが、逆に独裁を許してしまいました。",
"国会議事堂放火事件を口実に共産党を弾圧した直後に成立させ、憲法を事実上骨抜きにしました。",
"総統は大統領と首相の権限を兼ねる地位。軍人は総統個人に忠誠を誓わされました。",
"失業率は1932年の約30%から数年で激減。国民車フォルクスワーゲンの計画も宣伝に使われました（教科書に広告が載っています）。",
"のちの大戦中にはホロコースト（ユダヤ人大量虐殺）へとエスカレートし、約600万人が犠牲になりました。",
"秘密警察や強制収容所への恐怖で反対者を沈黙させ、ラジオや大集会で宣伝をくり返しました。",
"ヒトラーは演説の才能で党を急成長させました。教科書には1922年の演説を聞いた人の回想資料があります。"],
HIS36:[
"ヴェルサイユ条約の軍備制限の公然たる破棄でしたが、イギリスは英独海軍協定を結び事実上容認してしまいました。",
"ラインラントはヴェルサイユ条約で非武装とされた地域。英仏が動かなかったことで、ヒトラーは自信を深めました。",
"国際連盟は経済制裁を発動しましたが、石油を含まないなど不十分で、併合を止められませんでした。",
"日独の連盟脱退と入れ替わるような加盟でした。ファシズムの脅威を前に、ソ連は英仏に接近しました。",
"この方針のもと、フランスやスペインで人民戦線政府が成立しました。",
"フランコは1939年に勝利し、1975年まで独裁を続けました。",
"ドイツ空軍は1937年、スペインの町ゲルニカを無差別爆撃。ピカソは大作『ゲルニカ』でこの惨劇を告発しました（第4章の扉にも登場）。",
"チェンバレン首相は帰国時「平和の使者」として歓迎されましたが、翌39年ドイツはチェコを解体し約束を破りました。",
"独ソ両国は秘密協定でポーランドなどの勢力範囲の分割を約束していました。直後の9月、ドイツはポーランドに侵攻します。",
"防共＝コミンテルン（国際共産主義運動）への対抗という意味。国際的に孤立した日独伊が結びつきました。"],
HIS37:[
"海軍内の反対派は「統帥権の干犯」だと攻撃しました。昭和恐慌による農村の窮乏を背景に、軍人や右翼は急進的な国家改造運動に向かいました。",
"関東州は遼東半島先端の租借地。1934年の陸軍パンフレットが「国防国家」を説くなど、軍の発言力はますます強まりました。",
"爆破を中国側のしわざと偽り、「自衛のため」と称して軍事行動を拡大。国内の新聞や世論は熱狂的に歓迎しました。",
"政府の方針を軍が無視して動くという前例ができ、若槻内閣は総辞職。軍部の発言力がさらに強まりました。",
"満洲国は「五族協和」を掲げましたが、軍事・外交など主要な権限は関東軍や日本の官吏が握る傀儡国家でした。人口の85%以上は漢人でした（1940年）。",
"リットン報告書は、中国の主権のもとで満洲に自治政権をつくり、日本軍は撤退するよう勧告しました。",
"犬養首相の「話せばわかる」に「問答無用」と答えたと伝えられます。つぎの首相は海軍出身の斎藤実でした。",
"日満議定書（1932）で満洲国を承認し、日本軍の駐留を認めさせました。入植した日本人の土地の多くは、現地農民からの強制的な買収で確保されました。",
"松岡洋右代表は採決後に議場から退場しました。脱退の発効は1935年。日本は国際的な孤立を深めていきます。",
"斎藤実内大臣・高橋是清蔵相らが殺害されました。反乱は鎮圧されましたが、以後陸軍は政治の主導権を握り、首相の任命さえ左右するようになります。"],
HIS38:[
"張学良は張作霖の子。共産党は長征の末、1937年には延安に拠点を置いていました。西安事件をきっかけに国民政府は共産党への弾圧をやめました。",
"現地では一時停戦も成立しましたが、近衛内閣は軍部におされて兵力を増派し、戦線が拡大していきました。",
"近衛文麿は名門貴族出身で国民的人気の高い政治家でした。宣戦布告のないまま、全面戦争に突入しました。",
"第2次国共合作ともいいます。第1次国共合作（1924）は北伐の途中で崩れていました。",
"犠牲者の数には諸説ありますが、国際的に大きく報道され、日本への非難が高まりました。",
"交渉相手をみずから否定したことで和平の道は閉ざされ、戦争は出口のない長期戦になりました。",
"重慶は日本軍の無差別爆撃（重慶爆撃）を受けました。教科書には被害の写真が載っています。",
"ビルマルートや仏印ルートなど。このルートを断つことが、のちの日本軍の仏印進駐の口実になります。",
"汪兆銘は法政大学に学んだ国民党の重鎮。「和平・反共」を唱えましたが支持は広がらず、1944年に日本で病死しました。",
"1938年末、近衛内閣は日満華による「東亜新秩序」の建設を戦争の目的と声明しましたが、中国民衆の支持は得られませんでした。"],
HIS39:[
"独ソは秘密協定でポーランドの分割を約束済みでした。戦車と航空機を集中させる高速の作戦で、ポーランドは短期間で敗れました。",
"イギリスとフランスはミュンヘン会談後、ドイツがイギリス・フランスをソ連攻撃に利用しているとの疑いを強めていました。宥和政策の失敗でした。",
"ソ連は独ソ不可侵条約の秘密協定にもとづいて東半分を占領し、旧ロシア帝国の領域の回復をめざしました。",
"除名は1939年12月。国際連盟が大国に対してとった数少ない強い措置でしたが、戦争は止められませんでした。",
"エストニア・ラトヴィア・リトアニアの3国。半世紀後の1991年、ソ連の解体とともに独立を回復します。",
"開戦からわずか1年たらずの大国フランスの降伏は、アメリカやイギリスをはじめ世界に衝撃を与えました。",
"ヴィシーは中部の都市の名。形のうえではフランス政府でしたが、実態はドイツに協力する政権でした。",
"ド=ゴールはロンドンから抗戦を呼びかけ、レジスタンスを指導しました。戦後はフランス大統領となります。",
"前任のチェンバレンは宥和政策の失敗で退陣。チャーチルは徹底抗戦を率い、ドイツのイギリス本土上陸を断念させました。",
"フランス国内では、ド=ゴールに呼応してドイツへの組織的な抵抗運動が広がりました。"],
HIS40:[
"条約の失効により、アメリカは日本への物資の供給を段階的に制限・停止できるようになりました。",
"日本は日中戦争を続けるために必要な軍事物資の大部分をアメリカからの輸入に頼っていました。教科書の1940年のグラフで確認できます。",
"ねらいは軍事物資の獲得と援蔣ルートの遮断。ドイツに敗れたフランスが東南アジアにもつ植民地を勢力下に置こうとしました。",
"北方の安全を確保するねらいでした。しかし2カ月後に独ソ戦が始まり、日本とソ連の関係は不安定なままでした。",
"石油を断たれた日本は、石油資源のあるオランダ領東インドなど南方への進出にいっそう傾いていきました。",
"民族自決、貿易および公海の自由などをうたい、1942年の連合国共同宣言で各国が承認。国連憲章の原点となりました。",
"中国・仏印からの全面撤兵、重慶の国民政府以外の政権の否認などを含み、東条英機内閣は交渉の余地なしとみなしました。",
"東条英機は陸軍出身で、首相と陸軍大臣・内務大臣を兼任。戦後、極東国際軍事裁判で死刑となりました。",
"米英に宣戦すると、ドイツ・イタリアもアメリカに宣戦（枢軸国）。戦争は文字どおり世界規模に拡大しました。",
"開戦後わずか半年で、日本はフィリピン・香港・マレー・シンガポール・ビルマ・オランダ領東インドを占領しました。"],
HIS41:[
"日本は主力空母を一挙に失う大敗を喫しました。これを境に太平洋の戦局はアメリカ側に傾きます。",
"スターリングラードは現在のヴォルゴグラード。この敗北以降、ドイツ軍は東部戦線で後退を続けました。",
"連合国軍のシチリア島上陸でムッソリーニは失脚。9月に新政権が無条件降伏しました。",
"カイロ宣言では満洲・台湾などの中国への返還、朝鮮の独立が定められ、戦後の東アジアの枠組みになりました。",
"「第二戦線」の形成はスターリンが1942年から強く求めていました（チャーチルの回想）。上陸成功後、8月にパリが解放されました。",
"ローズヴェルト・チャーチル・スターリンが出席。ソ連は南樺太・千島列島の獲得を条件に、ドイツ降伏後の対日参戦を密約しました。",
"サイパン島の陥落で東条内閣は倒れました。1945年に入ると東京をはじめ全国の主要都市が空襲を受けました。",
"ベルリン郊外のポツダムでの会談はトルーマン・チャーチル（途中からアトリー）・スターリン。鈴木貫太郎首相は当初「黙殺」と表明しました。",
"原爆は多くの命を奪っただけでなく、放射線による後遺症が被爆者を苦しめ続けました。戦後は核兵器の開発競争も始まります。",
"ソ連は日ソ中立条約を破って8月8日に対日宣戦し、満洲などに侵攻。日本は8月14日にポツダム宣言を受諾し、9月2日に降伏文書に調印しました。"],
HIS42:[
"1930年代、ソ連は五カ年計画で重化学工業化を進め、ドイツは四カ年計画で恐慌を脱出。日本の軍部はこれらをモデルに計画経済システムの構築を進めました。",
"企画院は物資動員の計画を立案。経済新体制の名のもと、生産や配給の統制がおこなわれました。",
"国家予算に占める軍事費の割合は二・二六事件後に増大し、日中戦争が始まるといっそう膨張しました（教科書のグラフ）。",
"近衛文麿は公家の名門の出身で国民的人気を集め、3度内閣を組織しました。1945年、戦犯指名の直後に服毒自殺しました。",
"すべての政党が解散して大政翼賛会に合流し、議会は戦争協力の機関と化しました。",
"隣組は配給や防空演習の単位にもなり、たがいに監視しあう役割も果たしました（教科書に1942年の防空演習の写真）。",
"労働組合にかわって企業ごとに産業報国会が結成され、労資一体で戦争に協力する体制となりました。",
"宝飾品や高級な洋服がぜいたく品とされ、製造・販売中止に。日々の消費は配給制で切り詰められました。お寺の梵鐘まで金属として供出されました。",
"1943年から大学生や専門学校の生徒も徴兵され、戦場へ送られました。中等学校以上の男女生徒は軍需工場などに動員されました。",
"大都市の学童は親元を離れ、地方の旅館や寺院などで集団生活を送りました。"],
HIS43:[
"朝鮮では1937年10月から「皇国臣民の誓詞」を毎朝斉唱させ、台湾では「話は国語（日本語）で」の門札が家庭に与えられました。",
"労働力不足のなか、徴用を受けた朝鮮人や、占領地から連行された中国人が日本本土の工場や鉱山で働かされました。",
"タイとビルマ（ミャンマー）を結ぶ鉄道。1年3カ月の突貫工事で建設され、多数の死者を出しました。",
"両陣営が都市への無差別爆撃をおこない、工業施設の破壊と敵国民の戦意喪失をはかりました。中国では重慶が長期にわたり攻撃対象となりました。",
"犠牲者はポーランドで約300万人など。絶滅収容所での組織的な殺害は世界に衝撃を与えました。",
"住民がスパイと疑われて日本兵に殺害されたり、「集団自決」に追い込まれたりする悲劇も起きました。",
"日本でも統制経済の経験が、戦後の企業と政府の関係などの仕組みに影響を与えました。動員された女性の役割意識にも大きな変化が生まれました。",
"ビルマでは抗日蜂起をへて、戦後イギリスとの交渉で独立を達成しました（1945年のビルマ独立宣言）。",
"ドイツの捕虜となったソ連兵の約58%が亡くなるなど、捕虜の扱いはこの大戦の大きな悲劇のひとつでした。",
"日本本土に在住する朝鮮人は1945年8月に約210万人。戦後1946年までに150万人近くが朝鮮へ帰還しました。"],
HIS44:[
"原案は1944年のダンバートン=オークス会議で米英ソ中がまとめました。1941年の大西洋憲章が出発点です。",
"原加盟国は国際連盟の42カ国に対し、国連は51カ国。2020年現在は193カ国に増えています。",
"中国の代表権は当初は中華民国、1971年からは中華人民共和国に交代しました。日本の加盟は1956年です。",
"安保理の決議は、常任理事国の一致を含む賛成（発足時7カ国、1965年以降は9カ国）で可決されます。",
"国際連盟は全会一致制で経済制裁しかできず、機能しませんでした。その教訓から多数決制と武力制裁が導入されました。",
"44カ国が参加。イギリスの経済学者ケインズの案ではなく、アメリカ財務官僚ホワイトの案が採用され、ドルが基軸通貨になりました。",
"当時アメリカは世界の金の70%近くを保有し、鉱工業生産の半分程度を占めていました。1949年のレートで1ドル＝360円でした。",
"GATTは関税引き下げなどの多角的貿易交渉（ラウンド）を重ね、1995年には国際機関のWTOに発展しました。",
"しかし1947〜50年に米ソ関係が悪化し、安保理が機能するか懸念が増大。1950年の朝鮮戦争でその不安は決定的になりました。",
"吉田茂首相が調印。同時にアメリカの要請に応じて小規模な自衛力をもつ方針も打ち出しました。激しく戦った日米は、ここで同盟国となりました。"],
HIS45:[
"間接統治では日本政府が存続したまま改革が進みました。ドイツとの違いは、その後の両国の歩みに大きな影響を与えました。",
"首都ベルリンも4カ国で分割管理されました。これがのちのベルリン封鎖、そしてベルリンの壁につながります。",
"マッカーサーと昭和天皇が並んだ写真を日本政府が新聞掲載禁止にすると、GHQは逆に掲載を許可させました。占領の力関係を象徴する出来事です。",
"沖縄・奄美・小笠原は本土と切り離され、日本の独立後もアメリカの統治が続くことになります。",
"1945年11月から約1年かけておこなわれ、ナチ党や軍の最高責任者12人が死刑となりました。ユダヤ人大量虐殺の責任なども問われました。",
"海外の戦地や旧占領地・植民地から、軍人約310万人・一般居留民約320万人が日本国内に引き揚げました。",
"獄中にいた日本共産党員などが釈放され、政党活動が復活しました。",
"教科書には墨ぬり教科書の写真も。GHQの指示を受けた箇所を、子どもたちが教師の指示のもとで墨でぬりつぶしました。",
"政・財・官界や言論界の指導者たちも戦時中の責任を問われ、公職を追われました（公職追放）。",
"連合国軍最高司令官総司令部。マッカーサーを最高司令官として、非軍事化と民主化を推し進めました。"],
HIS46:[
"教科書には「一票を初行使」する女性の写真が載っています。女性参政権は五大改革のひとつでした。",
"1945年から50年までの2次にわたる改革で、自作地の割合は約9割になりました（教科書のグラフ）。",
"「二百万町歩の解放」を掲げた農地改革のポスターも教科書に。地主制度の解体は農村を大きく変えました。",
"政府案が大日本帝国憲法と同様のものだったため、GHQはこれを退け、みずから草案を作成して政府に示しました。",
"国会は国権の最高機関とされ、首相は国会議員のなかから国会で指名され、内閣が国会に責任を負う議院内閣制が確立しました。",
"第9条は戦後日本の安全保障をめぐる議論の出発点となります。再軍備・自衛隊・安保条約をめぐる論争につながっていきます。",
"公布の11月3日は現在の文化の日、施行の5月3日は憲法記念日です。",
"GHQ民間人要員のベアテ=シロタ=ゴードンが、男女の平等を定めた第24条の原型をつくったことで知られます。",
"一方、人々が窮乏するなかで革新勢力も支持を集め、1946年5月には参加者30万人といわれる食糧メーデーが起こりました。",
"GHQは革新・保守をまたぐ中道政権の成立を歓迎しました。なお1947年2月のゼネラル=ストライキ計画はGHQが中止させました。"],
HIS47:[
"「バルト海のシュチェチンからアドリア海のトリエステまで」。アメリカ訪問中の演説で、東西分断を象徴する言葉になりました。",
"イギリスがギリシア・トルコ支援を中止したため、アメリカが肩代わり。平時から共産主義勢力の膨張を阻止する政策（封じ込め政策）に踏み出しました。",
"4年間で130億ドル以上。西欧諸国は受け入れましたが、ソ連や東ヨーロッパ諸国は参加しませんでした。",
"コミンフォルムは各国共産党の情報交換組織（1947）。自立路線のユーゴスラヴィアは1948年に除名されました。",
"米英仏の3国が西ドイツ地域で通貨改革を実施したことへの反発でした。",
"およそ1年後にソ連は封鎖を解除しましたが、この強引な政策はソ連への警戒感と批判を一挙に強めました。",
"ベルリン封鎖を機にドイツの分裂は決定的となりました。ベルリンの東西分断は1961年の「ベルリンの壁」建設で固定化されます。",
"いずれの国に対する侵略でも集団で防衛する同盟体制です。1955年には西ドイツも加盟しました。",
"米ソが直接戦火を交えることはありませんでしたが、世界は西側陣営と東側陣営に分かれて対立し続けました。",
"西ドイツのNATO加盟に対抗して結成されました（東ヨーロッパ相互援助条約）。"],
HIS48:[
"毛沢東は1935年頃に共産党の指導権を掌握した人物。のちに権力回復をねらってプロレタリア文化大革命を引き起こします。",
"以後「2つの中国」が並び立つことになります。国連の中国代表権は1971年に中華人民共和国に交代します。",
"中ソの密接な関係は、アメリカの東アジア戦略と対日政策に大きな影響を与えました。",
"1945年8月のソ連参戦と日本の敗戦後、統一国家の成立は認められず、米ソによる分割占領となりました。",
"冷戦の対立が、ドイツに続いて朝鮮半島でも国家の分断として現れました。",
"トルーマン大統領は即座に北朝鮮の行動を侵略と判断しました。",
"厳密には国連憲章に定められた国連軍ではなく、多国籍軍でした。",
"中国の参戦で戦線は膠着。アメリカはこれを機に台湾の防衛も開始しました。",
"休戦ラインは現在も続く軍事境界線です。朝鮮半島の分断は今日まで続いています。",
"毛沢東。中華人民共和国成立後は最高指導者として中国を率いました。"],
HIS49:[
"アジアでの共産主義の拡大をアメリカが警戒したためです。マッカーサーも1949年のインタビューで日本の再軍備に言及しています。",
"金融の引締めによってインフレは収束しましたが、不況が深刻化し、倒産や失業者が増大しました。",
"単一為替レートは日本経済を世界市場に結びつけました。1ドル＝360円の固定レートは1971年まで続きます。",
"一方で戦時指導者らの公職追放の解除が始まり、政界への復帰が進みました。",
"1950年7月、マッカーサーは吉田茂首相に7万5000人の警察予備隊の創設と海上保安庁の増員を指示しました。",
"朝鮮戦争で生じたアメリカ軍向けの物資・役務の需要です。日本経済が復興するきっかけとなりました。",
"発効日の1952年4月28日まで占領は続きました。日本は約7年ぶりに国際社会に復帰しました。",
"日本は東京裁判の判決を受諾し、おもに役務による賠償義務を負いましたが、アメリカの要請で調印国の多くが賠償請求権を放棄しました。",
"北方領土問題や沖縄の基地問題など、領土をめぐる課題はその後も残りました。",
"吉田茂は戦前は親英米派の外交官。ダレス国務省顧問との交渉で講和と安保をまとめ、戦後保守の基本路線を築きました。"],
HIS50:[
"衆議院の批准投票では平和条約が賛成307・反対47、安保条約が賛成289・反対71。安保条約のほうが反対が多くなりました。",
"鳩山・岸はのちに首相となります。岸内閣は1960年に安保条約の改定をおこなうことになります。",
"砂川闘争（1955）では立川基地の拡張に対し、警官隊と住民・労働者・学生が衝突して流血事件も起きました。",
"反対運動で逮捕された人々は裁判で無罪となり、日本政府は基地の拡張を断念しました。",
"米軍人が刑事事件をおこした際の裁判管轄権はアメリカに属しており、日本側は強く反発していました。この内容は1960年に日米地位協定へ引き継がれます。",
"アメリカが日本に再軍備を強く求めるなかで結ばれた、日米相互防衛援助協定など4協定の総称です。",
"警察予備隊（1950）→保安隊（1952）→自衛隊（1954）という流れを押さえましょう。海上警備隊は警備隊と改称されました。",
"琉球政府は住民に十分な自治権を与えられず、日本への復帰運動がさかんになりました。本土との往来には渡航証明書が必要でした。",
"沖縄本島の返還は1972年。アメリカ軍基地の問題はその後も続きます。",
"一括払い反対・適正補償・損害賠償・新規接収反対の4原則。土地接収の条件は見直されましたが、基地の拡張はその後も続きました。"],
HIS51:[
"教科書には1918年1月の十四カ条演説の資料が載っています。ウィルソンは国際連盟の設立も提唱しました。",
"E.H.カーはイギリスの歴史家・国際政治学者。『歴史とは何か』の著者としても有名です。",
"カーは、現状に満足する大国ほど「平和」を唱えやすいと指摘しました。1939年は第二次世界大戦が始まった年です。",
"近衛文麿は名門公家の出身。この論文を書いた当時はまだ若い政治家でしたが、のちに3度首相を務めます。",
"後発国・日本にとっては、現状維持よりもむしろ現状打破こそが正義になりうる、という論理でした。",
"吉野作造は大正デモクラシーの理論的指導者。民本主義を唱えたことで知られます。",
"国際的正義がだれにでも当てはまるなら、朝鮮人や国内の差別される人々にも同じく当てはまるはずだ、という主張です。",
"李承晩はアメリカに学び、独立運動を続けました。1948年の韓国成立とともに初代大統領となります。",
"パリ講和会議では戦勝国の利害が優先され、民族自決の理念はアジア・アフリカには十分に適用されませんでした。",
"十四カ条の平和原則。秘密外交の廃止、軍備縮小、民族自決、国際連盟の設立などを掲げました。"],
HIS52:[
"「知識の啓発がすこぶる低度」「優勝劣敗」といった表現に、政府のアイヌに対する見方が表れています。アイヌは漁場を移住民に占領され困窮していました。",
"違星北斗の「アイヌの姿」（1927）は、和人（シャモ）への同化の圧力のなかでの葛藤と、アイヌであることの誇りを描いています。",
"シャモはアイヌ語で和人（他府県出身者）の意味。違星北斗は「シャモ化」して「贋（にせ）シャモ」になることへの違和感を記しました。",
"識字テスト移民法は、英語などの読み書きができない移民を制限するものでした。イタリア・ポーランド・ロシアなどからの移民が対象とされました。",
"WASPは白人・アングロサクソン・プロテスタント。これに合わない移民、とくに中国系移民らは迫害されることもありました。",
"カナダやアメリカでは、日系移民が「敵性外国人」とみなされて財産を奪われ、強制収容所に入れられました。",
"アパルトヘイトは白人少数派が多数派の非白人を差別・隔離した政策。国際的な非難を浴びました。",
"1991年に廃止され、1994年にはマンデラが大統領に。新しい国旗には多様性への願いが込められました。",
"ヘイトスピーチ解消法は、特定の民族や出身者への差別的言動の解消をめざす理念法です。",
"WASP。アメリカ社会で主流とされ、移民の「統合・分化」をめぐる問題の背景となりました。"],
HIS53:[
"チャーチル手書きのメモには、ルーマニアやギリシアなどの勢力圏の割合が書かれ、スターリンが青鉛筆でチェックマーク（OKの意味）をつけたと伝えられます。",
"ギリシアでは戦後、イギリス（西側）の影響下で内戦となり、これがトルーマン=ドクトリンのきっかけになりました。",
"1986年をピークに、その後は軍縮条約によって核兵器は徐々に減少していきます。",
"NPTは、すでに核兵器をもつ5大国以外への拡散を防ぐ仕組み。インドやパキスタンなど未加盟で核を保有する国もあります。",
"キューバにソ連が核ミサイル基地を建設しようとしたことで、米ソが核戦争の瀬戸際まで対立しました。",
"大気圏内・宇宙空間・水中での核実験を禁じましたが、地下核実験は除外されました。",
"INF全廃条約は、ある種類の核ミサイルを全廃した画期的な条約。冷戦終結の象徴となりました。",
"STARTは戦略核兵器そのものを削減する条約。米ソ（露）の核軍縮を大きく前進させました。",
"教科書はチャーチルとスターリンの極秘会談を例に、冷戦が一部の大国指導者の利害関心のもとに始まったことを示しています。",
"NPT。核兵器国の核軍縮義務と、非核兵器国の核兵器取得禁止を定めました。"],
HIS54:[
"在日韓国・朝鮮人は植民地支配の歴史を背景に多くを占めてきましたが、近年は中国やベトナムなどからの人々が増えています。",
"西ドイツは「ガストアルバイター（招かれた労働者）」を受け入れました。エジル選手の家族もその流れでドイツに来たトルコ系です。",
"エジル選手は、勝てばドイツ人、負ければトルコ人と呼ばれる経験を語り、移民とナショナリズムの問題を投げかけました。",
"福沢諭吉は『学問のすゝめ』でも有名な啓蒙思想家。『西洋事情』で欧米の制度や技術を日本に紹介しました。",
"19世紀後半の日本では、欧米列強に対抗するために情報網の整備が重視されました。電信は国の独立にとって重要な課題でした。",
"インターネットは双方向で、だれもが発信者になれる点が、それまでの新聞やラジオなどとの大きな違いです。",
"世界の大手インターネット事業者は時価総額の上位を占めるようになり、情報の価値の高まりを示しています。",
"グローバル化の進展にともなって、人と資本の移動が世界規模で活発になりました。",
"電信網の整備は軍事・外交・経済の面で国力を左右するため、明治政府は早くから力を入れました。",
"『西洋事情』。電信や世界の情報網を紹介し、世界が結ばれていく様子を日本に伝えました。"],
HIS55:[
"少子高齢化が進むと、生産年齢人口が減り、年金や医療などの社会保障の負担が課題となります。",
"食料の不均衡は、貧困や流通の問題と深く結びついています。アフリカに栄養不足が集中しています。",
"氷河の後退を1941年と2004年の写真で比較すると、温暖化の影響がはっきりわかります。",
"二酸化炭素などの温室効果ガスの増加が、地球の平均気温の上昇と結びついていると考えられています。",
"人が密集して定住し、家畜と暮らすようになったことで、動物由来の病気が人間社会に広がりました。",
"スペイン=インフルエンザは第一次世界大戦末期に大流行し、世界で数千万人が亡くなったとされます。",
"天然痘ウイルスは現在、アメリカとロシアのバイオセイフティーレベル（BSL）4の施設で厳重に保管されています。",
"WHOは1958年の総会で世界天然痘根絶計画を可決し、ワクチン接種を世界規模で進めました。",
"SARS（2002）やMERSに続き、COVID-19は世界的な大流行（パンデミック）となりました。",
"天然痘。人類が根絶に成功した唯一の感染症で、WHOが1980年に根絶を宣言しました。"],
HIS56:[
"パレスチナは第一次世界大戦後イギリスの委任統治領。1946年までに人口185万人のうちユダヤ人は約61万人（33%）に増えていました。",
"建国宣言の写真には、シオニズム運動の創始者ヘルツルの肖像と「ダヴィデの星」の表象がみえます。",
"故郷を追われたアラブ人（パレスチナ難民）の問題は、今日まで続く中東問題の根源となりました。",
"アラブ連盟は今日でもアラブ首脳会議を毎年開いていますが、イスラエルとの関係では加盟国間で立場の違いがあります。",
"ナセルは1952年のエジプト革命を主導した軍人。スエズ運河を国有化してアラブ世界の英雄となりました。",
"英米がダム建設の資金援助を撤回したのは、ソ連に接近するエジプトを封じ込めるためでした。",
"国際世論の批判を浴びた英仏は撤退。スエズ戦争とも呼ばれ、英仏の威信は大きく低下しました。",
"アスワン=ハイダムは英米の援助が得られないなか、ソ連の支援で1970年に完成しました。",
"短期間でイスラエルが圧勝しました。占領地の問題が新たな対立の火種となりました。",
"PLO（パレスチナ解放機構）。アラファト議長が率い、イスラエルとの武装闘争をくり広げました。"],
HIS57:[
"ガンディーは非暴力・不服従の運動でイギリスと闘いました。国民会議派は大戦中から即時独立を要求していました。",
"ジンナーの1946年の発言資料が教科書に。「国民会議とムスリム連盟という2つの民族原理」と述べています。",
"分離独立にともない、ヒンドゥー教徒とイスラーム教徒の双方が大量に移動し、衝突で多くの命が失われました。",
"「独立の父」と呼ばれたガンディーは1948年、ヒンドゥー教徒の急進派によって暗殺されました。",
"スカルノは1928年にインドネシア国民党を結成。戦時中は日本に協力しつつ独立運動を進め、1955年のアジア=アフリカ会議を主催しました。",
"ホー=チ=ミンはフランスの植民地支配と闘い続けた革命家。「ベトナム建国の父」と呼ばれます。",
"植民地支配をしてきた国々の理想（自由・平等）を逆手にとり、独立の正当性を世界に訴えました。",
"ディエンビエンフーはベトナム北西部の要塞。この大敗でフランスはインドシナ支配をあきらめました。",
"ラオスとカンボジアは1953年に独立し、ジュネーヴ国際会議で承認されました。南北分断はベトナム戦争の背景となります。",
"ガンディー。糸車を回す姿は自給自足と非暴力の象徴として知られます。"],
HIS58:[
"アメリカは解放戦線の活動を、ソ連と中国に率いられた東側陣営の試みと判断して介入を深めました。",
"解放戦線は北ベトナムと連携してゲリラ戦を展開。50万をこえる米軍でも鎮圧できませんでした。",
"中ソ対立を利用した外交でした。ソ連への牽制となり、デタント（緊張緩和）への糸口にもなりました。",
"ニクソンは駐留米軍の規模を縮小しながら和平交渉を進め、1973年に完全撤退を実現しました。",
"サイゴンは現在のホーチミン市。ベトナム戦争はアメリカが共産主義を封じ込めようとして失敗した例となりました。",
"領土・主権の相互尊重、相互不可侵、内政不干渉、平等互恵、平和共存の5項目です。",
"バンドン会議はスカルノが主催。平和共存や十原則を採択し、第三世界のまとまりを示しました。",
"ガーナのエンクルマは「アフリカの星」と呼ばれました。独立後も経済的な立ち遅れやコンゴ動乱などの課題が残りました。",
"平和共存・民族解放の支援・植民地主義の打破をめざしました。国連加盟国に占める非同盟諸国の割合は1973年に55%に達しました。",
"1974年の国連資源特別総会では、新国際経済秩序（NIEO）樹立宣言が採択され、先進国主導のIMF・GATT体制の変革が求められました。"],
HIS59:[
"マッカーシー上院議員の扇動による反共旋風です。「政府の省庁が共産主義者に蝕まれている」と主張しました。",
"郊外の一戸建て・高速道路・自家用車というアメリカ的生活様式が確立し、白人中産階級の均一的な社会が形成されました。",
"このバス=ボイコット運動をきっかけに、公民権運動と呼ばれる黒人差別反対運動が全国に広がりました。",
"キングは黒人奴隷解放宣言100周年を記念する大行進で演説し、翌年ノーベル平和賞を受賞しました。",
"法的差別の撤廃は大前進でしたが、人種間の経済的格差は残り、60年代後半にはより戦闘的な運動も生まれました。",
"1960年頃の西ドイツの国民所得は東ドイツの2倍。乗用車保有台数は西67台対東8台（1000人当たり）でした。",
"1958年に第五共和政の大統領となり、62年にアルジェリア独立を認めてフランス政治を安定させました。",
"ベビーブーム世代の急増に大学の設備や教育が追いつかず、不満が爆発。政府は譲歩して事態を収拾しました（五月革命とも）。",
"学生たちは大学教授を権力者だと批判しました。1968年は世界同時的な「青年の反乱」の年でした。",
"キング牧師。1968年に暗殺されましたが、その夢は公民権運動の遺産として生き続けています。"],
HIS60:[
"フルシチョフは1959年に訪米して「雪どけ」を印象づけました。1955年からはジュネーヴ4巨頭会談も開かれました。",
"第20回共産党大会での秘密報告でした。東欧諸国や中国に大きな衝撃を与えました。",
"ポーランドでは政府が自力で動きをおさえましたが、ハンガリーではソ連軍が介入しました。",
"西ベルリンを囲む形で築かれ、東西分断の象徴となりました。崩壊は1989年です。",
"流出したのは若い技術者や知識人が多く、東ドイツには深刻な損失でした。",
"ドプチェクは「人間の顔をした社会主義」を掲げ、検閲の廃止などの自由化を進めました。",
"教科書には1968年のチェコスロヴァキア共産党行動綱領と、ソ連軍に抗議するプラハ市民の写真が載っています。",
"ソ連圏の共産主義政権がソ連の意に反する決定をすることは、軍事力で阻止されました。",
"「社会主義陣営の共通の利益への脅威」を口実とするこの理屈は、西側で制限主権論と呼ばれました。",
"ベルリンの壁。1989年11月の崩壊が冷戦終結の象徴となります。"],
HIS61:[
"実際の核弾頭数はアメリカが上回っていましたが、米国内ではミサイル=ギャップ論がさけばれ、軍拡が加速しました。",
"フルシチョフとケネディがミサイルの上で腕相撲をする風刺画が教科書に載っています。",
"両国はその後、直通電話（ホットライン）を設けるなど関係改善に乗り出しました。",
"地下核実験は禁止されませんでした。フランスと中国は条約に参加しませんでした。",
"第五福竜丸は「死の灰」を浴び、乗組員が犠牲になりました。映画『ゴジラ』（1954）もこの時代背景と関わっています。",
"原水爆禁止運動は日本から世界へ広がりました。「世界終末時計」は核の危機を午前0時までの残り時間で表します。",
"哲学者ラッセルと物理学者アインシュタインの宣言（1955）を受け、カナダのパグウォッシュで開かれました。",
"ブラントはワルシャワのゲットー跡地にひざまずいて祈り、1971年にノーベル平和賞を受賞しました。",
"ソ連はイラン=イスラーム革命の波及を恐れてアフガニスタンに侵攻。これでデタントは終わりました。",
"キューバ危機。1975年のヘルシンキ宣言（CSCE）など、危機の教訓は緊張緩和の流れにつながりました。"],
HIS62:[
"たび重なる戦争を経験した仏独の和解の仕組みでした。米ソの狭間で影響力が低下したことへの反省も背景にあります。",
"石炭と鉄鋼は武器生産に不可欠。これを共同管理すれば、単独では戦争ができなくなります。",
"シューマンは独仏国境地域のロレーヌ生まれ。両国の和解に生涯を捧げました。",
"ECは1993年にEU（ヨーロッパ連合）へと発展します。",
"イギリス・スウェーデン・ノルウェー・デンマークなどが参加しました。",
"ド=ゴール退陣後の1973年、イギリス・アイルランド・デンマークが加盟しました（拡大EC）。",
"反共組織のSEATO（東南アジア条約機構、1954〜77）とは異なり、ASEANは域内協力の組織として発展しました。1971年には東南アジア中立地帯宣言を発しました。",
"OAUは内政不干渉を原則としたため、ナイジェリアのビアフラ紛争（1967〜70）のような内戦型の紛争には関与できませんでした。",
"カストロとフルシチョフが並んだ写真が教科書に。キューバの社会主義化がキューバ危機の伏線となりました。",
"ASEAN。日・米・中・韓やヨーロッパとの対話の機会も設けられ、経済・安全保障の両面で重要な組織です。"],
HIS63:[
"「地球は青かった」の言葉で知られます。ソ連の科学技術の象徴として大々的に宣伝されました。",
"勤労者みずからが支配する社会という理想も、第三世界諸国にとって魅力的にうつりました。",
"アメリカは自由と民主主義の魅力を説き、安全保障や経済援助を提供して対抗しました。",
"ネルーは1955年の演説で「10年間で完全雇用を達成する」と社会主義型社会への意欲を語っています（教科書の資料）。",
"ソ連の経済成長率は1950年代の高成長から、70年代にかけて低下し続けました（教科書のグラフ）。",
"ソ連のアネクドート（政治風刺小話）も教科書に。体制への不満がユーモアとして語られました。",
"教科書には中ソ非難の応酬資料が。中国はソ連を「社会帝国主義者」「新しいツァーリ」と非難しました。",
"ソ連の援助停止と技術者引き揚げで、中国は独自路線を強めていきました。",
"珍宝島（ダマンスキー島）事件。この対立の深まりが、のちの米中接近の背景となります。",
"ガガーリン。農業国だったロシアの工業化の成果として、第三世界に強い印象を与えました。"],
HIS64:[
"私営企業は消滅させられ、国営などの形態に移行しました。",
"集団化では農家をまとめて生産隊がつくられ、共同で作業がおこなわれました。",
"共産党への批判をいったん奨励したのち、一転して弾圧に転じました。多くの知識人が職を追われました。",
"人民公社は行政と生産の基本単位で、共同食堂までつくる急進的な試みでした。",
"自然災害も重なって失敗し、多数の犠牲者が出たとされています。",
"中ソ対立で核の傘を失った中国は、独自の核開発を進めました。",
"権力の回復をねらった毛沢東が、学生たち（紅衛兵）の大衆運動をあおりました。",
"学生によって丸刈りにされる黒竜江省の省長の写真が教科書に載っています。",
"中ソ対立の深まりとベトナム戦争への疲弊から、米中の利害が一致しました。",
"人民公社。「人民公社は限りなく良く、女性は徹底的に解放された」というポスター（1960年）も教科書にあります。"],
HIS65:[
"特需の大部分はドル払いで、日本の外貨獲得に大きく貢献しました。日本経済復興の大きな転機です。",
"「回復を通じての成長は終わった。今後の成長は近代化によって支えられる」と述べています。",
"1954年に自由党から離党した鳩山一郎・岸信介らの日本民主党と、自由党の保守合同でした。",
"改憲を阻止できる3分の1の議席を確保した社会党と、単独過半数の自民党が対峙しました。",
"モスクワで調印する鳩山首相とブルガーニン首相の写真が教科書に載っています。",
"岸信介は安保改定を実現した直後、世論の反発を受けて退陣しました。",
"アメリカも日本の反米感情を和らげるため、より対等な条約に応じました。",
"衆院での強行採決に対し「民主主義の危機」だとして、学生・労働者・市民が国会を取り囲みました。",
"池田内閣は「寛容と忍耐」を掲げ、政治対立から経済成長へと国民の関心を向けました。",
"鳩山一郎。日ソ共同宣言と国連加盟で、日本の国際社会復帰を完成させました。"],
HIS66:[
"東京オリンピック（1964）と大阪万博（1970）は、復興と成長を世界に示す祭典となりました。",
"GNP（国民総生産）でみた当時の指標です。神武景気・岩戸景気・いざなぎ景気と好景気が続きました。",
"技術革新は鉄鋼・造船・自動車・化学の分野で、外国企業とのライセンス契約や設備輸入で実現しました。",
"自家用車の世帯普及率は1975年に4割をこえました。組み立てライン方式の導入で生産も急増しました。",
"中学を卒業して集団就職列車で上京した若者たちは、貴重な労働力として「金の卵」と呼ばれました。",
"学歴別の賃金格差の是正と所得再分配政策で、「一億総中流」といわれる社会が生まれていきます。",
"農村では過疎化が進み、都市では過密・住宅問題・交通問題が深刻化しました。",
"裁判ではいずれも患者側が勝訴しました。教科書には全国の公害の地図が載っています。",
"高度経済成長の負の側面への反省から、消費者運動や環境保護運動も始まりました。",
"カラーテレビ。白黒テレビ・洗濯機・冷蔵庫の「三種の神器」に続く豊かさの象徴でした。"],
HIS67:[
"これにより日本は台湾を唯一の中国政府として承認し、中華人民共和国との国交の可能性をいったん失いました。",
"ビルマのバルーチャン第二発電所（1960年完成）が代表例。日本の建設会社・機械・資材でつくられました。",
"賠償は東南アジア諸国の経済開発を支援すると同時に、日本企業の経済進出の機会にもなりました。",
"1952年の交渉開始から13年。植民地支配の評価をめぐる対立で交渉は難航しました。",
"日本が無償・有償の経済協力をおこない、韓国の経済発展（漢江の奇跡）の一因となりました。",
"アメリカのケネディ大統領も、冷戦戦略上から日韓の国交正常化を強く求めていました。",
"日中共同声明で、日本は戦争で中国に与えた損害への反省の意を示しました。",
"1978年には日中平和友好条約が結ばれ、日本から中国への政府開発援助も始まりました。",
"返還交渉では核兵器の扱いや原状回復費用をめぐる「密約」が交わされ、のちに公表されました。",
"佐藤栄作。1967年にジョンソン大統領と返還時期の確定に合意し、1972年の復帰を実現しました。"],
HIS68:[
"ベトナム戦争の戦費と「大きな政府」の費用で財政が悪化し、1971年には貿易収支も約1世紀ぶりに赤字となりました。",
"ドルを基軸通貨とするブレトン=ウッズ体制は、ここで大きな転機を迎えました。",
"トイレットペーパーなどを買い求めて客が殺到する1973年のスーパーの写真が教科書に載っています。",
"西ドイツでは日曜日のアウトバーンから車が消えました（石油節約のため）。",
"イランの革命で国王パフレヴィー2世が倒され、ホメイニらの革命勢力がイスラーム共和国を樹立しました。",
"エネルギー・経済成長・通貨・債務などの問題を先進国が協議する場となり、現在も続いています。",
"田中角栄内閣は金融引き締めに転じましたが、インフレがおさまらないまま不況が深刻化しました。",
"1980年代には電気製品や自動車で強い国際競争力をもち、輸出を急速にのばしました。",
"ドル高是正の合意で1ドル＝239円から急速に円高が進行。日本は内需拡大への転換を求められました。",
"バブル経済。1991年の崩壊後、日本は長期の経済停滞に入ります。"],
HIS69:[
"アジア通貨危機（1997）では韓国・タイ・インドネシアが深刻な打撃を受けましたが、その後は成長を取り戻しました。",
"日本や欧米のODA（無償資金協力・借款・技術協力）も成長を支えました。日本の援助は戦後賠償の延長として始まりました。",
"経済成長の実績で強権体制を正当化する手法で、人権侵害や言論統制をともないました。",
"リー=クアンユーは中国系移民の家に生まれ、日本軍占領下のシンガポールで戦時を過ごしました。",
"陸軍による共産党弾圧事件です。スハルトは1998年のアジア通貨危機後まで30年あまり政権を握りました。",
"カシミール問題をめぐる印パ対立は、両国が核保有国となった今日まで続いています。",
"独立以来の国民会議派による中央集権的な計画経済から、大きく転換しました。",
"OPECはイラン・イラク・クウェート・サウジアラビア・ベネズエラの5カ国で設立されました。",
"イギリス系石油会社の国有化は資源ナショナリズムの先駆けでした。教科書には油井の模型をみて喜ぶモサッデグの写真があります。",
"開発独裁。経済発展と引き換えに、民主主義や人権が制限されました。"],

/* ===== 英検3級 学習プラン（チェック式・紙学習トラッカー） ===== */
const EBK={"単":["#2b7de9","でる単"],"熟":["#2b7de9","でる単"],"会":["#2b7de9","でる単"],"復":["#7a8aa0","復習"],"文":["#22a06b","文法"],"読":["#b7791f","読解"],"書":["#d6336c","英作"],"聴":["#7048e8","聴解"],"面":["#e8590c","面接"],"総":["#495057","仕上げ"]};
function eikenDone(id){ learnGuard(); return !!S.eiken.done[id]; }
function toggleEiken(id){ learnGuard(); if(S.eiken.done[id]) delete S.eiken.done[id]; else S.eiken.done[id]=todayStr(); save(); render(); }
function eikenCounts(){ let tot=0,done=0; const bk={deru:[0,0],hito:[0,0],tore:[0,0],fin:[0,0]};
  for(const p of EIKEN.plan) for(const it of p.t){ tot++; const dn=eikenDone(it.id); if(dn)done++;
    let c; if(/^でる単/.test(it.lb))c="deru"; else if(/ひとつひとつ/.test(it.lb))c="hito"; else if(/トレーニング/.test(it.lb))c="tore"; else c="fin";
    bk[c][0]++; if(dn)bk[c][1]++; }
  return {tot,done,bk}; }
function eikenExpected(){ const t=todayStr(); let e=0; for(const p of EIKEN.plan){ if(p.d<=t) e+=p.t.length; } return e; }
function eikenTodayList(){ const t=todayStr(); const todayDay=EIKEN.plan.find(p=>p.d===t); const overdue=[];
  for(const p of EIKEN.plan){ if(p.d<t){ for(const it of p.t){ if(!eikenDone(it.id)) overdue.push(Object.assign({d:p.d},it)); } } }
  return {todayDay, overdue}; }
function eikenRow(it,over){ const dn=eikenDone(it.id); const m=EBK[it.bk]||["#888",""];
  return `<label class="task" style="cursor:pointer">
    <input type="checkbox" ${dn?"checked":""} onchange="toggleEiken('${it.id}')" style="width:22px;height:22px;flex:0 0 auto">
    <div class="info"><div class="name" style="${dn?'text-decoration:line-through;color:var(--sub)':''}">${esc(it.lb)}</div>
    <div class="meta"><span class="tag" style="background:${m[0]}22;color:${m[0]}">${m[1]}</span>${over?` ・ <span style="color:var(--red)">${fmtMD(it.d)}の分</span>`:""}</div></div></label>`; }
function eikenBookBars(c){ const labels=[["deru","でる単（単語・熟語・会話）"],["hito","ひとつひとつわかりやすく"],["tore","出題形式別トレーニング"],["fin","仕上げ・総まとめ"]];
  return labels.map(([k,nm])=>{ const a=c.bk[k]; if(!a||!a[0])return ""; const pct=Math.round(a[1]/a[0]*100);
    return `<div style="margin-top:8px"><div class="spread"><b style="font-size:13px">${nm}</b><span class="muted">${a[1]}/${a[0]}</span></div>
      <div class="bar" style="margin-top:4px"><i class="${a[1]>=a[0]?'g':''}" style="width:${pct}%"></i></div></div>`; }).join(""); }
function eikenFullSchedule(){ let h=""; let curW="";
  for(const p of EIKEN.plan){ const mon=mondayOf(p.d);
    if(mon!==curW){ curW=mon; h+=`<div class="lsname">${fmtMD(mon)}の週</div>`; }
    const items=p.t.map(it=>`${eikenDone(it.id)?"✅":"⬜️"} ${esc(it.lb)}`).join("<br>");
    h+=`<div class="blockrow"><div class="info"><div class="meta">${fmtMD(p.d)}（${WD[(P(p.d).getDay()+6)%7]}）</div><div style="font-size:12.5px;line-height:1.6">${items}</div></div></div>`; }
  return h; }
function rEiken(){ learnGuard();
  const seg=`<div class="ls-seg">`+SUBJECTS.map(s=>`<button class="${"eiken"===s[0]?'act':''}" onclick="setLearnSubj('${s[0]}')">${s[1]}</button>`).join("")+`</div>`;
  const c=eikenCounts(); const exp=eikenExpected(); const diff=c.done-exp; const dleft=diffD(todayStr(),EIKEN.exam);
  const tag=diff>=1?`<span class="tag green">予定より +${diff} 先行 🎉</span>`:(diff===0?`<span class="tag green">予定どおり ◎</span>`:`<span class="tag red">${-diff} 項目 遅れ</span>`);
  const pct=c.tot?Math.round(c.done/c.tot*100):0;
  let h=seg;
  h+=`<div class="card"><div class="spread"><h2><span class="ic">📘</span>英検3級 合格プラン</h2>${dleft>=0?`<span class="tag amber">試験 10/4 まで D-${dleft}</span>`:`<span class="tag">試験終了</span>`}</div>
    <div class="bar" style="margin:8px 0 6px"><i class="${c.done>=c.tot?'g':''}" style="width:${pct}%"></i></div>
    <div class="spread"><span class="muted">${c.done} / ${c.tot} 項目 完了（${pct}%）</span>${tag}</div>
    <div class="muted" style="margin-top:6px">紙で学習 → 終わったらチェック。3冊を並行で進め、9月後半は予想テスト・模試で仕上げます。</div></div>`;
  const {todayDay,overdue}=eikenTodayList();
  h+=`<div class="card"><h2><span class="ic">✅</span>今日のやること <span class="muted">${fmtMD(todayStr())}（${WD[(P(todayStr()).getDay()+6)%7]}）</span></h2>`;
  if(todayDay){ for(const it of todayDay.t) h+=eikenRow(it,false); }
  else { h+=`<div class="muted">今日は予備日（おやすみ）。遅れていれば下の積み残しを進めましょう。</div>`; }
  if(overdue.length){ h+=`<div class="lsname" style="color:var(--red)">⏰ 積み残し（${overdue.length}）</div>`;
    for(const it of overdue.slice(0,15)) h+=eikenRow(it,true);
    if(overdue.length>15) h+=`<div class="muted">ほか ${overdue.length-15} 項目…</div>`; }
  h+=`</div>`;
  h+=`<div class="card"><h2><span class="ic">📚</span>教材別の進捗</h2>`+eikenBookBars(c)+`</div>`;
  h+=`<div class="card"><details><summary style="cursor:pointer;font-weight:700;color:var(--accent)">🗓 全体スケジュールを見る（週ごと）</summary><div style="margin-top:8px">`+eikenFullSchedule()+`</div></details></div>`;
  V.innerHTML=h; }
function eikenTodayCard(){ learnGuard(); const t=todayStr(); const dleft=diffD(t,EIKEN.exam); if(dleft<0) return "";
  const todayDay=EIKEN.plan.find(p=>p.d===t); const {overdue}=eikenTodayList();
  let h=`<div class="card"><div class="spread"><h2><span class="ic">📘</span>英検3級（D-${dleft}）</h2><button class="mini primary" onclick="setLearnSubj('eiken');go('learn')">英検へ ▶</button></div>`;

  if(todayDay&&overdue.length) h+=`<div class="muted" style="margin-top:6px;color:var(--red)">⏰ 積み残し ${overdue.length} 項目（「英検へ」で確認）</div>`;

function learnStats(subj){ learnGuard(); subj=subj||S.learnSubj;
  const ready=QB.filter(b=>bsub(b)===subj&&b.qs.length);
  const cleared=ready.filter(b=>S.learn[b.id]&&S.learn[b.id].cleared).length;
  return {total:ready.length, cleared}; }
function learnExpected(subj){ learnGuard(); const st=S.settings.startDate, dl=S.learnDL;
  const tot=Math.max(1,diffD(st,dl)); const el=Math.max(0,Math.min(tot,diffD(st,todayStr())));
  return Math.floor(learnStats(subj).total*el/tot); }

function lsGuard(){ if(!S.listen) S.listen={mode:"w",lessons:["Lesson 1"],pat:"EJE",rate:1.0,gap:1.2,shuffle:false,loop:true,skipKnown:false,known:{},pos:0}; }

function lsPick(lang,prefs){ const vs=lsVoices.filter(v=>v.lang&&v.lang.toLowerCase().startsWith(lang));

function lsSpeak(text,lang){ return new Promise(res=>{ try{

  let items=[];
  for(const ls of LSLS){ if(!S.listen.lessons.includes(ls)) continue;
    for(const e of (src[ls]||[])){

      else items.push({ls,en:e[0],ja:e[1],ex:e[2]||null,exJa:e[3]||null});

async function lsPlayItem(it,sid){ const g=S.listen.gap, pat=S.listen.pat;
  if(it.gram){
    lsSetNow(it.en,"（文法ポイント）");
    await lsSpeak(it.en,"ja"); if(sid!==lsSession)return; await lsWait(g*0.6);
    for(const pr of it.pairs){ if(sid!==lsSession)return;
      lsSetNow(pr[0],pr[1]);
      await lsSpeak(pr[0],"en"); if(sid!==lsSession)return; await lsWait(g);
      await lsSpeak(pr[1],"ja"); if(sid!==lsSession)return; await lsWait(g);
      if(pat==="EJE"){ await lsSpeak(pr[0],"en"); if(sid!==lsSession)return; await lsWait(g*0.7); } }
    return; }
  if(pat==="JE"){
    lsSetNow("？？？",it.ja);
    await lsSpeak(it.ja,"ja"); if(sid!==lsSession)return;
    await lsWait(Math.max(g,1.5)); if(sid!==lsSession)return;
    lsSetNow(it.en,it.ja);
    await lsSpeak(it.en,"en"); if(sid!==lsSession)return; await lsWait(g*0.5);
    await lsSpeak(it.en,"en");
  } else {
    lsSetNow(it.en,"…");
    await lsSpeak(it.en,"en"); if(sid!==lsSession)return; await lsWait(g);
    lsSetNow(it.en,it.ja);
    await lsSpeak(it.ja,"ja"); if(sid!==lsSession)return;
    if(pat==="EJE"){ await lsWait(g*0.5); await lsSpeak(it.en,"en"); }
  }
  if(sid!==lsSession)return;
  if(it.ex){ await lsWait(g*0.7); if(sid!==lsSession)return;
    lsSetNow(it.en,it.ja+"\n📖 "+it.ex);
    await lsSpeak(it.ex,"en"); if(sid!==lsSession)return; await lsWait(g*0.7);
    if(it.exJa){ await lsSpeak(it.exJa,"ja"); } }
}
async function lsLoop(){ const sid=lsSession;
  while(lsPlaying&&sid===lsSession){
    if(!lsQueue.length){ lsStop(); lsSetNow("項目がありません","レッスンを選んでください"); return; }
    if(lsQi>=lsQueue.length){ if(S.listen.loop){ lsQi=0; lsBuild(); } else { lsStop(); lsSetNow("おしまい！","おつかれさま 🎉"); return; } }
    lsCntTxt();
    await lsPlayItem(lsQueue[lsQi],sid);
    if(sid!==lsSession) return;
    await lsWait(S.listen.gap*0.8);
    if(sid!==lsSession) return;
    lsQi++; S.listen.pos=lsQi; save();
  } }
async function lsToggle(){ lsGuard();

function lsPeek(){ if(lsQueue[lsQi]){ const it=lsQueue[lsQi]; lsSetNow(it.en,it.gram?"（文法ポイント）":it.ja); lsCntTxt(); } }
function lsNext(){ if(!lsQueue.length) lsBuild();

function lsPrev(){ lsQi=Math.max(0,lsQi-1); S.listen.pos=lsQi; save();

function lsTg(k){ lsGuard(); S.listen[k]=!S.listen[k]; save(); lsBuild(); render(); }

        files:{"study-data.json":{content:JSON.stringify(S)}}})});
      const j=await r2.json(); SY.gistId=j.id; saveSY();
      SY.last=Date.now(); saveSY(); setSyncStat("✅ 接続完了（初回データを保存しました）");
    }
    render();
  }catch(e){ setSyncStat("❌ "+e.message); SY.gistId=SY.gistId||null; saveSY(); }
}
async function syncPull(manual){ if(!SY.token||!SY.gistId) return;
  if(syncBusy) return; syncBusy=true;
  try{
    const r=await ghApi("/gists/"+SY.gistId); const j=await r.json();
    const f=j.files&&j.files["study-data.json"];
    if(f&&f.content){ const remote=JSON.parse(f.content);
      if(remote&&remote.settings){ mergeStates(remote);
        localStorage.setItem(KEY,JSON.stringify(S));
        SY.last=Date.now(); saveSY(); setSyncStat("✅ 最新の記録を取得しました（"+new Date().toLocaleTimeString()+"）");
        render(); } }
  }catch(e){ if(manual) setSyncStat("⚠️ 取得できませんでした："+e.message); }
  finally{ syncBusy=false; }
}
async function syncPush(){ if(!SY.token||!SY.gistId) return;
  await ghApi("/gists/"+SY.gistId,{method:"PATCH",body:JSON.stringify({
    files:{"study-data.json":{content:JSON.stringify(S)}}})});
  SY.last=Date.now(); saveSY(); setSyncStat("✅ 同期済み（"+new Date().toLocaleTimeString()+"）");
}
function syncOff(){ if(confirm("この端末の同期設定を解除しますか？（記録は消えません）")){ SY={}; saveSY(); render(); } }
function mergeStates(remote){
  const newerRemote=(remote.savedAt||0)>(S.savedAt||0);
  const base=newerRemote?remote:S, other=newerRemote?S:remote;
  const m=JSON.parse(JSON.stringify(base));
  m.logs=m.logs||{}; const oLogs=other.logs||{};
  for(const d in oLogs){ const b=oLogs[d];
    if(!m.logs[d]){ m.logs[d]=b; continue; }
    const a=m.logs[d];
    a.min=Math.max(a.min||0,b.min||0);
    a.target=a.target||b.target||null;
    if(!a.note&&b.note) a.note=b.note;
    a.ranges=a.ranges||{}; for(const k in (b.ranges||{})) a.ranges[k]=Math.max(a.ranges[k]||0,b.ranges[k]);
    a.routines=a.routines||{}; for(const k in (b.routines||{})) a.routines[k]=Math.max(a.routines[k]||0,b.routines[k]); }
  m.learn=m.learn||{}; const oL=other.learn||{};
  for(const k in oL){ const b=oL[k]; const a=m.learn[k]||(m.learn[k]={});
    a.cleared=a.cleared||b.cleared; if(!a.date&&b.date)a.date=b.date;
    a.tries=Math.max(a.tries||0,b.tries||0); a.best=Math.max(a.best||0,b.best||0); }
  m.mistakes=m.mistakes||{}; const oM=other.mistakes||{};
  for(const k in oM){ const b=oM[k];
    if(!m.mistakes[k]) m.mistakes[k]=b;
    else{ const a=m.mistakes[k]; a.n=Math.max(a.n||0,b.n||0); if((b.d||"")>(a.d||""))a.d=b.d; } }
  m.weeks=m.weeks||{}; const oW=other.weeks||{};
  for(const k in oW){ const a=m.weeks[k]||(m.weeks[k]={}); if(oW[k]&&oW[k].paid) a.paid=true; }
  if(other.listen||m.listen){ m.listen=m.listen||other.listen;
    if(other.listen) m.listen.known=Object.assign({},other.listen.known||{},m.listen.known||{}); }
  S=m;
}
/* ----- 週間 ----- */
function rWeek(){
  const t=todayStr(); const mon=mondayOf(t); const wi=weekInfo(mon);
  let cells="";
  for(let i=0;i<7;i++){ const ds=addD(mon,i); const lg=peekLog(ds);
    const future=ds>t; const pre=ds<S.settings.startDate;
    const cls= future?"":(pre||dayPassed(ds)?"ok":(lg.min>0||ds<t?"ng":"ng"));
    cells+=`<div class="wd ${future?'':cls} ${ds===t?'today':''}"><div>${WD[i]}</div><div class="d">${P(ds).getDate()}</div><div class="m">${future?'−':(pre?'—':lg.min+'分')}</div><div>${future?'':(pre?'':(dayPassed(ds)?'✓':'✗'))}</div></div>`;
  }
  const weeks=ledgerWeeks();
  let earned=0,paid=0,rows="";
  for(const m of weeks.slice().reverse()){
    const wi2=weekInfo(m); const wk=S.weeks[m]||(S.weeks[m]={paid:false});
    const amt=wi2.passed?S.settings.allowance:0;
    if(wi2.passed){ earned+=S.settings.allowance; if(wk.paid) paid+=S.settings.allowance; }
    rows+=`<tr><td>${fmtMD(m)}〜${fmtMD(addD(m,6))}</td><td>${wi2.passDays}/7日</td><td>${fmtMin(weekMin(m))}</td>
      <td><span class="tag ${wi2.passed?'green':'red'}">${wi2.passed?'合格 🎉':'不合格'}</span></td>
      <td class="money">${wi2.passed?'¥'+S.settings.allowance.toLocaleString():'—'}</td>
      <td>${wi2.passed?`<input type="checkbox" ${wk.paid?'checked':''} onchange="togglePaid('${m}',this.checked)">`:''}</td></tr>`;
  }
  const unpaid=earned-paid;
  V.innerHTML=`
  <div class="kpis">
    <div class="kpi"><div class="v">¥${earned.toLocaleString()}</div><div class="l">累計獲得</div></div>
    <div class="kpi"><div class="v">¥${paid.toLocaleString()}</div><div class="l">渡し済み</div></div>
    <div class="kpi"><div class="v" style="color:${unpaid>0?'var(--amber)':'var(--ink)'}">¥${unpaid.toLocaleString()}</div><div class="l">未渡し</div></div>
  </div>
  <div class="card"><div class="spread"><h2><span class="ic">📅</span>今週（${fmtMD(mon)}〜${fmtMD(addD(mon,6))}）</h2>
    <span class="tag ${wi.passDays>=S.settings.weeklyPassDays?'green':'amber'}">${wi.passDays}/${S.settings.weeklyPassDays}日 達成</span></div>
    <div class="weekgrid" style="margin-top:8px">${cells}</div>
    <div class="spread" style="margin-top:10px"><span style="font-size:15px">⏱ 今週の合計：<b style="font-size:18px;color:var(--accent)">${fmtMin(weekMin(mon))}</b></span>
      <span class="muted">1日平均 ${Math.round(weekMin(mon)/Math.max(1,Math.min(7,diffD(mon,t)+1)))}分</span></div>
    <div class="muted" style="margin-top:8px">週${S.settings.weeklyPassDays}日以上の達成（1日最低${S.settings.dailyMin}分）で合格 → 小遣い ¥${S.settings.allowance.toLocaleString()}</div></div>
  <div class="card"><h2><span class="ic">💰</span>週ごとの結果と小遣い</h2>
    ${rows?`<table class="ledger"><tr><th>週</th><th>達成</th><th>時間</th><th>判定</th><th>小遣い</th><th>渡した</th></tr>${rows}</table>`:`<div class="muted">まだ完了した週がありません。今週から記録を始めましょう。</div>`}
  </div>`;
}
function togglePaid(m,v){ (S.weeks[m]||(S.weeks[m]={})).paid=v; save(); render(); }
/* ----- カレンダー ----- */
function rCal(){
  const t=todayStr();
  if(calY===undefined){ calY=P(t).getFullYear(); calM=P(t).getMonth(); }
  const first=new Date(calY,calM,1); const start=(first.getDay()+6)%7; const days=new Date(calY,calM+1,0).getDate();
  const examDates=new Set(S.exams.map(e=>e.date));
  let cells=WD.map(w=>`<div class="h">${w}</div>`).join("");
  for(let i=0;i<start;i++) cells+=`<div></div>`;
  let okc=0, ngc=0;
  for(let d=1; d<=days; d++){
    const ds=iso(new Date(calY,calM,d));
    let cls="", mk="";
    if(ds>=S.settings.startDate && ds<=t){
      if(dayPassed(ds)){cls="ok"; mk="✓"; okc++;} else {cls="ng"; mk="✗"; ngc++;}
    } else if(ds<S.settings.startDate||ds>t){ cls="off"; }
    if(examDates.has(ds)){ cls+=" exam"; mk="📝"+mk; }
    cells+=`<div class="c ${cls}"><div class="n">${d}</div><div class="mk">${mk}</div></div>`;
  }
  V.innerHTML=`<div class="card">
    <div class="spread"><button class="mini" onclick="calNav(-1)">←</button>
      <h2 style="margin:0">${calY}年 ${calM+1}月</h2>
      <button class="mini" onclick="calNav(1)">→</button></div>
    <div class="cal" style="margin-top:10px">${cells}</div>
    <div class="muted" style="margin-top:8px">✓ 達成（${okc}日）　✗ 未達成（${ngc}日）　📝 試験日</div></div>`;
}
function calNav(n){ calM+=n; if(calM<0){calM=11;calY--;} if(calM>11){calM=0;calY++;} render(); }
/* ----- 計画 ----- */
function rPlan(){
  const t=todayStr();
  let h=`<div class="card"><h2><span class="ic">📝</span>定期テスト</h2>`;
  for(const ex of S.exams){
    const dl=diffD(t,ex.date);
    h+=`<div class="examcard"><div class="spread"><h3>${esc(ex.name)}</h3>
      <span class="tag ${dl<0?'':'amber'}">${dl<0?'終了':'D-'+dl}（${fmtMD(ex.date)}）</span></div>`;
    for(const r of ex.ranges){
      const pct=r.total?Math.round(r.done/r.total*100):0;
      h+=`<div class="range"><div class="spread"><b>${esc(r.subject)}</b><span class="muted">${r.done} / ${r.total} ${esc(r.unit)}（${pct}%）</span></div>
        <div class="muted">${esc(r.desc)}</div>
        <div class="bar" style="margin-top:5px"><i class="${pct>=100?'g':''}" style="width:${pct}%"></i></div>
        <div class="row" style="margin-top:6px">
          <button class="mini" onclick="editRangeDone('${ex.id}','${r.id}')">進捗を修正</button>
          <button class="mini danger" onclick="delRange('${ex.id}','${r.id}')">範囲を削除</button></div></div>`;
    }
    h+=`<div class="fieldset"><div class="lbl">範囲を追加（教科 / 内容 / 量 / 単位）</div>
      <div class="row"><input id="rs_${ex.id}" placeholder="教科（例：英語）" style="width:110px">
        <input id="rd_${ex.id}" placeholder="内容（例：教科書p28〜75）" style="flex:1;min-width:160px"></div>
      <div class="row" style="margin-top:6px"><input id="rt_${ex.id}" type="number" placeholder="量" min="1">
        <input id="ru_${ex.id}" placeholder="単位（例：ページ）" style="width:110px">
        <button class="mini primary" onclick="addRange('${ex.id}')">追加</button></div></div>
    <div class="row" style="margin-top:8px">
      <button class="mini" onclick="editExam('${ex.id}')">名前・日付を変更</button>
      <button class="mini danger" onclick="delExam('${ex.id}')">この試験を削除</button></div></div>`;
  }
  h+=`<div class="fieldset"><div class="lbl">試験を追加</div>
    <div class="row"><input id="exName" placeholder="試験名（例：2学期中間テスト）" style="flex:1;min-width:160px">
      <input id="exDate" type="date"><button class="mini primary" onclick="addExam()">追加</button></div></div></div>`;
  h+=`<div class="card"><h2><span class="ic">🎓</span>大学受験 毎日ルーチン</h2>
    <div class="muted" style="margin-bottom:6px">塾なし・偏差値60私大を見据えた基礎固め。毎日コツコツ型の課題を登録します。</div>`;
  for(const ro of S.routines){
    h+=`<div class="task"><div class="info"><div class="name">${esc(ro.name)}</div>
      <div class="meta">1日 ${ro.quota}${esc(ro.unit)} ・ ${ro.active?'有効':'停止中'}</div></div>
      <div class="row"><button class="mini" onclick="toggleRoutine('${ro.id}')">${ro.active?'停止':'再開'}</button>
      <button class="mini danger" onclick="delRoutine('${ro.id}')">削除</button></div></div>`;
  }
  h+=`<div class="fieldset"><div class="lbl">ルーチンを追加（名前 / 1日の量 / 単位）</div>
    <div class="row"><input id="roName" placeholder="例：古文単語" style="flex:1;min-width:140px">
      <input id="roQuota" type="number" min="1" placeholder="量"><input id="roUnit" placeholder="単位" style="width:90px">
      <button class="mini primary" onclick="addRoutine()">追加</button></div></div></div>`;
  V.innerHTML=h;
}
const uid=()=>Math.random().toString(36).slice(2,9);
function addExam(){ const n=document.getElementById("exName").value.trim(); const d=document.getElementById("exDate").value;
  if(!n||!d) return alert("試験名と日付を入力してください"); S.exams.push({id:uid(),name:n,date:d,ranges:[]}); save(); render(); }
function editExam(id){ const ex=S.exams.find(e=>e.id===id); const n=prompt("試験名",ex.name); if(n===null)return;
  const d=prompt("日付（YYYY-MM-DD）",ex.date); if(d===null)return;
  if(n.trim())ex.name=n.trim(); if(/^\d{4}-\d{2}-\d{2}$/.test(d))ex.date=d; save(); render(); }
function delExam(id){ if(confirm("この試験を削除しますか？")){ S.exams=S.exams.filter(e=>e.id!==id); save(); render(); } }
function addRange(exId){ const ex=S.exams.find(e=>e.id===exId);
  const s=document.getElementById("rs_"+exId).value.trim(), d=document.getElementById("rd_"+exId).value.trim(),
        t=parseInt(document.getElementById("rt_"+exId).value), u=document.getElementById("ru_"+exId).value.trim()||"ページ";
  if(!s||!d||!t) return alert("教科・内容・量を入力してください");
  ex.ranges.push({id:uid(),subject:s,desc:d,total:t,done:0,unit:u}); save(); render(); }
function delRange(exId,rId){ const ex=S.exams.find(e=>e.id===exId); ex.ranges=ex.ranges.filter(r=>r.id!==rId); save(); render(); }
function editRangeDone(exId,rId){ const ex=S.exams.find(e=>e.id===exId); const r=ex.ranges.find(x=>x.id===rId);
  const v=prompt(`完了した量（全${r.total}${r.unit}中）`,r.done); if(v===null)return;
  const n=parseInt(v); if(!isNaN(n)) r.done=Math.max(0,Math.min(r.total,n)); save(); render(); }
function addRoutine(){ const n=document.getElementById("roName").value.trim(), q=parseInt(document.getElementById("roQuota").value),
  u=document.getElementById("roUnit").value.trim()||"回";
  if(!n||!q) return alert("名前と量を入力してください");
  S.routines.push({id:uid(),name:n,quota:q,unit:u,active:true}); save(); render(); }
function toggleRoutine(id){ const r=S.routines.find(x=>x.id===id); r.active=!r.active; save(); render(); }
function delRoutine(id){ if(confirm("削除しますか？")){ S.routines=S.routines.filter(x=>x.id!==id); save(); render(); } }

    ③ 「週間」タブで週${s.weeklyPassDays}日以上達成なら合格🎉 → 小遣い¥${s.allowance.toLocaleString()}。渡したらチェック。<br>
    ④ 大学受験対策は「毎日ルーチン」で基礎固めを継続します。</div></div>`;
}
function expData(){ const b=new Blob([JSON.stringify(S,null,1)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download="学習記録_"+todayStr().replaceAll("-","")+".json"; a.click(); }
